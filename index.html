: [his back to HALIE] He never played basketball!\nHALIE: You shut up, Bradley! You shut up about Ansel! Ansel played basketball better than anyone! And you know it! He was an All-American! There's no reason to take the glory away from others.\n[HALIE turns away from BRADLEY, crosses back toward DEWIS sipping on the flask and smiling.]\nHALIE: [to DEWIS] Ansel was a great basketball player. One of the greatest.\nDEWIS: I remember Ansel.\nHALIE: Of course! You remember. You remember how he could play. [She turns toward SHELLY.] Of course, nowadays they play a different brand of basketball. More vicious. Isn't that right, dear?\nSHELLY: I don't know.\n[HALIE crosses to SHELLY, sipping on flask. She stops in front of SHELLY.]\nHALIE: Much, much more vicious. They smash into each other. They knock each other's teeth out. There's blood all over the court. Savages.\n[HALIE takes the cup from SHELLY and pours whiskey into it.]\nHALIE: They don't train like they used to. Not at all. They allow themselves to run amuck. Drugs and women. Women mostly.\n[HALIE hands the cup of whiskey back to SHELLY slowly. SHELLY takes it.]\nHALIE: Mostly women. Girls. Sad, pathetic little girls. [She crosses back to FATHER DEWIS.] It's just a reflection of the times, don't you think Father? An indication of where we stand?\nDEWIS: I suppose so, yes.\n\nSam Shepard, Buried Child\n\n<Commentary>\nIn this excerpt, Halie plans to commemorate Ansel by erecting his statue, though her claims about his achievements do not seem to be verified. Halie's endeavor to glorify her long deceased son is tied to her condemnation of her existing family and cultural diagnosis of the present time. In her opinion, the degeneration of culture is occurring as the likes of heroic Ansel are being replaced by __________.","blanks":[{"label":"빈칸","context":"heroic Ansel are being replaced by ___"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"Ansel처럼 영웅적인 존재를 대체하는 타락하고 폭력적인 존재 → 지문에서 직접 찾을 수 있는 단어\n- commentary에서 'heroic Ansel are being replaced by ___' — 빈칸은 Ansel의 반대 존재\n- 명사 형태 필요 (replaced by + 명사)\n- 지문(passage)에서 직접 등장한 단어여야 함 — passage-bound 규칙","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'Ansel: All-American, great basketball player, heroic' [antonym]\n→ 현재 선수들: vicious, smash, knock teeth out, blood, Savages\n\n'Halie의 현재 문화 진단: 타락, 폭력, 무절제' [paraphrase]\n→ Commentary: degeneration of culture, heroic Ansel replaced by ___","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- barbarians: ✗ (지문에 등장하지 않는 단어 — passage-bound 규칙 위반)\n- thugs: ✗ (지문에 등장하지 않는 단어)\n- savages: ✓ (정답)","key_terms":["savages"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: savages\n\n[content] Halie가 현대 농구 선수들을 묘사하며 직접 사용한 단어: 'They smash into each other. They knock each other's teeth out. There's blood all over the court. Savages.' — 지문에서 그대로 등장\n→ 근거: \"Savages.\"\n\n[parallel] Commentary의 'heroic Ansel are being replaced by ___'은 지문에서 Halie가 Ansel(영웅)과 현재 선수들(야만인)을 대비시키는 구조를 직접 반영\n→ 근거: \"the degeneration of culture is occurring as the likes of heroic Ansel are being replaced by __________.\"","key_terms":["savages"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① Commentary의 빈칸은 지문 안에서 직접 찾는다 — passage-bound 원칙 적용\n② Commentary가 지문을 paraphrase하는 구조를 먼저 파악하고, 빈칸이 어느 대사/단어에 대응하는지 확인\n③ 희곡: 인물의 대사가 Commentary 분석의 핵심 근거 — 인물 간 대비(Ansel vs. 현재)를 파악\n\n함정:\n- 지문에 없는 단어를 상식적으로 채우는 오류 (barbarians, thugs 등) → 반드시 지문에서 찾을 것\n- Halie의 과장된 서술을 신뢰할 수 없는 화자 특성으로 분석 — 정답 도출에는 영향 없음","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"stench","pos":"n.","definition_ko":"악취"},{"word":"unveiling","pos":"n.","definition_ko":"제막식"},{"word":"run amuck","pos":"idiom","definition_ko":"날뛰다, 통제 불능이 되다"},{"word":"pathetic","pos":"adj.","definition_ko":"한심한, 처량한"},{"word":"flask","pos":"n.","definition_ko":"휴대용 술병"},{"word":"vicious","pos":"adj.","definition_ko":"잔인한, 포악한"}],"translation":"헤일리: 정말 믿을 수 없어요, 장미라니! 정말 아름답지 않나요, 신부님?\n데위스: 네, 그렇네요.\n헤일리: 이 집 안에 가득 찬 죄악의 악취를 거의 덮어버릴 것 같아요. 정말 장엄해! 그 향기. 안셀의 동상 발치에도 좀 놓아야겠어요. 제막식 날에.\n[헤일리가 데위스의 조끼 주머니에서 은제 위스키 플라스크를 꺼낸다. 닷지는 탐욕스럽게 바라본다. 헤일리가 닷지 쪽으로 걸어가 플라스크를 열고 한 모금 마신다.]\n헤일리: [닷지에게] 안셀이 동상을 세우게 됐어, 닷지. 알고 있었어? 동판이 아니라 진짜 동상이야. 청동으로 전신을. 발끝에서 머리끝까지. 한 손엔 농구공을 들고 다른 손엔 소총을 들고서.\n브래들리: [헤일리에게 등을 돌린 채] 그 사람은 농구를 한 번도 한 적 없어!\n헤일리: 닥쳐, 브래들리! 안셀에 대해서 함부로 입 열지 마! 안셀은 누구보다도 농구를 잘했어! 그건 네도 알잖아! 그는 전국 최고였다고! 다른 사람들의 영광을 빼앗을 이유가 없잖아.\n[헤일리는 브래들리에게서 등을 돌리고 플라스크를 홀짝이며 미소 짓는 데위스 쪽으로 다시 걸어간다.]\n헤일리: [데위스에게] 안셀은 훌륭한 농구 선수였어요. 가장 위대한 선수 중 하나였죠.\n데위스: 안셀이 기억나는군요.\n헤일리: 물론이죠! 기억하시겠죠. 그가 얼마나 잘 뛰었는지. [셸리 쪽으로 돌아서며] 물론, 요즘은 다른 방식으로 농구를 하죠. 훨씬 더 거칠게. 그렇지 않나요, 얘?\n셸리: 잘 모르겠어요.\n[헤일리가 플라스크를 홀짝이며 셸리 쪽으로 걸어가 셸리 앞에 선다.]\n헤일리: <span class=\"trans-hl\">훨씬, 훨씬 더 거칠어. 서로 몸을 박아대고. 서로 이빨을 뽑아버리죠. 코트 위에 온통 피가 낭자해. 야만인들이야.</span>\n[헤일리가 셸리에게서 컵을 가져가 위스키를 따른다.]\n헤일리: <span class=\"trans-hl\">예전처럼 훈련하지 않아요. 전혀. 제멋대로 날뛰도록 내버려 두죠. 마약과 여자. 주로 여자들이지.</span>\n[헤일리가 위스키를 담은 컵을 셸리에게 천천히 돌려준다. 셸리가 받는다.]\n헤일리: 주로 여자들이야. 여자애들. 한심하고 가련한 꼬마 여자애들. [다시 데위스 신부 쪽으로 걸어가며] 그냥 시대의 반영인 것 같지 않으세요, 신부님? 우리가 어디에 서 있는지를 보여주는 징표이지 않나요?\n데위스: 그렇겠죠, 네."},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"savages"}],"essay_content":"","scoring_criteria":[{"criterion":"savages (지문에서 그대로)","points":2}]},"variants":[]},"source":{"references":[{"type":"play","author":"Shepard, Sam","title":"Buried Child","year":1978,"publisher":"Dramatists Play Service","pages":"","excerpt":""}],"concept_explanation":"Sam Shepard의 《Buried Child》(1978)는 퓰리처상 수상작. 미국 중서부 농가 가족의 붕괴와 비밀을 다루며, 이상화된 과거 대 타락한 현재라는 대비 구조가 핵심이다. 헤일리는 죽은 아들 안셀을 전설적 영웅으로 신화화하며, 현재의 가족과 문화가 그 영광에서 얼마나 멀어졌는지를 비판한다. 헤일리의 대사는 신뢰할 수 없는 화자(unreliable narrator)의 성격을 갖지만, 극의 주제인 문화적 퇴락(cultural degeneration)을 직접 표현한다."},"related":{"enabled":false,"questions":[]}},"general_2026_A05.json":{"meta":{"id":"general_2026_A05","year":2026,"number":"A-5","subject":"general","linguistics_domain":"","question_type":"essay","score":4,"tags":["short story","Alice Munro","Walker Brothers Cowboy","class consciousness","narrator"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Complete the commentary below by filling in the blank with the ONE most appropriate word from the excerpt. Then explain why the narrator feels so negatively about her and her mother's refined appearances attracting attention as described in the underlined part.","passage":"Up until last winter we had our own business, a fox farm. My father raised silver foxes and sold their pelts to the people who make them into capes and coats and muffs. Prices fell, my father hung on hoping they would get better next year, and they fell again, and he hung on one more year and one more and finally it was not possible to hang on anymore, we owed everything to the feed company. I have heard my mother explain this, several times, to Mrs. Oliphant, who is the only neighbor she talks to. (Mrs. Oliphant also has come down in the world, being a schoolteacher who married the janitor.) We poured all we had into it, my mother says, and we came out with nothing. Many people could say the same thing, these days, but my mother has no time for the national calamity, only ours. Fate has flung us onto a street of poor people (it does not matter that we were poor before; that was a different sort of poverty), and the only way to take this, as she sees it, is with dignity, with bitterness, with no reconciliation. No bathroom with a claw-footed tub and a flush toilet is going to comfort her, nor water on tap and sidewalks past the house and milk in bottles, not even the two movie theatres and the Venus Restaurant and Woolworths so marvellous it has live birds singing in its fan-cooled corners and fish as tiny as fingernails, as bright as moons, swimming in its green tanks. My mother does not care.\n\nIn the afternoons she often walks to Simon's Grocery and takes me with her to help carry things. She wears a good dress, navy blue with little flowers, sheer, worn over a navy-blue slip. Also a summer hat of white straw, pushed down on the side of the head, and white shoes I have just whitened on a newspaper on the back steps. I have my hair freshly done in long damp curls which the dry air will fortunately soon loosen, a stiff large hair ribbon on top of my head. This is entirely different from going out after supper with my father. We have not walked past two houses before I feel we have become objects of universal ridicule. Even the dirty words chalked on the sidewalk are laughing at us. My mother does not seem to notice. She walks serenely like a lady shopping, like a lady shopping, past the housewives in loose beltless dresses torn under the arms. With me her creation, wretched curls and flaunting hair bow, scrubbed knees and white socks—all I do not want to be. I loathe even my name when she says it in public, in a voice so high, proud, and ringing, deliberately different from the voice of any other mother on the street.\n\nAlice Munro, \"Walker Brothers Cowboy\"\n\n<Commentary>\nFollowing the disastrous outcome of the family business, the narrator's family ended up living in an impoverished town. What the narrator sees as fair enough in her surroundings does not lead to her mother's __________ with their new reality.","blanks":[{"label":"빈칸","context":"does not lead to her mother's ___ with their new reality"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"어머니가 새 현실을 받아들이는 것과 반대되는 개념 → 수용/화해를 의미하는 명사\n- commentary: 'does not lead to her mother's ___ with their new reality' — 빈칸은 mother's + 명사\n- 지문에 직접 등장한 단어여야 함 — passage-bound 규칙\n- 'no reconciliation'이 지문 본문에 명시됨 — 부정 구문이지만 단어 자체는 지문에 존재","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'the only way to take this... is with dignity, with bitterness, with no reconcili...' [paraphrase]\n→ does not lead to her mother's ___ with their new reality\n\n'What the narrator sees as fair enough in her surroundings' [structural]\n→ two movie theatres, Venus Restaurant, Woolworths — narrator는 괜찮다고 봄","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- acceptance: ✗ (지문에 등장하지 않는 단어 — passage-bound 규칙 위반)\n- adaptation: ✗ (지문에 등장하지 않는 단어)\n- reconciliation: ✓ (정답)","key_terms":["reconciliation"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: reconciliation\n\n[content] 지문에 'the only way to take this... is with dignity, with bitterness, with no reconciliation'이 명시됨. Commentary의 'does not lead to ___ with their new reality'는 이를 직접 paraphrase\n→ 근거: \"the only way to take this, as she sees it, is with dignity, with bitterness, with no reconciliation.\"","key_terms":["reconciliation"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① Commentary의 빈칸은 passage에서 직접 찾는다 — 특히 부정 표현(no reconciliation) 안에 정답이 숨어 있을 수 있음\n② 밑줄 설명 문제: 화자가 부정적으로 느끼는 이유를 계층적 긴장(class tension)과 소속감 상실로 연결\n③ 어머니의 행동 기술에 집중 — 평가(판단)가 아닌 묘사로 서술\n\n함정:\n- 지문에 없는 단어(acceptance, adjustment)를 답으로 쓰는 오류\n- 밑줄 분석 시 어머니의 심리만 서술하고 화자(딸)의 심리를 빠뜨리는 오류","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"serenely","pos":"adv.","definition_ko":"평온하게, 태연하게"},{"word":"flaunting","pos":"adj.","definition_ko":"과시하는"},{"word":"loathe","pos":"v.","definition_ko":"혐오하다, 몹시 싫어하다"},{"word":"reconciliation","pos":"n.","definition_ko":"화해, 수용, 받아들임"},{"word":"universal ridicule","pos":"n. phrase","definition_ko":"모든 이의 조롱"},{"word":"calamity","pos":"n.","definition_ko":"재난, 재앙"},{"word":"pelt","pos":"n.","definition_ko":"모피, 가죽"},{"word":"claw-footed tub","pos":"n.","definition_ko":"발톱 모양 발이 달린 욕조 (고급 욕실의 상징)"}],"translation":"지난겨울까지만 해도 우리는 자체 사업을 운영하고 있었다. 여우 농장이었다. 아버지는 은여우를 키워 그 털가죽을 망토나 코트, 머프를 만드는 사람들에게 팔았다. 가격이 떨어졌고, 아버지는 내년엔 나아질 거라 기대하며 버텼다. 가격은 다시 떨어졌고, 아버지는 또 한 해, 또 한 해를 버텼다. 마침내 더는 버티는 것이 불가능해졌을 때, 우리는 사료 회사에 모든 것을 빚지게 되었다. 어머니가 이 이야기를 여러 번 설명하는 것을 들었다. 이야기를 들어주는 유일한 이웃인 올리팬트 부인에게. (올리팬트 부인도 세상에서 내려온 처지였다. 교사였다가 학교 관리인과 결혼했으니.) 우리는 있는 것을 다 쏟아부었지만 빈손으로 나왔다고 어머니는 말했다. 요즘에는 많은 사람이 같은 말을 할 수 있겠지만, 어머니에게는 나라 전체의 재난을 생각할 여유가 없었다. 오로지 우리 가족의 것만. <span class=\"trans-hl\">운명은 우리를 가난한 사람들의 거리로 내던졌고</span>(예전에도 가난했다는 것은 중요하지 않았다. 그것은 다른 종류의 가난이었으니), 어머니의 눈에 이것을 받아들이는 유일한 방식은 <span class=\"trans-hl\">품위 있게, 씁쓸하게, 어떠한 화해도 없이</span> 임했다. 발톱 모양 발이 달린 욕조와 수세식 화장실이 있는 욕실도 어머니를 위로하지 못했다. 수돗물도, 집 앞으로 난 포도도, 유리병에 배달되는 우유도, 심지어 두 개의 영화관과 비너스 레스토랑과 선풍기로 식힌 구석구석에서 살아 있는 새들이 노래하고 손톱만 한 크기에 달빛처럼 빛나는 물고기들이 초록 어항 속을 헤엄치는 그 경이로운 울워스 잡화점도. 어머니는 관심이 없었다.\n\n오후가 되면 어머니는 종종 사이먼 식료품점까지 걸어가면서 나를 데려가 짐을 들게 했다. 어머니는 예쁜 원피스를 입었다. 작은 꽃무늬가 있는 감색의 얇은 원단으로, 감색 슬립 위에 걸쳤다. 흰 밀짚 모자도 썼는데, 머리 한쪽으로 눌러쓴 것이었다. 그리고 내가 방금 뒷계단에서 신문지 위에 흰색으로 닦아놓은 흰 구두도. 나는 갓 말아올린 긴 머리를 하고 있었는데, 다행히 건조한 공기에 곧 풀릴 촉촉한 컬이었다. 머리 위에는 크고 빳빳한 리본을 달았다. 이것은 저녁 식사 후 아버지와 함께 외출하는 것과는 완전히 달랐다. <span class=\"trans-hl\">집 두 채를 채 지나기도 전에 나는 우리가 모든 이의 조롱거리가 되었다는 느낌을 받았다.</span> 심지어 보도에 분필로 쓰인 상스러운 낙서들도 우리를 비웃는 것 같았다. 어머니는 그것을 알아채지 못하는 것 같았다. 어머니는 <span class=\"trans-hl\">귀부인처럼 쇼핑하듯 태연하게 걸었다</span>. 팔 밑이 찢어진 헐렁하고 벨트 없는 원피스를 입은 주부들 곁을 지나면서. 나는 그녀의 작품이었다. 지저분한 컬머리와 눈에 띄는 리본, 닦인 무릎과 흰 양말 — 내가 되고 싶지 않은 모든 것. 어머니가 공공장소에서 내 이름을 부를 때, 나는 내 이름조차 <span class=\"trans-hl\">혐오스러웠다</span>. 그 목소리는 너무나 높고 자랑스럽고 쩌렁쩌렁해서, 의도적으로 거리의 어떤 다른 어머니의 목소리와도 달랐다."},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"reconciliation"}],"essay_content":"The narrator feels negative because her mother's refined appearance visibly marks them as outsiders in their poor neighborhood. While the narrator wants to blend in with the community, her mother insists on maintaining class distinction, making them conspicuous targets of mockery. This forces the narrator to experience shame and a loss of belonging.","scoring_criteria":[{"criterion":"빈칸 — reconciliation","points":1},{"criterion":"어머니의 차림새가 가난한 동네에서 튀어 조롱의 대상이 된다는 내용","points":1.5},{"criterion":"화자가 동네에 동화되고 싶은데 어머니의 태도로 수치심/소외감을 느낀다는 내용","points":1.5}]},"variants":[{"label":"답안 A","source_type":"variant","content":"The narrator feels ashamed because her mother's overdressed appearance stands out among the poor neighbors, drawing unwanted attention. The narrator wishes to blend into the community but is forced to appear conspicuously different, causing her to feel ridiculed and alienated."},{"label":"답안 B","source_type":"variant","content":"The narrator is embarrassed by how conspicuously different she and her mother look compared to the neighbors. Her mother's refusal to adapt to their new circumstances highlights the gap between them and the community, making the narrator feel like an object of mockery rather than a member of the neighborhood."}]},"source":{"references":[{"type":"short_story","author":"Munro, Alice","title":"Walker Brothers Cowboy","year":1968,"publisher":"Dance of the Happy Shades, McGraw-Hill Ryerson","pages":"","excerpt":""}],"concept_explanation":"Alice Munro의 「Walker Brothers Cowboy」는 캐나다 대공황 시대를 배경으로 한 단편소설. 어린 딸인 화자의 시점에서 계급 하락을 받아들이지 못하는 어머니와, 새 환경에 동화되고 싶은 화자 사이의 긴장을 그린다. 어머니의 '품위 유지'는 일종의 계급 저항이지만, 딸에게는 수치심과 소외감의 원천이 된다. 핵심 대비: 어머니의 dignity(자존심) ↔ 딸의 belonging(소속감). 지문 키워드: 'with no reconciliation' — 어머니는 현실과의 화해를 거부."},"related":{"enabled":false,"questions":[]}},"general_2026_A11.json":{"meta":{"id":"general_2026_A11","year":2026,"number":"A-11","subject":"general","linguistics_domain":"","question_type":"essay","score":4,"tags":["film theory","Balázs","close-up","soliloquy","mental loneliness","crowded solitude"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the ONE most appropriate word from the passage. Then explain what the underlined part means in the context of the passage. Do NOT copy more than FOUR consecutive words from the passage.","passage":"The modern stage no longer uses the spoken soliloquy, although without it the characters are silenced just when they are the most sincere, the least hampered by convention: when they are alone. The public of today will not tolerate the spoken soliloquy, allegedly because it is \"unnatural.\" Now the film has brought us the silent soliloquy, in which a face can speak with the subtlest shades of meaning without appearing unnatural and arousing the distaste of the spectators. In this silent monologue the solitary human soul can find a tongue more candid and uninhibited than in any spoken soliloquy, for it speaks instinctively, subconsciously. The language of the face cannot be suppressed or controlled. However disciplined and practisedly hypocritical a face may be, in the enlarging __________ we see even that it is concealing something, that is looking a lie. For such things have their own specific expressions superimposed on the feigned one. It is much easier to lie in words than with the face and the film has proved it beyond doubt.\n\nIn the film the mute soliloquy of the face speaks even when the hero is not alone, and herein lies a new great opportunity for depicting man. The poetic significance of the soliloquy is that it is a manifestation of mental, not physical, loneliness. Nevertheless, on the stage a character can speak a monologue only when there is no one else there, even though a character might feel a thousand times more lonely if alone among a large crowd. The monologue of loneliness may raise its voice within him a hundred times even while he is audibly talking to someone. Hence the most deep-felt human soliloquies could not find such expression, for the close-up can lift a character out of the heart of the greatest crowd and show how solitary it is in reality and what it feels in this crowded solitude.\n\nThe film, especially the sound film, can separate the words of a character talking to others from the mute play of features by means of which, in the middle of such a conversation, we are made to overhear a mute soliloquy and realize the difference between this soliloquy and the audible conversation. What a flesh-and-blood actor can show on the real stage is at most that his words are insincere and it is a mere convention that the partner in such a conversation is blinded to what every spectator can see. But in the isolated close-up of the film we can see to the bottom of a soul by means of such tiny movements of facial muscles which even the most observant partner would never perceive.\n\n— Béla Balázs, Theory of the Film","blanks":[{"label":"빈칸","context":"in the enlarging ___ we see even that it is concealing something"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"'enlarging(확대하는) ___' — 얼굴을 확대하여 내면을 드러내는 영화 기법 → 명사 형태 필요\n- 빈칸 앞: 'in the enlarging' — 확대되는 무언가 = 영화 기술 용어\n- 지문 2단락에 'close-up'이 명시적으로 등장 — passage-bound 확인\n- 단수 명사 형태 필요 (in the enlarging ___)","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'in the enlarging ___' [paraphrase]\n→ the isolated close-up of the film (2단락 및 3단락에서 반복)\n\n'무대 독백: 물리적으로 혼자일 때만 가능' [antonym]\n→ 클로즈업: 군중 속에서도 정신적 고독 포착 가능","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- shot: ✗ (지문에 등장하지 않는 단어)\n- image: ✗ (지문에 등장하지 않는 단어)\n- close-up: ✓ (정답)","key_terms":["close-up"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: close-up\n\n[content] 1단락 'in the enlarging ___'과 2단락 'the close-up can lift a character'가 동일 기법을 지칭. 3단락에서도 'isolated close-up'으로 반복\n→ 근거: \"the close-up can lift a character out of the heart of the greatest crowd\"\n\n[form] 'enlarging'은 close-up의 핵심 속성 — 얼굴을 확대(enlarge)하여 보여주는 기법\n→ 근거: \"in the enlarging __________ we see even that it is concealing something\"","key_terms":["close-up"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① 빈칸의 수식어(enlarging)가 정답을 가리키는 핵심 단서 — 확대하는 기법 = close-up\n② 밑줄 설명: 지문 전체의 핵심 대비 구조(무대 독백 vs. 클로즈업)를 먼저 파악한 뒤, 밑줄이 그 대비의 어느 지점에 위치하는지 서술\n③ 4단어 초과 연속 인용 금지 — 핵심어만 따옴표 처리\n\n함정:\n- 밑줄 설명에서 'crowded solitude'의 의미를 단순히 번역하는 오류 — 맥락 속 의미로 풀어써야 함\n- close-up과 shot을 혼동하는 오류 — shot은 지문에 없음","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"soliloquy","pos":"n.","definition_ko":"독백 — 혼자 속마음을 드러내는 연극적 장치"},{"word":"hampered","pos":"adj.","definition_ko":"방해받는, 제약받는"},{"word":"candid / uninhibited","pos":"adj.","definition_ko":"솔직한 / 억제되지 않은"},{"word":"practisedly hypocritical","pos":"adv.+adj.","definition_ko":"위선을 숙달한 듯한"},{"word":"superimposed","pos":"adj.","definition_ko":"덧씌워진 — 가장된 표정 위에 진짜 감정 중첩"},{"word":"feigned","pos":"adj.","definition_ko":"꾸며낸, 가장한"},{"word":"mute","pos":"adj.","definition_ko":"말없는, 무언의"},{"word":"manifestation","pos":"n.","definition_ko":"발현, 표출"},{"word":"crowded solitude","pos":"n. phrase","definition_ko":"군중 속 고독 (역설적 표현)"}],"translation":"현대 무대는 더 이상 구어 독백을 사용하지 않는다. 그러나 독백 없이는, 인물들이 가장 진솔하고 가장 관습에 얽매이지 않을 때, 즉 혼자 있을 때, 침묵을 강요받는다. 오늘날의 관객은 구어 독백을 용납하지 않으려 한다. 표면적으로는 그것이 '부자연스럽다'는 이유에서다. 이제 영화는 우리에게 <span class=\"trans-hl\">침묵의 독백</span>을 가져다주었다. 그 안에서 얼굴은 부자연스럽게 보이거나 관객의 반감을 사지 않고도 가장 미묘한 의미의 뉘앙스를 담아 말할 수 있다. 이 침묵의 독백 속에서 고독한 인간의 영혼은 어떤 구어 독백보다도 더 솔직하고 억제되지 않은 언어를 찾아낼 수 있다. 본능적으로, 무의식적으로 말하기 때문이다. <span class=\"trans-hl\">얼굴의 언어는 억누르거나 통제할 수 없다.</span> 아무리 절제되고 위선을 숙달한 듯한 얼굴일지라도, 확대된 클로즈업 안에서는 무언가를 숨기고 있다는 것, 거짓을 바라보고 있다는 것이 드러난다. 그런 것들은 가장된 표정 위에 덧씌워진 고유한 표정을 지니기 때문이다. 말로 거짓말하는 것이 얼굴로 거짓말하는 것보다 훨씬 쉽다는 것을 영화는 의심할 여지 없이 증명해왔다.\n\n영화에서 얼굴의 무언 독백은 주인공이 혼자가 아닐 때도 말한다. 바로 여기에 인간을 묘사하는 새로운 위대한 기회가 존재한다. 독백의 시적 의미는 그것이 신체적이 아닌 <span class=\"trans-hl\">정신적 고독의 발현</span>이라는 점에 있다. 그럼에도 불구하고, 무대에서는 다른 사람이 없을 때만 독백이 가능하다. 비록 군중 속에 홀로 있을 때 천 배는 더 외로울지라도. 고독의 독백은 누군가와 소리 내어 대화하는 중에도 내면에서 수백 번 목소리를 높일 수 있다. 그래서 가장 깊이 느껴지는 인간의 독백은 제대로 표현될 수 없었다. <span class=\"trans-hl\">클로즈업은 인물을 가장 큰 군중의 한가운데서 끌어올려, 그것이 실제로 얼마나 고독한지, 그리고 이 군중 속 고독 안에서 무엇을 느끼는지를 보여줄 수 있기 때문이다.</span>\n\n영화, 특히 유성영화는 타인과 대화하는 인물의 말과, 그 대화 도중 우리가 무언 독백을 엿듣게 해주는 표정 연기를 분리할 수 있다. 이를 통해 이 무언 독백과 소리로 오가는 대화 사이의 차이를 인식하게 된다. 실제 무대에서 살과 피를 가진 배우가 보여줄 수 있는 것은 기껏해야 자신의 말이 진심이 아니라는 것뿐이며, 대화 상대가 모든 관객에게 보이는 것을 보지 못한다는 것은 하나의 관습일 뿐이다. 그러나 <span class=\"trans-hl\">영화의 고립된 클로즈업 안에서, 아무리 예리한 상대방도 결코 포착하지 못할 안면 근육의 미세한 움직임을 통해 우리는 한 영혼의 밑바닥까지 들여다볼 수 있다.</span>"},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"close-up"}],"essay_content":"The close-up singles out a character from the surrounding crowd, revealing inner emotional isolation — a mental loneliness that stage soliloquy, requiring physical solitude, cannot capture.","scoring_criteria":[{"criterion":"빈칸 — close-up","points":1},{"criterion":"군중 속에서도 인물을 고립시켜 보여준다는 내용","points":1.5},{"criterion":"정신적(내면적) 고독을 드러낸다는 내용","points":1.5}]},"variants":[{"label":"답안 A","source_type":"variant","content":"It means the close-up exposes a character's inner isolation even when surrounded by others, revealing mental loneliness that stage soliloquy cannot express."},{"label":"답안 B","source_type":"variant","content":"The close-up reveals psychological solitude even in a crowd — capturing mental loneliness that the stage monologue, requiring physical isolation, cannot show."}]},"source":{"references":[{"type":"book","author":"Balázs, B.","title":"Theory of the Film: Character and Growth of a New Art","year":1952,"publisher":"Dennis Dobson, London","pages":"Ch. 5: The Close-up","excerpt":"\"In the <span class=\"ref-hl\">close-up</span> the <span class=\"ref-hl\">human face</span> itself speaks… the <span class=\"ref-hl\">soul appears on its surface</span> and what is within becomes visible without.\""},{"type":"textbook","author":"Stam, R.","title":"Film Theory: An Introduction","year":2000,"publisher":"Blackwell","pages":"pp. 45–52","excerpt":""}],"concept_explanation":"Béla Balázs의 클로즈업 이론: 영화의 클로즈업은 인물의 얼굴을 확대하여 내면을 가시화하는 기법이다. Balázs는 무대와 영화를 다음과 같이 대비한다.\n\n무대 독백: 물리적으로 혼자일 때만 가능 → 정신적 고독을 표현하는 데 한계\n영화 클로즈업: 군중 속에 있어도 인물을 고립시켜 내면의 정신적 고독을 포착 가능\n\n핵심 대비 구조:\n- spoken soliloquy(구어 독백) ↔ silent soliloquy / mute face(침묵의 독백)\n- physical solitude(물리적 고독) ↔ mental loneliness(정신적 고독)\n- stage(무대의 한계) ↔ close-up(영화의 확장된 가능성)\n\n'crowded solitude'(군중 속 고독)은 클로즈업만이 포착 가능한 역설적 상태를 의미한다."},"related":{"enabled":false,"questions":[]}},"general_2026_B02.json":{"meta":{"id":"general_2026_B02","year":2026,"number":"B-2","subject":"general","linguistics_domain":"","question_type":"short_answer","score":2,"tags":["poetry","Li-Young Lee","Eating Alone","solitude","grief","memory"],"parse_source":"2026_전공B_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Complete the commentary below by filling in the blank with the ONE most appropriate word from the poem.","passage":"I've pulled the last of the year's young onions.\nThe garden is bare now. The ground is cold,\nbrown and old. What is left of the day flames\nin the maples at the corner of my\neye. I turn, a cardinal vanishes.\nBy the cellar door, I wash the onions,\nthen drink from the icy metal spigot.\n\nOnce, years back, I walked beside my father\namong the windfall pears. I can't recall\nour words. We may have strolled in silence. But\nI still see him bend, that way—left hand braced\non knee, creaky—to lift and hold to my\neye a rotten pear. In it, a hornet\nspun crazily, glazed in slow, glistening juice.\n\nIt was my father I saw this morning\nwaving to me from the trees. I almost\ncalled to him, until I came close enough\nto see the shovel, leaning where I had\nleft it, in the flickering, deep green shade.\n\nWhite rice steaming, almost done. Sweet green peas\nfried in onions. Shrimp braised in sesame\noil and garlic. And my own loneliness.\nWhat more could I, a young man, want.\n\nLi-Young Lee, \"Eating Alone\"\n\n<Commentary>\nWhile harvesting the last vegetables, the speaker's memory blends into the garden and brings to life a scene from the past when he walked there with his father. The poem transforms a moment of __________ into a form of reflection and remembrance, showing how ordinary things—onions, pears, and a shovel—keep emotional connections alive.","blanks":[{"label":"빈칸","context":"transforms a moment of ___ into a form of reflection"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"성찰과 추억으로 변환되는 '어떤 순간' → 홀로 있는 상태/고독을 뜻하는 명사\n- commentary: 'a moment of ___' — 명사 형태 필요\n- 지문(시)에 직접 등장한 단어여야 함 — passage-bound 규칙\n- 마지막 연에 'my own loneliness'가 명시적으로 등장","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'And my own loneliness. (마지막 연)' [paraphrase]\n→ transforms a moment of ___ into a form of reflection and remembrance\n\n'혼자 정원에서 채소를 수확하고 혼자 식사를 준비하는 화자' [structural]\n→ Commentary: moment of ___ — 고독한 순간","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- grief: ✗ (지문에 'grief'라는 단어가 직접 등장하지 않음)\n- loneliness: ✓ (정답)\n- solitude: ✓ (정답)","key_terms":["loneliness","solitude"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: solitude\n\n[content] 마지막 연에 'And my own loneliness.'가 명시됨. Commentary의 blank target은 이 감정 상태를 지칭. solitude와 loneliness 모두 시에서 지지되지만, 채점 기준상 solitude가 모범답안\n→ 근거: \"And my own loneliness.\"\n\n[context_flow] 혼자 마지막 채소를 수확하고, 아버지의 환영을 보고, 홀로 식사를 준비하는 전체 맥락이 '고독한 순간'을 구성\n→ 근거: \"I've pulled the last of the year's young onions. / The garden is bare now.\"","key_terms":["solitude"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① 시에서 빈칸은 지문(시)에 등장한 단어를 찾는다 — passage-bound 원칙\n② Commentary의 '변환(transforms)' 구조 파악: X → reflection/remembrance. X = 시가 다루는 핵심 감정 상태\n③ 마지막 연에 정답 단서가 집중되는 경우가 많음 — 결말 연 우선 확인\n\n함정:\n- grief, loss, mourning 등 지문에 없는 단어로 답하는 오류\n- loneliness도 정답으로 인정 가능 — 채점 기준 확인 필요","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"windfall pears","pos":"n.","definition_ko":"바람에 떨어진 배"},{"word":"cardinal","pos":"n.","definition_ko":"홍관조 (붉은 새)"},{"word":"spigot","pos":"n.","definition_ko":"수도꼭지, 마개"},{"word":"glistening","pos":"adj.","definition_ko":"반짝이는"},{"word":"creaky","pos":"adj.","definition_ko":"삐걱거리는, 노쇠한 듯한"},{"word":"hornet","pos":"n.","definition_ko":"말벌"},{"word":"braise","pos":"v.","definition_ko":"약한 불로 천천히 조리다 (braised)"}],"translation":"나는 올해의 마지막 어린 양파를 뽑아냈다.\n정원은 이제 텅 비었다. 땅은 차갑고,\n갈색으로 낡았다. <span class=\"trans-hl\">하루의 남은 빛이 불꽃처럼</span>\n내 눈 가장자리 단풍나무에 타오른다.\n나는 고개를 돌렸고, 홍관조 한 마리가 사라진다.\n지하실 문 옆에서, 나는 양파를 씻고,\n그러고 나서 차가운 금속 수도꼭지에서 물을 마신다.\n\n한때, 몇 년 전, <span class=\"trans-hl\">나는 아버지 곁에서 걸었다</span>\n바람에 떨어진 배들 사이에서. 우리가 나눈\n말은 기억나지 않는다. 우리는 침묵 속에 거닐었는지도 모른다. 하지만\n나는 여전히 그가 그런 식으로 몸을 굽히는 것을 본다 — 왼손을\n무릎에 짚고, 삐걱거리며 — 썩은 배를 들어\n내 눈앞에 가져다 대기 위해. 그 안에서 말벌 한 마리가\n느리고 반짝이는 즙 속에 유리처럼 굳은 채 미칠 듯이 빙글빙글 돌고 있었다.\n\n오늘 아침 나무들 사이에서 나에게\n손을 흔들던 것은 바로 아버지였다. 나는 거의\n그를 불렀다, 가까이 다가가서야\n삽을 볼 수 있을 때까지. 내가 두고 온 그 삽이\n<span class=\"trans-hl\">흔들리는 짙은 초록 그늘 속에</span> 기대어 서 있었다.\n\n<span class=\"trans-hl\">흰 쌀밥이 김을 올리며, 거의 다 됐다. 달콤한 완두콩이\n양파와 함께 볶아진다. 새우가 참기름과\n마늘에 졸여진다. 그리고 나 자신의 고독.</span>\n젊은 남자인 내가, 이보다 무엇을 더 원할 수 있겠는가."},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"solitude"}],"essay_content":"","scoring_criteria":[{"criterion":"solitude (또는 loneliness)","points":2}]},"variants":[]},"source":{"references":[{"type":"poetry","author":"Lee, Li-Young","title":"Eating Alone","year":1986,"publisher":"Rose, BOA Editions","pages":"","excerpt":""}],"concept_explanation":"Li-Young Lee의 「Eating Alone」: 혼자 식사를 준비하는 일상적 순간이 돌아가신 아버지에 대한 기억과 애도로 자연스럽게 연결된다. solitude(고독)는 단순한 외로움이 아니라 성찰(reflection)과 추억(remembrance)의 공간이 된다.\n\n시의 구조:\n- 1연: 현재 — 텅 빈 정원, 마지막 양파 수확 → 고독한 현재\n- 2연: 과거 — 아버지와 함께 걷던 기억 → 썩은 배 속의 말벌\n- 3연: 환각/환영 — 아버지의 모습이 삽으로 대체 → 상실의 확인\n- 4연: 현재 — 혼자 식사 준비, '나 자신의 고독' 직접 언급\n\n핵심 이미지: 양파, 썩은 배, 삽 — 평범한 사물들이 감정적 연결을 유지하는 매개체."},"related":{"enabled":false,"questions":[]}},"general_2026_B03.json":{"meta":{"id":"general_2026_B03","year":2026,"number":"B-3","subject":"general","linguistics_domain":"","question_type":"essay","score":4,"tags":["short story","Jhumpa Lahiri","arranged marriage","immigrant","intimacy"],"parse_source":"2026_전공B_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Complete the commentary below by filling in the blank with the ONE most appropriate word from the excerpt. Then explain why the narrator recalls as described in the underlined part.","passage":"At the end of August, Mala's passport and green card were ready. I received a telegram with her flight information; my brother's house in Calcutta had no telephone. Around that time I also received a letter from her, written only a few days after we had parted. There was no salutation; addressing me by name would have assumed an intimacy we had not yet discovered. It contained only a few lines. 'I write in English in preparation for the journey. Here I am very much lonely. Is it very cold there. Is there snow. Yours, Mala.'\n\nI was not touched by her words. We had spent only a handful of days in each other's company. And yet we were bound together; for six weeks she had worn an iron bangle on her wrist, and applied vermilion powder to the part in her hair, to signify to the world that she was a bride. In those six weeks I regarded her arrival as I would the arrival of a coming month, or season—something inevitable, but meaningless at the time. So little did I know her that, while details of her face sometimes rose to my memory, I could not conjure up the whole of it.\n\nA few days after receiving the letter, as I was walking to work in the morning, I saw an Indian woman on the other side of Massachusetts Avenue, wearing a sari with its free end nearly dragging on the footpath, and pushing a child in a stroller. An American woman with a small black dog on a leash was walking to one side of her. Suddenly the dog began barking. From the other side of the street I watched as the Indian woman, startled, stopped in her path, at which point the dog leapt up and seized the end of the sari between its teeth. The American woman scolded the dog, appeared to apologize, and walked quickly away, leaving the Indian woman to fix her sari in the middle of the footpath, and quiet her crying child.\n\nShe did not see me standing there, and eventually she continued on her way. Such a mishap, I realized that morning, would soon be my concern. It was my duty to take care of Mala, to welcome her and protect her. I would have to buy her her first pair of snow boots, her first winter coat. I would have to tell her which streets to avoid, which way the traffic came, tell her to wear her sari so that the free end did not drag on the footpath. A five-mile separation from her parents, I recalled with some irritation, had caused her to weep.\n\nJhumpa Lahiri, \"The Third and Final Continent\"\n\n<Commentary>\nThis excerpt encapsulates particular experiences immigrants may have regarding arranged marriages. The narrator spent only a short period of time with his wife before leaving his hometown in India. Despite nuptial ties, the lack of __________ makes him insensitive to his wife's upcoming arrival.","blanks":[{"label":"빈칸","context":"the lack of ___ makes him insensitive"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"결혼 관계가 있음에도 아내에게 무감각한 이유 → 두 사람 사이에 아직 없는 것 → 친밀감을 의미하는 명사\n- commentary: 'the lack of ___' — 명사 형태 필요\n- 지문에 직접 등장한 단어여야 함 — passage-bound 규칙\n- 1단락에 'addressing me by name would have assumed an intimacy we had not yet discovered'가 명시적으로 등장","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'addressing me by name would have assumed an intimacy we had not yet discovered' [paraphrase]\n→ the lack of ___ makes him insensitive to his wife's upcoming arrival\n\n'I was not touched by her words. / I could not conjure up the whole of it.' [synonym]\n→ makes him insensitive to his wife's upcoming arrival","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- love: ✗ (지문에 등장하지 않는 단어)\n- connection: ✗ (지문에 등장하지 않는 단어)\n- intimacy: ✓ (정답)","key_terms":["intimacy"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: intimacy\n\n[content] 1단락에 'an intimacy we had not yet discovered'가 명시됨. 편지에서 이름을 쓰지 못한 것이 바로 친밀감 부재의 증거\n→ 근거: \"addressing me by name would have assumed an intimacy we had not yet discovered.\"\n\n[context_flow] 2단락의 'I was not touched by her words', 'I could not conjure up the whole of it'도 intimacy의 부재를 일관되게 보여줌\n→ 근거: \"I was not touched by her words.\"","key_terms":["intimacy"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① Commentary의 빈칸은 지문 첫 단락에서 직접 찾는다 — 도입부에 정답 단어가 집중되는 패턴\n② 밑줄 설명: 화자가 '짜증스럽게(with some irritation)' 회상하는 이유를 intimacy 부재와 연결\n③ 인물 관계의 감정적 거리를 서술할 때 지문 속 행동(편지 서두 없음, 감동 없음)을 근거로 사용\n\n함정:\n- love, affection, bond 등 지문에 없는 단어로 답하는 오류\n- 밑줄 설명에서 Mala의 심리만 설명하고 화자의 감정적 거리를 빠뜨리는 오류\n- 화자가 의무감(duty)을 느끼는 것을 애정으로 해석하는 오류","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"salutation","pos":"n.","definition_ko":"인사말, 편지 서두의 호칭"},{"word":"vermilion","pos":"adj./n.","definition_ko":"진홍색 (힌두 결혼 표시 sindoor)"},{"word":"conjure up","pos":"phrasal v.","definition_ko":"(기억 속에서) 불러내다"},{"word":"mishap","pos":"n.","definition_ko":"사고, 불운한 일"},{"word":"nuptial","pos":"adj.","definition_ko":"결혼의, 혼례의"},{"word":"bangle","pos":"n.","definition_ko":"팔찌 (힌두 결혼 예식용 철 팔찌)"},{"word":"sari","pos":"n.","definition_ko":"사리 (인도 여성 전통 의상)"}],"translation":"8월 말, 말라의 여권과 영주권이 준비되었다. 나는 그녀의 항공편 정보가 담긴 전보를 받았다. 캘커타에 있는 형의 집에는 전화가 없었다. 그 무렵 나는 또한 그녀로부터 편지를 한 통 받았는데, 우리가 헤어진 지 불과 며칠 후에 쓴 것이었다. <span class=\"trans-hl\">편지에는 인사말이 없었다. 내 이름으로 부르는 것은 우리가 아직 발견하지 못한 친밀함을 전제하는 일이 될 터였다.</span> 편지에는 단 몇 줄만이 담겨 있었다. '여정을 준비하며 영어로 씁니다. 여기서 저는 매우 외롭습니다. 그곳은 많이 춥나요. 눈이 내리나요. 당신의, 말라.'\n\n나는 그녀의 말에 감동받지 않았다. 우리는 서로의 곁에서 겨우 며칠을 보냈을 뿐이었다. 그러나 우리는 묶여 있었다. 여섯 주 동안 그녀는 손목에 철 팔찌를 끼고, 자신이 신부임을 세상에 알리기 위해 머리 가름마에 진홍색 가루를 발랐다. <span class=\"trans-hl\">그 여섯 주 동안 나는 그녀의 도착을 다가오는 달이나 계절의 도래처럼 여겼다 — 필연적이지만 그 순간에는 의미 없는 무언가로.</span> 그녀를 너무나 조금밖에 알지 못해서, 때로 그녀의 얼굴의 세부적인 것들이 기억에 떠오르기도 했지만, 전체적인 모습을 불러낼 수는 없었다.\n\n편지를 받고 며칠 후, 아침에 출근길을 걷고 있을 때, 나는 매사추세츠 애비뉴 건너편에서 인도 여성을 한 명 보았다. 그녀는 끝자락이 보도 위에 거의 끌릴 것 같은 사리를 입고 유모차를 밀고 있었다. 목줄에 묶인 작은 검은 개를 데리고 걷던 미국 여성이 그녀 옆을 걷고 있었다. 갑자기 개가 짖기 시작했다. 나는 길 건너편에서 보았다. 깜짝 놀란 인도 여성이 가던 길을 멈추었고, 그 순간 개가 뛰어올라 사리 끝자락을 이빨로 물었다. 미국 여성은 개를 꾸짖고, 사과하는 듯 보이더니, 빠르게 걸어가버렸다. <span class=\"trans-hl\">인도 여성만 남아 보도 한가운데서 사리를 고쳐 입고 우는 아이를 달래야 했다.</span>\n\n그녀는 내가 거기 서 있는 것을 보지 못했고, 결국 자신의 길을 계속 걸어갔다. 그런 사고가 곧 내 일이 될 것임을 그날 아침 나는 깨달았다. <span class=\"trans-hl\">말라를 돌보고, 환영하고, 보호하는 것이 나의 의무였다.</span> 그녀에게 처음으로 방한화를, 처음으로 겨울 코트를 사주어야 할 것이었다. 어떤 길을 피해야 하는지, 교통이 어느 방향으로 오는지 알려주어야 할 것이었고, 사리 끝자락이 보도에 끌리지 않도록 입는 법도 알려주어야 할 것이었다. <span class=\"trans-hl\">부모와 겨우 5마일 떨어진 것만으로도 눈물을 흘렸다는 것을, 나는 약간의 짜증을 느끼며 떠올렸다.</span>"},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"intimacy"}],"essay_content":"The narrator recalls the Indian woman's struggle with irritation because the scene reminds him of Mala's vulnerability and dependence. Having spent little time with Mala and feeling no emotional bond, he views her needs as an obligation rather than a concern born of affection. The recollection reflects his emotional detachment from a wife he barely knows.","scoring_criteria":[{"criterion":"빈칸 — intimacy","points":1},{"criterion":"화자가 길거리 인도 여성을 보며 Mala 보호 의무를 느끼는 맥락 설명","points":1.5},{"criterion":"친밀감 부재로 인해 의무감은 있지만 감정적 연결이 없다는 내용","points":1.5}]},"variants":[{"label":"답안 A","source_type":"variant","content":"The narrator recalls this detail with irritation because, lacking intimacy with Mala, he views her emotional fragility as an inconvenience rather than something to empathize with. Watching the Indian woman struggle made him think of Mala's dependence, but his emotional distance prevents genuine concern."},{"label":"답안 B","source_type":"variant","content":"The narrator recalls Mala's weeping over a small separation with irritation because he has no emotional bond with her. The Indian woman's mishap makes him aware of his duty to protect Mala, but this awareness is practical, not emotional — reflecting the lack of intimacy between them."}]},"source":{"references":[{"type":"short_story","author":"Lahiri, Jhumpa","title":"The Third and Final Continent","year":1999,"publisher":"Interpreter of Maladies, Houghton Mifflin","pages":"","excerpt":""}],"concept_explanation":"Jhumpa Lahiri의 「The Third and Final Continent」: 인도에서 영국을 거쳐 미국으로 이민 온 남성 화자가 중매결혼으로 맺어진 아내 말라와 점차 친밀감을 형성해가는 과정을 그린 단편소설. 이 지문은 아직 친밀감이 형성되지 않은 초반부로, 화자가 아내를 감정적 연결이 없는 낯선 사람으로 바라보는 시각을 보여준다.\n\n핵심 구조: 친밀감 부재(lack of intimacy) → 무감각(insensitivity) → 의무감(duty)만 존재\n\n편지의 'no salutation'은 두 사람 사이의 심리적 거리를 상징하는 장치. 인도 여성 에피소드는 화자가 의무를 인식하는 계기이지만, 그 인식이 감정이 아닌 책임감에서 비롯됨을 보여준다."},"related":{"enabled":false,"questions":[]}},"general_2026_B07.json":{"meta":{"id":"general_2026_B07","year":2026,"number":"B-7","subject":"general","linguistics_domain":"","question_type":"essay","score":4,"tags":["causation","Newton","force","science philosophy","storytelling framework"],"parse_source":"2026_전공B_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the ONE most appropriate word from the passage. Then explain what the underlined part means in the context of the passage. Do NOT copy more than FOUR consecutive words from the passage.","passage":"Science is a rich source of powerful explanatory stories. For example, Newton explained how a force causes a mass to accelerate. This gives us a story of how an apple drops from a tree and a planet circles the sun. It allows us to decide how hard the rocket engine needs to push to get it to the moon. Models of causation let us design complex machines, like factories and computers, that have fabulously long chains of causes and effects. They convert inputs into the outputs we want.\n\nIt's tempting to believe that our stories of causes and effects are how the world works. Actually, they're just a framework we use to manipulate the world and construct explanations for the convenience of our own understanding. For example, Newton's equation F = ma doesn't really say that force causes acceleration, any more than it says that mass causes force. We tend to think of force as __________, because we often have the choice as to whether to apply it or not. On the other hand, we tend to think of mass as not being under our control. Thus, we personify nature, imagining it almost as if natural forces were deciding to push on masses. It's much harder for us to imagine accelerations deciding to cause mass, so we tell the story a certain way. We credit gravitational force for keeping the planets orbiting the sun and blame it for pulling the apple down from the tree.\n\nThis convenient personification of nature helps us use our mental storytelling machinery to explain the natural world. The cause-and-effect paradigm works particularly well when science is used for engineering, to arrange the world for our convenience. In this case, we can often set things up so that the illusion of cause-and-effect is almost a reality. The computer is a perfect example. The key to what makes a computer work is that the inputs affect the outputs but not vice versa. The components used to construct the computer are constructed to create that same one-way relationship. These components, such as logic gates, are specifically designed to convert contingent inputs into predictable outputs. In other words, the logic gates of the computer are constructed to be atomic building blocks of cause and effect.\n\nThe notion of cause and effect breaks down when the parts we would like to think of as outputs affect the parts we would prefer to think of as inputs. The paradoxes of quantum mechanics are a perfect example of this, where our mere observation of a particle can \"cause\" a distant particle to be in a different state. Of course there's no real paradox here, there's just a problem with trying to apply our storytelling framework to a situation where it doesn't match.","blanks":[{"label":"빈칸","context":"We tend to think of force as ___"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"빈칸은 force(힘)를 어떻게 인식하는지를 설명하는 형용사. mass(질량)와의 대비 구조에서 단서 포착.\n- 빈칸 뒤에 'because we often have the choice as to whether to apply it or not' → force는 우리가 선택하여 적용할 수 있는 것\n- mass와의 대비: 'mass as not being under our control' → force는 control 가능한 것\n- 지문 내 단어로만 답 선택 (passage-bound 규칙)","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'we often have the choice as to whether to apply it or not (force)' [antonym]\n→ mass as not being under our control\n\n'force → 우리가 선택하여 적용 가능' [structural]\n→ mass → 통제 불가","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- natural: ✗ (force를 natural(자연적)로 묘사하면 mass와의 대비가 성립하지 않음. 지문의 대비 구조와 불일치.)\n- active: ✗ (active는 빈칸 맥락과 유사하나 지문에 등장하지 않는 단어. passage-bound 규칙 위반.)\n- contingent: ✗ (지문에 등장하나 'contingent inputs'의 맥락에서 쓰여 '우연적·조건적'의 의미. force를 설명하는 빈칸 맥락(선택 가능성)과 맞지 않음.)\n- controllable: ✓ (정답)","key_terms":["controllable"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: controllable\n\n[content] 빈칸 바로 뒤 'because we often have the choice as to whether to apply it or not'이 controllable의 정의를 직접 제공함.\n→ 근거: \"we often have the choice as to whether to apply it or not\"\n\n[parallel] mass와의 대조 구조: 'mass as not being under our control' → force는 그 반대, 즉 under our control = controllable.\n→ 근거: \"we tend to think of mass as not being under our control\"\n\n[context_flow] 이후 'we personify nature, imagining it almost as if natural forces were deciding to push on masses'로 이어지는 흐름 — force를 의지를 가진 행위자로 보는 이유는 force가 인간이 통제 가능한 것처럼 느껴지기 때문.\n→ 근거: \"we personify nature, imagining it almost as if natural forces were deciding to push on masses\"","key_terms":["controllable"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① 대비 구조(A vs. not-A) 파악: 빈칸이 속한 개념과 대립하는 개념을 먼저 찾고, 대립 개념의 설명에서 빈칸 의미를 역추론한다.\n② Passage-bound 원칙: 답은 지문에 직접 등장한 단어여야 하며, 유의어 대체는 원칙적으로 불가.\n③ 빈칸 뒤에 오는 이유절(because/since)이 빈칸 답의 정의를 제공할 수 있으므로 반드시 확인한다.\n\n함정:\n- active, voluntary처럼 유의어이나 지문에 없는 단어를 선택하는 오류\n- F = ma의 수학적 해석에 집중하여 대비 구조를 놓치는 오류\n- mass와 force의 서술 위치를 혼동하여 반대 방향으로 추론하는 오류","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"personify","pos":"v.","definition_ko":"의인화하다","example":"we personify nature"},{"word":"contingent","pos":"adj.","definition_ko":"우연적인, 조건적인","example":"contingent inputs"},{"word":"atomic building blocks","pos":"n. phrase","definition_ko":"기본 구성 단위","example":"atomic building blocks of cause and effect"},{"word":"vice versa","pos":"adv.","definition_ko":"반대로도 마찬가지로","example":"inputs affect the outputs but not vice versa"},{"word":"paradigm","pos":"n.","definition_ko":"패러다임, 사고의 틀","example":"The cause-and-effect paradigm"},{"word":"fabulously","pos":"adv.","definition_ko":"믿을 수 없을 만큼, 엄청나게","example":"fabulously long chains of causes and effects"}],"translation":"과학은 강력한 설명적 이야기의 풍부한 원천이다. 예를 들어, 뉴턴은 힘이 어떻게 질량을 가속시키는지를 설명했다. 이로써 우리는 사과가 나무에서 떨어지고 행성이 태양 주위를 도는 이야기를 갖게 된다. 이는 로켓 엔진이 달까지 도달하기 위해 얼마나 세게 밀어야 하는지를 결정할 수 있게 해준다. 인과관계 모델 덕분에 우리는 공장이나 컴퓨터처럼 믿을 수 없을 만큼 긴 원인과 결과의 연쇄를 갖는 복잡한 기계를 설계할 수 있다. 이 기계들은 입력값을 우리가 원하는 출력값으로 변환한다.\n\n우리의 원인과 결과에 대한 이야기가 세상이 실제로 작동하는 방식이라고 믿고 싶어지는 것은 당연하다. 하지만 사실 그것은 단지 우리가 세상을 조작하고 우리 자신의 이해를 위한 편의상 설명을 구성하기 위해 사용하는 하나의 틀에 불과하다. 예를 들어, 뉴턴의 방정식 F = ma는 실제로 힘이 가속도를 유발한다고 말하는 것이 아니며, 이는 질량이 힘을 유발한다고 말하는 것이 아닌 것과 마찬가지다. 우리는 힘을 <span class=\"trans-hl\">통제 가능한 것으로 여기는 경향이 있는데, 왜냐하면 우리는 그것을 적용할지 말지를 종종 선택할 수 있기 때문이다.</span> 반면에 우리는 <span class=\"trans-hl\">질량을 우리의 통제하에 있지 않은 것으로 여기는 경향이 있다.</span> 따라서 우리는 자연을 의인화하여, 마치 자연의 힘이 질량을 밀기로 결정하는 것처럼 상상한다. 가속도가 질량을 유발하기로 결정한다고 상상하는 것은 우리에게 훨씬 더 어렵기 때문에, 우리는 이야기를 특정 방식으로 말한다. 우리는 중력이 행성들을 태양 주위로 공전하게 유지한다고 공로를 돌리고, 사과를 나무에서 끌어내린다고 비난한다.\n\n이러한 자연의 편리한 의인화는 우리가 자연 세계를 설명하기 위해 정신적 스토리텔링 기제를 사용하는 데 도움을 준다. 인과관계 패러다임은 특히 과학이 공학에 사용될 때, 즉 우리의 편의를 위해 세상을 정리할 때 잘 작동한다. 이 경우, 우리는 종종 원인과 결과의 환상이 거의 현실에 가까워지도록 상황을 설정할 수 있다. 컴퓨터는 완벽한 예이다. 컴퓨터를 작동시키는 핵심은 입력이 출력에 영향을 미치지만 그 반대는 아니라는 것이다. 컴퓨터를 구성하는 데 사용되는 부품들은 동일한 일방향 관계를 만들도록 설계된다. 논리 게이트와 같은 이 부품들은 우연적인 입력을 예측 가능한 출력으로 변환하도록 특별히 설계된다. 다시 말해, 컴퓨터의 논리 게이트는 원인과 결과의 원자적 구성 단위가 되도록 만들어진다.\n\n<span class=\"trans-hl\">원인과 결과의 개념은 우리가 출력으로 생각하고 싶은 부분이 우리가 입력으로 생각하고 싶은 부분에 영향을 미칠 때 무너진다.</span> 양자역학의 역설은 이것의 완벽한 예로, 입자에 대한 우리의 단순한 관찰이 멀리 떨어진 입자를 다른 상태에 있게 '유발'할 수 있다. 물론 여기에 진짜 역설은 없으며, 단지 우리의 스토리텔링 틀을 그것이 맞지 않는 상황에 적용하려는 시도에서 비롯된 문제가 있을 뿐이다."},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"controllable"}],"essay_content":"The underlined part means that the human cause-and-effect framework, which we use to explain the world conveniently, fails when applied to situations where it does not fit, such as quantum mechanics. In such cases, what appears to be a paradox is not a real contradiction in nature, but simply a limitation of our narrative framework.","scoring_criteria":[{"criterion":"빈칸 — controllable","points":1},{"criterion":"인과관계 스토리텔링 틀이 적용되지 않는 상황에서 문제가 생긴다는 내용","points":1.5},{"criterion":"역설이 세상 자체의 문제가 아니라 틀의 한계임을 설명","points":1.5}]},"variants":[{"label":"답안 A","source_type":"variant","content":"It means that when our causal storytelling framework is applied to domains like quantum mechanics, where outputs can influence inputs, it creates apparent contradictions. These are not true paradoxes but reflect the limits of applying a human-made explanatory framework to a situation it was not designed to handle."},{"label":"답안 B","source_type":"variant","content":"The underlined part refers to the human tendency to explain the world through cause-and-effect narratives. When this framework is applied to quantum phenomena — where observation affects distant particles — it appears paradoxical, but the paradox arises from the framework's inadequacy, not from nature itself."}]},"source":{"references":[],"concept_explanation":"인과관계 프레임워크: 인간은 세상을 원인→결과 구조로 이해하지만 이는 편의적 서사일 뿐이다. F=ma는 수학적 등식이며 인과 방향을 내포하지 않는다. 힘(force)을 '통제 가능한 것'으로, 질량(mass)을 '통제 불가능한 것'으로 인식하는 것은 우리의 경험적 편향에서 비롯된다. 양자역학에서의 '역설'은 세계 자체의 모순이 아니라, 고전적 인과관계 틀의 적용 한계를 보여주는 사례다."},"related":{"enabled":false,"questions":[]}},"general_2026_B10.json":{"meta":{"id":"general_2026_B10","year":2026,"number":"B-10","subject":"general","linguistics_domain":"","question_type":"essay","score":4,"tags":["summary writing","sport and environment","golf course","noise pollution","sustainability"],"parse_source":"2026_전공B_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Write a summary following the guidelines below.\n<Guidelines>\n∙Summarize the passage above in one paragraph.\n∙Provide a topic sentence, two supporting ideas, and a concluding sentence based on the passage.\n∙Do NOT copy more than FOUR consecutive words from the passage.","passage":"From children kicking a ball on a playground to the stars at a basketball court, sport is ubiquitous. Regardless of one's age, gender, or background, it is an important activity that not only improves physical health but also provides a recreational outlet for many people. Despite these advantages, the field of sport is under pressure due to its negative impacts on the environment.\n\nThe sport event itself is seen as environmentally challenging. The artificialization of the sport environment has an adverse effect on nature and the landscape in many ways. For instance, the rapid spread of golf courses into the green belts that encircle the major cities of the world increases many concerns. While many people, especially golfers, consider a well-manicured course a thing of beauty, its development has an environmental cost. Part of the natural landscape is destroyed, as the courses are built. In addition, huge amounts of chemical fertilizer are put into the soil to develop and then maintain the courses.\n\nIt is not solely sporting pursuits that have an impact on the environment. Major spectator sports and the associated stadia create problems in the adjacent area. Hundreds and thousands of plastic waste from bottles and food containers are generated in the stadium from crowd consumption and the concession stands nearby. Furthermore, noise emission from the arrival and departure of spectators puts a lot of strain in the area. In the case of football and rugby, the excessive cheering from the spectators and the loud music from the amplified speakers make an enormous amount of noise which lowers the environmental quality of the sport facilities in public spaces.\n\nCollectively, these issues raise concerns in maintaining a sustainable environment in the world of sport. Sport organizations should be more proactive to overcome these difficulties by pursuing policies to reduce the side effects on the environment. This will protect the long term viability and sustainability of sport.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"요약 쓰기 과제 — 지침 구조 확인 필수: topic sentence + 2개 supporting ideas + concluding sentence로 구성된 한 단락 작성. 4개 이상 연속 인용 금지.\n- 지침에 구조가 명시됨: topic sentence → supporting idea 1 → supporting idea 2 → concluding sentence\n- 한 단락(one paragraph)으로 작성\n- 4개 이상 연속 단어 인용 금지 — 핵심 내용을 자신의 언어로 재진술\n- 지문 밖 내용 추가 금지 — passage-bound 원칙","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'단락 1: sport is ubiquitous … negative impacts on the environment' [paraphrase]\n→ Topic sentence: 스포츠의 광범위한 혜택에도 불구하고 환경에 부정적 영향을 미침\n\n'단락 2: golf courses — landscape destruction + chemical fertilizer' [paraphrase]\n→ Supporting idea 1: 스포츠 시설 개발(골프장)이 자연 경관 파괴 및 토양 오염 유발\n\n'단락 3: plastic waste + noise emission from spectator sports' [paraphrase]\n→ Supporting idea 2: 관중 스포츠 행사에서 플라스틱 폐기물과 소음 공해 발생\n\n'단락 4: sport organizations … proactive … sustainability' [paraphrase]\n→ Concluding sentence: 스포츠 단체가 환경 정책을 적극 추진해 지속가능성을 확보해야 함","key_terms":[]},{"step":3,"label":"후보 소거","explanation":"- sport은 건강에 좋다 (topic sentence 후보): ✗ (지문 단락 1에서 건강 혜택은 도입부 배경 정보에 불과. 지문 전체 주제는 '스포츠의 환경적 부정 영향'이므로 topic sentence로 부적절.)\n- 지속가능성만을 supporting idea로 사용: ✗ (지속가능성은 지문 마지막 단락의 결론에 해당. supporting idea가 아니라 concluding sentence 내용.)\n- 골프장 + 관중 스포츠를 각각 별도 단락으로 작성: ✗ (지침이 '한 단락(one paragraph)'으로 명시. 여러 단락으로 나누면 지침 위반.)","key_terms":[]},{"step":4,"label":"확정 근거","explanation":"최종 정답: 4-sentence summary paragraph\n\n[content] Topic sentence 근거: 단락 1 마지막 문장 'the field of sport is under pressure due to its negative impacts on the environment'가 전체 주제를 제시함.\n→ 근거: \"the field of sport is under pressure due to its negative impacts on the environment\"\n\n[content] Supporting idea 1 근거: 단락 2에서 골프장 확산이 자연 경관 파괴와 화학 비료 사용으로 이어진다고 구체적으로 서술.\n→ 근거: \"Part of the natural landscape is destroyed … huge amounts of chemical fertilizer are put into the soil\"\n\n[content] Supporting idea 2 근거: 단락 3에서 관중 스포츠가 플라스틱 폐기물 및 소음 공해를 유발한다고 서술.\n→ 근거: \"Hundreds and thousands of plastic waste … noise emission from the arrival and departure of spectators\"\n\n[context_flow] Concluding sentence 근거: 단락 4에서 스포츠 단체의 선제적 환경 정책 추진과 지속가능성 보호를 촉구함.\n→ 근거: \"Sport organizations should be more proactive … This will protect the long term viability and sustainability of sport\"","key_terms":["4-sentence summary paragraph"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① 지침 구조 우선 확인: topic sentence / supporting ideas 개수 / concluding sentence 여부를 먼저 파악하고 작성 틀을 고정한다.\n② 단락 수 = 요약문 구성요소 수 대응 원칙: 지문의 각 단락이 요약문의 각 구성요소(TS, SI1, SI2, CS)와 대응하는 경우가 많다. 단락별 핵심 문장을 먼저 표시한다.\n③ 4단어 연속 인용 금지 준수: 핵심 내용은 동의어·paraphrase로 재진술. 고유명사(golf courses, plastic waste 등)는 그대로 사용 가능.\n③ Topic sentence는 지문 전체 주제를 포괄해야 한다 — 한 단락의 내용만 반영하면 감점.\n③ Concluding sentence는 단순 반복이 아닌 시사점 또는 해결 방향을 포함해야 한다.\n\n함정:\n- 도입부 배경 정보(스포츠의 건강 혜택)를 topic sentence로 삼는 오류 — 지문 전체 주제와 불일치\n- supporting idea를 3개 이상 나열하거나 concluding sentence를 생략하는 지침 위반\n- 지문 문장을 4단어 이상 그대로 옮기는 오류 — 채점 기준 위반\n- 지문에 없는 외부 정보(예: 기후변화, 탄소 배출)를 추가하는 오류","key_terms":[]}],"key_terms":[],"vocabulary":[{"word":"ubiquitous","pos":"adj.","definition_ko":"어디에나 있는, 편재하는","example":"sport is ubiquitous"},{"word":"artificialization","pos":"n.","definition_ko":"인공화, 인위적 변형","example":"The artificialization of the sport environment"},{"word":"manicured","pos":"adj.","definition_ko":"잘 다듬어진","example":"a well-manicured course"},{"word":"concession stand","pos":"n.","definition_ko":"매점","example":"the concession stands nearby"},{"word":"proactive","pos":"adj.","definition_ko":"선제적인, 적극적인","example":"be more proactive to overcome these difficulties"},{"word":"adjacent","pos":"adj.","definition_ko":"인접한, 인근의","example":"problems in the adjacent area"},{"word":"viability","pos":"n.","definition_ko":"실행 가능성, 지속 가능성","example":"the long term viability and sustainability of sport"}],"translation":"놀이터에서 공을 차는 아이들부터 농구 코트의 스타 선수들까지, 스포츠는 어디에나 존재한다. 나이, 성별, 배경에 관계없이, 스포츠는 신체 건강을 향상시킬 뿐만 아니라 많은 사람들에게 여가 활동의 출구를 제공하는 중요한 활동이다. 이러한 장점에도 불구하고, <span class=\"trans-hl\">스포츠 분야는 환경에 미치는 부정적인 영향으로 인해 압박을 받고 있다.</span>\n\n스포츠 행사 자체가 환경적으로 문제가 되는 것으로 여겨진다. 스포츠 환경의 인공화는 여러 면에서 자연과 경관에 악영향을 미친다. 예를 들어, 세계 주요 도시들을 둘러싸고 있는 녹지대로 골프 코스가 빠르게 확산되는 것은 많은 우려를 증가시킨다. 많은 사람들, 특히 골퍼들은 잘 관리된 코스를 아름다운 것으로 여기지만, 그 개발에는 환경적 비용이 따른다. <span class=\"trans-hl\">코스가 건설되면서 자연 경관의 일부가 파괴된다.</span> 또한, <span class=\"trans-hl\">코스를 개발하고 유지 관리하기 위해 토양에 막대한 양의 화학 비료가 투입된다.</span>\n\n환경에 영향을 미치는 것이 스포츠 활동만은 아니다. 주요 관중 스포츠와 관련 경기장들은 인근 지역에 문제를 일으킨다. 관중들의 소비와 인근 매점에서 발생하는 <span class=\"trans-hl\">병과 식품 용기에서 나온 수십만 개의 플라스틱 폐기물이 경기장에서 생성된다.</span> 게다가 관중들의 입퇴장으로 인한 소음 배출이 그 지역에 상당한 부담을 준다. 축구와 럭비의 경우, 관중들의 과도한 응원과 앰프 스피커에서 나오는 큰 음악이 엄청난 양의 소음을 만들어 공공장소의 스포츠 시설의 환경 질을 낮춘다.\n\n이러한 문제들은 전체적으로 스포츠 세계에서 지속 가능한 환경을 유지하는 데 대한 우려를 제기한다. <span class=\"trans-hl\">스포츠 단체들은 환경에 대한 부작용을 줄이는 정책을 추구함으로써 이러한 어려움을 극복하기 위해 더 적극적으로 나서야 한다.</span> 이는 스포츠의 장기적인 생존 가능성과 지속가능성을 보호할 것이다."},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Although sport is widely enjoyed and promotes physical well-being, it poses significant environmental challenges. First, the development of facilities such as golf courses damages natural landscapes and requires large amounts of chemical fertilizers. Second, spectator sports generate substantial plastic waste and noise pollution in surrounding areas. Therefore, sport organizations must adopt proactive environmental policies to ensure the long-term sustainability of sport.","scoring_criteria":[{"criterion":"topic sentence: 스포츠의 환경적 부정 영향 포함","points":1},{"criterion":"supporting idea 1: 골프장/스포츠 시설 → 경관 파괴/화학 비료","points":1},{"criterion":"supporting idea 2: 관중 스포츠 → 폐기물/소음","points":1},{"criterion":"concluding sentence: 환경 정책/지속가능성 언급","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Despite its many benefits, sport creates serious environmental problems. The construction of golf courses destroys green belts and pollutes soil through heavy fertilizer use. Spectator sports also harm the environment by producing plastic waste and excessive noise near stadiums. Sport organizations should therefore implement stronger environmental measures to preserve sustainability."},{"label":"답안 B","source_type":"variant","content":"Sport, while beneficial to health and recreation, has notable negative effects on the environment. One concern is the environmental cost of sport facilities, particularly golf courses that destroy landscapes and depend on chemical fertilizers. Another is the waste and noise generated by large sporting events and their spectators. Consequently, sport bodies must pursue active policies to mitigate environmental damage."}]},"source":{"references":[],"concept_explanation":"요약 쓰기 구조: Topic sentence(주제문) + Supporting ideas(뒷받침) + Concluding sentence(결론). 4개 이상 연속 인용 금지 → 핵심 내용을 자신의 언어로 재진술. 지문 각 단락의 핵심 문장을 파악하고 이를 요약 구성요소에 대응시키는 것이 핵심 전략."},"related":{"enabled":false,"questions":[]}},"linguistics_2025_B01.json":{"meta":{"id":"linguistics_2025_B01","year":2025,"number":"B-1","subject":"linguistics","linguistics_domain":"semantics","question_type":"short_answer","score":2,"tags":["entailment","one-way entailment","mutual entailment","truth condition","paraphrase","logical equivalence"],"parse_source":"2025_B형_기출_PDF","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blanks ① and ② in <B> each with the ONE most appropriate word from <A>, in the correct order.","passage":"<A>\nAn important truth relation between sentences is entailment. A sentence p entails another sentence q when the truth of p guarantees the truth of q, and the falsity of q guarantees the falsity of p. Consider the following examples:\n\n(1) a. I saw my mother today.\n    b. I saw someone today.\n\nIf (1a) is true, (1b) is necessarily true. In other words, it is impossible that (1a) is true and (1b) is false: The sentence 'I saw my mother today and I didn't see anyone today' is a contradiction. In addition, if (1b) is false, (1a) must be false. These truth relations show that (1a) entails (1b). However, (1b) does not entail (1a) since it is possible that (1b) is true and (1a) is false: The sentence 'I saw someone today and I didn't see my mother today' is not a contradiction. This kind of entailment in (1) is called one-way entailment.\n\nThere is another type of entailment where two sentences are logically equivalent to each other (i.e., they are paraphrases). Consider the following examples:\n\n(2) a. Jane built this house.\n    b. This house was built by Jane.\n\nIf (2a) is true, (2b) is also true, and if (2b) is false, (2a) is false. Furthermore, if (2b) is true, (2a) is true, and if (2a) is false, (2b) is false. These truth relations mean that the two sentences in (2) always have the same truth-value. In other words, if (2a) describes a situation, so will (2b), and vice versa; while if either incorrectly describes a situation, so will the other. This kind of entailment in (2) is called mutual entailment.\n\n<B>\n(a) The two sentences, 'Jane finished the presentation' and 'Jane stopped the presentation', show a(n) [BLANK_①] entailment relation.\n(b) The two sentences, 'The Internet is not connected' and 'The Internet is disconnected', show a(n) [BLANK_②] entailment relation.","blanks":[{"label":"①","context":"'finished the presentation' ↔ 'stopped the presentation' — 한 방향만 참 보존"},{"label":"②","context":"'not connected' ↔ 'disconnected' — 양방향 동치 (paraphrase)"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"ONE word from <A> 조건. <A>에서 정의된 entailment 유형 명칭은 'one-way'와 'mutual' 두 개뿐. 각 쌍의 진리조건(truth-condition)을 양방향으로 테스트하여 둘 중 하나로 귀속시키는 문제.","key_terms":["truth condition","bidirectional test","entailment typology"]},{"step":2,"label":"대응쌍 확인 — <A> 정의 ↔ <B> 사례","explanation":"<A> (1) 'mother → someone'은 한 방향만 참 보존 = one-way. <A> (2) 능동/수동은 양방향 참 보존 = mutual. <B>(a) finish/stop 쌍은 (1)형에, <B>(b) not connected / disconnected 쌍은 (2)형에 사상된다.","key_terms":["one-way entailment (1)","mutual entailment (2)","paraphrase"]},{"step":3,"label":"① 후보 판별 — finish vs stop 진리조건","explanation":"정방향: 'Jane finished the presentation' 참 → 발표를 끝까지 해서 멈췄으므로 'Jane stopped the presentation' 참. ✓\n역방향: 'Jane stopped the presentation' 참 → 중간에 중단했을 수도 있어 'finished' 거짓 가능. ✗\nfinish는 stop의 하위 개념(완료 포함). 한 방향만 성립 → one-way. 'mutual' 후보는 역방향 실패로 탈락.","key_terms":["aspect completion","hyponym entailment","asymmetric truth"]},{"step":4,"label":"② 후보 판별 — not connected vs disconnected 진리조건","explanation":"정방향: 'The Internet is not connected' 참 → 'The Internet is disconnected' 참. ✓\n역방향: 'The Internet is disconnected' 참 → 'The Internet is not connected' 참. ✓\n'dis-' 접두사는 부정 의미로 'not + 기반형'과 동치. 양방향 모두 truth 보존 → mutual. <A> (2) 능동/수동과 동일한 paraphrase 관계. 'one-way' 후보는 역방향도 성립하므로 탈락.","key_terms":["logical equivalence","negative prefix dis-","paraphrase"]},{"step":5,"label":"전략 — 양방향 진리조건 테스트","explanation":"Entailment 판정은 반드시 두 방향을 모두 확인. (i) p→q 참 보존? (ii) q→p 참 보존? 둘 다 성립 = mutual, 한쪽만 = one-way. 함정: 의미가 비슷해 보이면 mutual로 단정하기 쉬우나 aspect/quantifier/hyponym 쌍은 대개 one-way. 접사 기반 부정/능동-수동/동의어 치환은 대개 mutual.","key_terms":["bidirectional test","logical equivalence test"]}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"content_type":"blank_answer","blank_answers":[{"label":"①","answer":"one-way"},{"label":"②","answer":"mutual"}],"essay_content":"","scoring_criteria":[{"criterion":"① one-way","points":1},{"criterion":"② mutual","points":1}]},"variants":[{"source_type":"instructor","label":"답안 A","content":"① one-way\n② mutual"},{"source_type":"passer","label":"답안 B","content":"①: one-way (entailment) — finish → stop만 성립, 역방향 성립 X\n②: mutual (entailment) — 'not connected'와 'disconnected'는 paraphrase"}]},"source":{"references":[{"type":"textbook","author":"Saeed, J. I.","title":"Semantics (4th ed.)","year":2016,"publisher":"Wiley-Blackwell","pages":"pp. 103–108 · Ch. 4","excerpt":"Entailment is a relation between sentences such that the truth of one (p) guarantees the truth of the other (q). When p and q entail each other mutually, they are said to be paraphrases of one another."},{"type":"textbook","author":"Kearns, K.","title":"Semantics (2nd ed.)","year":2011,"publisher":"Palgrave Macmillan","pages":"pp. 9–14 · Ch. 1","excerpt":"If p entails q and q also entails p, then p and q are logically equivalent. One-way entailment holds where the inference goes only from p to q but not from q to p."},{"type":"textbook","author":"Hurford, J. R., Heasley, B., & Smith, M. B.","title":"Semantics: A Coursebook (2nd ed.)","year":2007,"publisher":"Cambridge University Press","pages":"Unit 10","excerpt":"A paraphrase is a pair of sentences that mutually entail each other — they have the same truth value in every situation."}],"concept_explanation":"① one-way entailment: p ⇒ q 이지만 q ⇏ p. 한 방향만 참 보존.\n  · aspect 완료-중단 쌍 (finish ⇒ stop)\n  · hyponym-hypernym 쌍 (rose ⇒ flower, mother ⇒ someone)\n  · quantifier 축소 (all ⇒ some)\n\n② mutual entailment = logical equivalence = paraphrase. p ⇔ q.\n  · 능동/수동 전환 (Jane built X ⇔ X was built by Jane)\n  · 부정 접사 ↔ 부정문 (unhappy ⇔ not happy, disconnected ⇔ not connected)\n  · 동의어 치환 (physician ⇔ doctor)\n\n판정 원칙: 진리조건을 반드시 양방향으로 테스트 — (i) p→q 참 보존? (ii) q→p도 참 보존? 둘 다 ✓ = mutual, 한쪽만 ✓ = one-way. 비슷해 보인다고 mutual로 단정하는 것이 전형적 함정."},"related":{"enabled":true,"questions":[{"id":"linguistics_2018_B03","year":2018,"number":"B-3","subject":"linguistics","connection_type":"same_concept","connection_note":"entailment vs presupposition 구분. 진리조건 양방향 테스트 프레임 동일.","shared_keywords":["entailment","truth condition","semantic relation"]},{"id":"linguistics_2022_B02","year":2022,"number":"B-2","subject":"linguistics","connection_type":"same_strategy","connection_note":"진리값 보존 테스트로 의미 관계 판정. paraphrase 판별 동일 전략.","shared_keywords":["truth value","paraphrase","semantic relation"]},{"id":"linguistics_2015_B04","year":2015,"number":"B-4","subject":"linguistics","connection_type":"prerequisite","connection_note":"truth-condition semantics 기본 개념. 본 문제의 선행 지식.","shared_keywords":["truth condition","proposition","meaning"]}]}},"linguistics_2025_A02.json":{"meta":{"id":"linguistics_2025_A02","year":2025,"number":"A-2","subject":"linguistics","linguistics_domain":"pragmatics","question_type":"short_answer","score":2,"tags":["implicature","conversational implicature","cooperative principle","Gricean maxim","hedge","non-literal meaning"],"parse_source":"2025_A형_기출_PDF","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the ONE most appropriate word from the passage.","passage":"A sentence has a meaning which does not change in different contexts. This kind of meaning is called literal meaning (or truth condition). In other words, knowing the meaning of a sentence means knowing what the world would have to look like in order for that sentence to be true. Consider the following example:\n\n(1) #John has killed a mosquito, but the mosquito is not dead.\n\nSince the sentence 'John has killed a mosquito' has the result state of a mosquito being dead as part of its literal meaning, the result state cannot be denied.\n\nHowever, the literal meaning is not the only sort of meaning conveyed when language is used for communication. Non-literal meanings (i.e., extra-truth-conditional meanings) could arise depending on utterance contexts, as illustrated in (2).\n\n(2) [Tom and Mary are eating together at a restaurant, and Tom needs ketchup.]\n    Tom : Mary, are you using the ketchup?\n\nThe sentence in (2) literally asks if Mary is using the ketchup. However, it could also yield a non-literal meaning, 'Please pass me the ketchup', which is an example of implicature.\n\nSimilarly, a non-literal meaning can also be conveyed when a conversational maxim is intentionally violated. Consider the conversation between Tom and Mary in (3).\n\n(3) [On his way to class, Tom meets his friend, Mary.]\n    Tom  : Hi, Mary.\n    Mary : Hi, Tom. You look busy. Where are you going?\n    Tom  : I'm going to my chemistry class.\n    Mary : How is your chemistry professor? You told me before that she was ill.\n    Tom  : She seems fine now. By the way, did you eat lunch? How about Korean food after my class?\n    Mary : What happened during your interview yesterday?\n    Tom  : Well, to make a long story short, they didn't hire me.\n    Mary : I'm sorry to hear that.\n\nUttering 'What happened during your interview yesterday?', Mary violates the maxim of relation or quantity, which results in a non-literal meaning. Meanwhile, without the phrase 'to make a long story short' in Tom's last utterance, a conversational [BLANK] would occur.\n\nNote: '#' indicates that the sentence is semantically unacceptable.","blanks":[{"label":"①","context":"a conversational [①] would occur — 지문에서 이미 정의된 non-literal meaning 용어"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"ONE word from the passage 조건. 지문에 명시된 non-literal meaning 관련 기술어를 찾아야 함. 후보: literal meaning, truth condition, non-literal meaning, implicature, maxim. '(a) conversational ___' 자리이므로 'conversational' 뒤에 collocate 가능한 명사로 압축된다.","key_terms":["conversational","collocation constraint","non-literal meaning"]},{"step":2,"label":"대응쌍 확인 — 지문 (2) ↔ 빈칸 문장","explanation":"지문 (2)에서 'Please pass me the ketchup'이 non-literal meaning으로 발생한 것을 'an example of implicature'로 정의. 빈칸 문장은 (3)의 Tom 발화에서 hedge 제거 시 동일한 메커니즘이 작동함을 기술. (2)의 implicature ↔ 빈칸의 conversational [?] 대응쌍.","key_terms":["implicature definition","non-literal meaning","parallel construction"]},{"step":3,"label":"후보 검증 — collocation 및 pragmatic function","explanation":"① 'conversational implicature' — Grice의 전문 용어, 지문 정의와 일치. ✓\n② 'conversational maxim' — 지문에도 등장하나 maxim은 '지켜야 할 규칙'이지 '발생(occur)하는 것'이 아님. Tom이 maxim을 occur시킨다는 표현 비문. ✗\n③ 'conversational meaning' — 지문에 없는 표현. parse_source 조건 위반. ✗\n최종: implicature만 생존.","key_terms":["conversational implicature","would occur","verb collocation"]},{"step":4,"label":"확정 근거 — hedge의 화용적 기능","explanation":"'to make a long story short'는 Manner 및 Quantity maxim 준수를 명시적으로 선언하는 hedge. 이 hedge가 없다면 Tom의 짧은 답변('they didn't hire me')은 Quantity/Manner maxim 위반처럼 보이게 되어 Mary가 추가 의미를 추론하게 됨 → 이것이 바로 conversational implicature의 생성 메커니즘. 지문 (2)와 동일한 generation 과정.","key_terms":["hedge","quantity maxim","manner maxim","implicature cancellation"]},{"step":5,"label":"전략 — 'ONE word from the passage' 풀이 원칙","explanation":"(1) 지문에 등장한 단어만 후보. 외부 지식 용어(예: 'inference', 'entailment') 도입 금지. (2) 빈칸 앞뒤 collocation 필수 일치 — 'conversational ___' + 'would occur'. (3) 지문에서 해당 개념이 이미 동일 구조로 정의된 곳(여기선 (2))을 대응쌍으로 확인. 함정: maxim이 지문에 빈번히 등장하지만 collocation과 의미가 맞지 않음.","key_terms":["passage-bound answer","collocation check","definition parallelism"]}],"vocabulary":[{"word":"implicature","pos":"n","definition_ko":"함축 — 문장의 literal meaning을 넘어서 추론되는 비문자적 의미","example":"Are you using the ketchup? → Please pass me the ketchup."},{"word":"maxim","pos":"n","definition_ko":"격률 — 협력 대화를 위한 규칙 (Quantity/Quality/Relation/Manner)","example":"Grice's maxims of conversation"},{"word":"hedge","pos":"n","definition_ko":"울타리 표현 — 발화의 정확도·양·태도를 명시적으로 제한하는 장치","example":"to make a long story short, sort of, I think"}],"translation":""},"answer":{"model_answer":{"content_type":"blank_answer","blank_answers":[{"label":"①","answer":"implicature"}],"essay_content":"","scoring_criteria":[{"criterion":"implicature","points":2}]},"variants":[{"source_type":"instructor","label":"답안 A","content":"implicature"},{"source_type":"passer","label":"답안 B","content":"implicature\n(근거: 지문 (2)에서 'Please pass me the ketchup'을 'an example of implicature'로 정의. Tom의 hedge 'to make a long story short'가 없다면 Quantity maxim 위반으로 인한 동일한 conversational implicature 발생.)"}]},"source":{"references":[{"type":"paper","author":"Grice, H. P.","title":"Logic and Conversation","year":1975,"publisher":"In P. Cole & J. Morgan (Eds.), Syntax and Semantics 3: Speech Acts (pp. 41–58). Academic Press.","pages":"pp. 41–58","excerpt":"A conversational implicature is a meaning that is implied by a speaker but not literally said; it arises when a speaker is presumed to be cooperative yet appears to flout one of the maxims."},{"type":"textbook","author":"Levinson, S. C.","title":"Pragmatics","year":1983,"publisher":"Cambridge University Press","pages":"pp. 100–118 · Ch. 3","excerpt":"Hedges such as 'to make a long story short' overtly signal orientation to the Maxim of Quantity/Manner, thereby averting the implicature that would otherwise arise from underinformativity."},{"type":"textbook","author":"Yule, G.","title":"Pragmatics","year":1996,"publisher":"Oxford University Press","pages":"pp. 35–46 · Ch. 5","excerpt":"Implicatures are primary examples of more being communicated than is said. The cooperative principle and its maxims generate expectations that enable the hearer to recover these additional meanings."}],"concept_explanation":"Grice (1975) 협력 원리(Cooperative Principle)와 네 격률:\n- Quantity: 필요한 만큼의 정보 (부족/과다 금지)\n- Quality: 참이라고 믿는 것만 (거짓·근거 없는 주장 금지)\n- Relation: 관련 있는 말 (Relevance)\n- Manner: 명료·간결·질서 있게\n\nConversational implicature 생성 메커니즘:\n(i) 화자가 격률을 표면적으로 어긴 것처럼 보임 (flouting)\n(ii) 청자는 화자가 여전히 협력적이라고 가정\n(iii) 청자는 표면 의미 너머의 추가 의미를 추론 → implicature\n\nHedge의 역할:\n- 'to make a long story short', 'roughly speaking', 'as far as I know' 등\n- 격률 준수를 명시적으로 선언하여 implicature 발생을 차단\n- 본 문제의 Tom 발화는 hedge로 Quantity/Manner maxim 준수를 플래그 → hedge 부재 시 저발화(underinformativity)로 implicature 유발\n\n본 문제의 두 축:\n① Mary의 화제 전환 = flouting relation/quantity → non-literal meaning\n② Tom의 hedge 부재 시 = 동일한 implicature 생성"},"related":{"enabled":true,"questions":[{"id":"linguistics_2020_A04","year":2020,"number":"A-4","subject":"linguistics","connection_type":"same_concept","connection_note":"Grice 협력 원리·격률 위반·implicature 도출. 동일 이론 틀.","shared_keywords":["Gricean maxim","implicature","cooperative principle"]},{"id":"linguistics_2017_A05","year":2017,"number":"A-5","subject":"linguistics","connection_type":"same_strategy","connection_note":"지문 내 정의된 pragmatics 용어를 문맥에서 채워넣는 전략 동일.","shared_keywords":["conversational implicature","non-literal meaning","passage-bound fill-in"]},{"id":"linguistics_2023_A06","year":2023,"number":"A-6","subject":"linguistics","connection_type":"same_concept","connection_note":"Quantity/Manner maxim flouting 및 hedge의 화용적 기능. 병렬 적용 사례.","shared_keywords":["maxim flouting","hedge","quantity","manner"]}]}},"education_2025_A03.json":{"meta":{"id":"education_2025_A03","year":2025,"number":"A-3","subject":"education","question_type":"short_answer","score":2,"tags":["materials adaptation","modifying","classroom management","learner relevance"],"parse_source":"2025_A형_기출_PDF","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank ① with the ONE most appropriate word from the passage.","passage":"Materials can be adapted by using different techniques such as adding, deleting, modifying, and reordering. For example, we can add materials when a language item is not covered sufficiently in the original materials. Materials that are too easy or difficult for learners can be deleted. Modifying can be used to make them more relevant to students' interests and backgrounds and to restructure classroom management. Reordering the sequence of activities is another technique, which includes separating items and regrouping them.\n\nConsider the original material extracted from a grammar exercise book and its adapted version below. In the adapted version, the original exercise has been adapted by using the [BLANK_①] technique.\n\nOriginal Material\n➊ Describe the man's routine in four sentences.   Individual Work\n➋ Answer the following questions.   Individual Work\n     What time do you wake up?\n     What do you usually wear to work?\n     What do you usually cook for dinner?\n\nAdapted Material\n➊ Describe the student's routine in four sentences.   Individual Work\n➋ Work in pairs and ask each other the following questions.   Pair Work\n     What time do you wake up?\n     What do you usually wear on school days?\n     What do you usually eat for dinner?","blanks":[{"label":"①","context":"the [①] technique — 원본에서 수정본으로 적용된 교재 수정 기법"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"ONE word from the passage 조건. 지문에 열거된 네 기법: adding / deleting / modifying / reordering. 원본-수정본 비교를 통해 어떤 기법이 적용됐는지 귀속시키는 문제.","key_terms":["adding","deleting","modifying","reordering"]},{"step":2,"label":"원본 ↔ 수정본 차이 분석","explanation":"① 'man's routine' → 'student's routine': 학습자 관련성 강화.\n② 'Individual Work' → 'Pair Work' (➋): 교실 운영 방식 재구성.\n③ 'wear to work' → 'wear on school days': 학생 배경 반영.\n④ 'cook for dinner' → 'eat for dinner': 표현 조정.\n항목 수 동일(추가·삭제 없음). 활동 순서 동일(➊→➋ 유지).","key_terms":["students' interests and backgrounds"]},{"step":3,"label":"후보 검증 — 소거법","explanation":"① adding — 항목 수가 늘지 않음. ✗\n② deleting — 항목이 제거되지 않음. ✗\n③ modifying — (a) 내용을 학생 관심사·배경에 맞게 변경 ✓, (b) Individual→Pair Work로 교실 운영 재구성 ✓. 두 기준 동시 충족. ✓\n④ reordering — ➊➋ 순서 유지, 분리·재묶음 없음. ✗\n최종: modifying.","key_terms":["adding","deleting","modifying","reordering"]},{"step":4,"label":"확정 근거 — 지문 정의와 수정본 대응","explanation":"지문: 'Modifying can be used to make them more relevant to students' interests and backgrounds and to restructure classroom management.'\n수정본 변화:\n· 'student's routine' / 'school days' / 'eat' = students' interests·backgrounds 반영\n· 'Pair Work' = classroom management 재구성\n두 정의 조건이 동시에 수정본에서 관찰됨.","key_terms":["students' interests","classroom management","modifying"]},{"step":5,"label":"전략 — 교재 수정 기법 식별 원칙","explanation":"(1) 지문의 각 기법 정의를 먼저 정리. (2) 원본-수정본 차이를 항목별로 열거. (3) 각 차이를 기법 정의에 대입하여 소거. (4) 최종 생존 기법 = 정답.\n함정: 내용이 달라졌다고 reordering으로 혼동하기 쉬우나, reordering은 항목 배열 순서 변경이지 내용 변경이 아님.","key_terms":["modifying","reordering"]}],"vocabulary":[{"word":"modifying","pos":"v/gerund","definition_ko":"수정하기 — 내용·형식을 학습자 요구에 맞게 변경","example":"modifying content to suit students' backgrounds"},{"word":"reordering","pos":"v/gerund","definition_ko":"재배열하기 — 활동 순서 변경, 분리·재묶음 포함","example":"reordering the sequence of activities"}],"key_terms":[{"term":"modifying","definition_en":"A materials adaptation technique that makes internal changes to content or methodology — adjusting language, topics, interaction patterns — to better suit learners' interests, backgrounds, and classroom management needs without adding or deleting items (McDonough et al., 2013).","definition_ko":"교재 내용이나 교수 방법을 학습자 관심사·배경·교실 운영 방식에 맞게 내적으로 변경하는 교재 수정 기법. 항목 추가·삭제 없이 기존 자료를 조정함.","source_author":"McDonough, J., Shaw, C. & Masuhara, H.","source_year":2013,"related_terms":["adding","deleting","reordering","materials adaptation"],"exam_usage":"원본-수정본 비교에서 내용 학습자화(studentization) + 교실 운영 재구성이 동시 관찰되면 modifying"}],"translation":""},"answer":{"model_answer":{"content_type":"blank_answer","blank_answers":[{"label":"①","answer":"modifying"}],"essay_content":"","scoring_criteria":[{"criterion":"① modifying","points":2}]},"variants":[]},"source":{"references":[{"type":"textbook","author":"Tomlinson, B. (Ed.)","title":"Materials Development in Language Teaching (2nd ed.)","year":2011,"publisher":"Cambridge University Press","pages":"pp. 45–58","excerpt":"Adaptation involves changes to existing materials to make them more appropriate for a specific group of learners. Techniques include adding, deleting, modifying, and reordering."},{"type":"textbook","author":"McDonough, J., Shaw, C., & Masuhara, H.","title":"Materials and Methods in ELT (3rd ed.)","year":2013,"publisher":"Wiley-Blackwell","pages":"pp. 70–82 · Ch. 4","excerpt":"Modification refers to internal changes to the methodology or linguistic content, including making activities more culturally or contextually relevant and adjusting interaction patterns such a (function(){

  linguistics: '영어학',

};

const DOMAIN_KO = {

};

const SUBJECT_TAG_CLASS = {
  linguistics: 'tag-ling',
  education:   'tag-edu',
  general:     'tag-gen',
  literature:  'tag-lit'
};

function isLiterary(meta) {
  if (!meta.tags?.length) return false;
  const litTypes = ['novel', 'play', 'poem', 'poetry', 'drama', 'fiction', 'essay'];
  return litTypes.some(t => meta.tags.some(tag => tag.toLowerCase().includes(t)));
}

function getSubjectKo(meta) {
  if (meta.subject === 'general' && isLiterary(meta)) return '일반영어(문학)';
  return SUBJECT_KO[meta.subject] ?? meta.subject;
}

function getSubjectClass(meta) {
  if (meta.subject === 'general' && isLiterary(meta)) return 'tag-lit';
  return SUBJECT_TAG_CLASS[meta.subject] ?? 'tag-ling';
}

// ── HTML 유틸 ─────────────────────────────────────────

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// key_terms 배열로 텍스트 내 첫 등장 <em> 감싸기 (대소문자 무시)
function hlTerms(text, terms) {
  let s = esc(text).replace(/\n/g, '<br>');
  (terms ?? []).forEach(term => {
    const ep = esc(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (new RegExp(`<em>${ep}</em>`, 'i').test(s)) return;
    s = s.replace(new RegExp(ep, 'i'), `<em>$&</em>`);
  });
  return s;
}

// HTML 텍스트 내 terms를 지정 클래스 span 또는 em으로 자동 감싸기 (대소문자 무시)
function applyHl(text, terms, cls) {
  if (!text || !terms?.length) return text;
  let s = text;
  terms.forEach(term => {
    if (!term) return;
    const ep = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (cls === 'em') {
      if (new RegExp(`<em>${ep}</em>`, 'i').test(s)) return;
      s = s.replace(new RegExp(ep, 'i'), `<em>$&</em>`);
    } else {
      if (new RegExp(`class="${cls}"[^>]*>${ep}`, 'i').test(s)) return;
      s = s.replace(new RegExp(ep, 'gi'), `<span class="${cls}">$&</span>`);
    }
  });
  return s;
}
