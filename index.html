<!DOCTYPE html><html lang="ko" style="background:#f3f7f4;color:#1f2e27;"><head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전공영어 기출마스터</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&amp;family=Nanum+Pen+Script&amp;family=Gowun+Dodum&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
:root{
  /* 톤다운 민트/그린 팔레트 */
  --bg:#f3f7f4;
  --surface:#fbfcfb;      /* paper */
  --surface2:#f1f5f2;
  --surface3:#e6ede8;
  --border:#c9d6cd;
  --border2:#b2c4ba;

  --accent:#3a7a5a;       /* 이끼 그린 */
  --accent-dim:rgba(58,122,90,.10);
  --accent2:#3c6b95;      /* 잉크 블루 */
  --accent3:#a55a1e;      /* 차분한 호박색 (기존 orange 대체) */
  --accent4:#8f466a;      /* 오동핑크 */

  --text:#1f2e27;
  --text-sub:#3b5347;
  --text-dim:#7a8f83;

  --blank-bg:rgba(106,75,133,.10);
  --blank-border:#6a4b85;
  --blank-text:#4b3262;

  /* 4개 탭 컬러 — 톤다운 */
  --tab-q:#6a4b85;   /* 문제 — 머루 */
  --tab-d:#3c6b95;   /* 도출 — 잉크블루 */
  --tab-a:#3a7a5a;   /* 정답 — 이끼그린 */
  --tab-r:#8f466a;   /* 연결 — 오동핑크 */

  --tab-q-soft:rgba(106,75,133,.10);
  --tab-d-soft:rgba(60,107,149,.10);
  --tab-a-soft:rgba(58,122,90,.10);
  --tab-r-soft:rgba(143,70,106,.10);

  --radius:14px;--radius-sm:10px;--radius-xs:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Pretendard',sans-serif;
  font-size:clamp(15px,2.1vw,16.5px);line-height:1.85;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════════════════════
   ★ 헤더 — 기출 노트 스타일
   ═══════════════════════════════════════════════════════ */
.site-header{
  flex-shrink:0;
  background:
    repeating-linear-gradient(0deg,
      transparent 0,transparent 30px,
      rgba(58,122,90,.05) 30px,rgba(58,122,90,.05) 31px),
    var(--surface);
  position:relative;
  padding:18px 20px 14px;
  border-bottom:2.5px solid var(--text);
}
/* 상단 이중 라인 */
.site-header::before{
  content:'';position:absolute;top:5px;left:5px;right:5px;
  height:1px;background:var(--text-sub);
}
/* 하단 얇은 장식 라인 (이중 테두리 느낌) */
.site-header::after{
  content:'';position:absolute;bottom:-6px;left:0;right:0;
  height:1px;background:var(--border2);
}

.notebook-meta{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;
  font-family:'Nanum Pen Script',cursive;
  font-size:18px;color:var(--text-dim);line-height:1;
  max-width:760px;margin-left:auto;margin-right:auto;
  padding:0 6px;
}
.notebook-meta .pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 9px;border:1.5px solid var(--text-sub);
  color:var(--text-sub);background:var(--surface);
  letter-spacing:1px;font-weight:600;
  transform:rotate(-1deg);
}
.notebook-meta .scribble{transform:rotate(-1.5deg);font-size:18px;}
.notebook-meta .date{margin-left:auto;transform:rotate(1deg);font-size:16px;}

.site-title-wrap{
  max-width:760px;margin:0 auto;padding:0 6px;text-align:left;
}
.site-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(28px,6vw,44px);
  color:var(--text);line-height:1;letter-spacing:-.5px;
  display:inline-block;
}
.site-title .hl{
  color:var(--accent);
  background:linear-gradient(180deg,transparent 65%, rgba(58,122,90,.22) 65%, rgba(58,122,90,.22) 92%, transparent 92%);
  padding:0 4px;
}
.site-title-cursive{
  display:block;
  font-family:'Nanum Pen Script',cursive;
  font-size:clamp(18px,3.2vw,24px);
  color:var(--accent);
  margin-top:-2px;margin-left:6px;
  transform:rotate(-1.5deg);line-height:1;
}
.site-sub{
  margin-top:10px;
  font-family:'Nanum Pen Script',cursive;
  font-size:clamp(15px,2.4vw,19px);
  color:var(--text-sub);line-height:1.2;
  max-width:760px;margin-left:auto;margin-right:auto;
  padding:0 6px;
}
.site-sub span{
  border-bottom:2px solid var(--accent);
  padding-bottom:1px;
}

/* ═══════════════════════════════════════════════════════
   ★ 필터 — 마스킹테이프/스티커 느낌
   ═══════════════════════════════════════════════════════ */
.filter-bar{
  padding:14px 16px 2px;max-width:760px;margin:10px auto 0;width:100%;flex-shrink:0;
}
.filter-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:nowrap;}
.dropdown-wrap{position:relative;}
.dropdown-btn{
  display:flex;align-items:center;gap:6px;
  padding:4px 13px 2px;
  border-radius:6px;
  font-family:'Nanum Pen Script',cursive;
  font-size:17px;font-weight:400;
  background:var(--surface);color:var(--text);
  border:2px solid var(--text);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  box-shadow:2px 2px 0 var(--text);
  line-height:1.35;
}
.dropdown-wrap:nth-child(1) .dropdown-btn{transform:rotate(-.5deg);}
.dropdown-wrap:nth-child(2) .dropdown-btn{transform:rotate(.6deg);}
.dropdown-wrap:nth-child(3) .dropdown-btn{transform:rotate(-.3deg);}
.dropdown-btn.open,.dropdown-btn:hover{
  background:var(--accent-dim);
  color:var(--accent);
  border-color:var(--accent);
  box-shadow:2px 2px 0 var(--accent);
}
.dd-arrow{font-size:11px;transition:transform .15s;opacity:.7;}
.dropdown-btn.open .dd-arrow{transform:rotate(180deg);}
.dropdown-menu{
  display:none;position:absolute;top:calc(100% + 6px);left:0;
  background:var(--surface);border:2px solid var(--text);
  border-radius:6px;overflow:hidden;z-index:100;min-width:140px;
  box-shadow:3px 3px 0 var(--text);
}
.dropdown-menu.open{display:block;}
.dd-item{
  display:block;width:100%;padding:8px 14px;
  background:none;border:none;text-align:left;
  font-family:'Gowun Dodum',sans-serif;font-size:13.5px;
  color:var(--text-sub);cursor:pointer;transition:background .12s;
  border-bottom:1px dashed var(--border);
}
.dd-item:last-child{border-bottom:none;}
.dd-item:hover{background:var(--surface3);color:var(--text);}
.dd-item.active{
  color:var(--accent);font-weight:700;background:var(--accent-dim);
  font-family:'Nanum Pen Script',cursive;font-size:17px;
}

/* ═══════════════════════════════════════════════════════
   ★ 카드 (겹테두리 + 섀도우 오프셋)
   ═══════════════════════════════════════════════════════ */
.card-view{flex:1;overflow-y:auto;padding:20px 16px 60px;-webkit-overflow-scrolling:touch;}
.card{
  background:
    repeating-linear-gradient(0deg,
      transparent 0,transparent 34px,
      rgba(58,122,90,.04) 34px,rgba(58,122,90,.04) 35px),
    var(--surface);
  border:2.5px solid var(--text);
  border-radius:4px;
  max-width:760px;margin:0 auto;
  overflow:hidden;position:relative;
  box-shadow:
    4px 4px 0 0 var(--accent),
    4px 4px 0 2px var(--text);
  display:none;
}
.card::before{
  content:'';position:absolute;inset:5px;
  border:1px solid var(--text-sub);border-radius:2px;pointer-events:none;
  z-index:1;
}
.card.active{display:block;}

/* ── 카드 메타 ── */
.card-meta{
  padding:14px 18px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  border-bottom:1px dashed var(--border2);
  position:relative;z-index:2;
}
.tag{
  display:inline-flex;align-items:center;
  padding:2px 10px 3px;border-radius:4px;
  font-size:11px;font-weight:700;white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
  border:1.5px solid;
  box-shadow:1.5px 1.5px 0 currentColor;
  transform:rotate(-.4deg);
}
.tag:nth-child(2){transform:rotate(.5deg);}
.tag:nth-child(3){transform:rotate(-.2deg);}
.tag:nth-child(4){transform:rotate(.3deg);}
.tag-year{background:var(--tab-a-soft);color:var(--tab-a);border-color:var(--tab-a);}
.tag-ling{background:var(--tab-q-soft);color:var(--tab-q);border-color:var(--tab-q);}
.tag-edu{background:var(--tab-d-soft);color:var(--tab-d);border-color:var(--tab-d);}
.tag-gen{background:var(--tab-a-soft);color:var(--tab-a);border-color:var(--tab-a);}
.tag-lit{background:var(--tab-r-soft);color:var(--tab-r);border-color:var(--tab-r);}
.tag-sub{background:var(--surface2);color:var(--text-sub);border-color:var(--border2);box-shadow:1.5px 1.5px 0 var(--border2);}
.tag-num{background:var(--tab-d-soft);color:var(--tab-d);border-color:var(--tab-d);}
.tag-essay{background:rgba(165,90,30,.08);color:var(--accent3);border-color:var(--accent3);}
.tag-novel{background:var(--tab-r-soft);color:var(--tab-r);border-color:var(--tab-r);}
.score-badge{
  margin-left:auto;font-family:'Nanum Pen Script',cursive;
  font-size:16px;color:var(--text-sub);
  display:flex;align-items:baseline;gap:4px;
}
.score-badge .num{font-size:26px;font-weight:400;color:var(--accent);line-height:1;}

/* ═══════════════════════════════════════════════════════
   ★ 탭 — 스케치 책갈피 (이중 테두리, 살짝 기울어짐)
   ═══════════════════════════════════════════════════════ */
.tabs{
  display:flex;padding:16px 14px 0;gap:7px;
  background:transparent;
  border-bottom:2px solid var(--text);
  position:relative;align-items:flex-end;
  z-index:2;
}
.tabs::after{
  content:'';position:absolute;left:14px;right:14px;bottom:-5px;
  height:1px;background:var(--border2);
}
.tab-btn{
  --col:var(--text-dim);
  flex:1;position:relative;
  padding:12px 4px 10px;
  background:var(--surface2);
  border:2px solid var(--text);
  border-bottom:none;
  border-radius:10px 10px 0 0;
  font-family:'Black Han Sans',sans-serif;
  font-size:14px;color:var(--text-dim);
  letter-spacing:1px;cursor:pointer;
  transition:all .18s ease;
  transform:translateY(3px);
  white-space:nowrap;
}
.tab-btn:nth-child(1){transform:translateY(3px) rotate(-.6deg);}
.tab-btn:nth-child(2){transform:translateY(3px) rotate(.3deg);}
.tab-btn:nth-child(3){transform:translateY(3px) rotate(-.2deg);}
.tab-btn:nth-child(4){transform:translateY(3px) rotate(.5deg);}
/* 이중 라인 */
.tab-btn::before{
  content:'';position:absolute;inset:3px;
  border:1px solid var(--text-sub);border-bottom:none;
  border-radius:7px 7px 0 0;pointer-events:none;
  opacity:.6;
}
.tab-btn .tab-sub{
  display:block;font-family:'Nanum Pen Script',cursive;
  font-size:12px;font-weight:400;color:var(--text-dim);
  letter-spacing:.3px;margin-bottom:-2px;line-height:1;
}
.tab-btn:hover:not(.active){color:var(--text);background:var(--surface);}

/* active */
.tab-btn.active{
  background:var(--surface);
  color:var(--col);
  border-color:var(--col);
  transform:translateY(-2px) rotate(0);
  z-index:3;
  box-shadow:0 -3px 0 0 var(--col);
}
.tab-btn.active::before{border-color:var(--col);opacity:.5;}
.tab-btn.active::after{
  content:'';position:absolute;left:4px;right:4px;bottom:-2.5px;height:4px;
  background:var(--surface);
}
.tab-btn.active .tab-sub{color:var(--col);}

/* 탭별 색상 */
.tab-btn[data-tab="q"]{--col:var(--tab-q);}
.tab-btn[data-tab="derive"]{--col:var(--tab-d);}
.tab-btn[data-tab="answer"]{--col:var(--tab-a);}
.tab-btn[data-tab="related"]{--col:var(--tab-r);}

/* ── 탭 패널 ── */
.tab-panel{
  display:none;padding:20px 22px 28px;
  animation:fadeUp .2s ease;
  border-left:3px solid transparent;
  position:relative;z-index:2;background:var(--surface);
}
.tab-panel.active{display:block;}
.tab-panel[id$="-q"].active{border-left-color:var(--tab-q);}
.tab-panel[id$="-d"].active{border-left-color:var(--tab-d);}
.tab-panel[id$="-a"].active{border-left-color:var(--tab-a);}
.tab-panel[id$="-r"].active{border-left-color:var(--tab-r);}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════════════════════════════════════════════════
   ── 문제 탭 (기존 그대로, 폰트만 살짝)
   ═══════════════════════════════════════════════════════ */
.prob-instruction{font-size:13px;color:var(--text-sub);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 14px;margin-bottom:13px;line-height:1.7;font-family:'Gowun Dodum',sans-serif;}
.prob-instruction strong{color:var(--text);font-weight:700;}
.prob-passage{background:var(--surface2);border:1.5px solid var(--border2);border-left:3px solid var(--tab-q);border-radius:var(--radius-sm);padding:18px 20px;font-size:clamp(14px,2vw,15px);line-height:2;font-family:'Gowun Dodum',sans-serif;}
.prob-passage p{margin-bottom:11px;}
.prob-passage p:last-child{margin-bottom:0;}
.prob-section-label{font-family:'Nanum Pen Script',cursive;font-size:18px;font-weight:400;letter-spacing:.5px;color:var(--accent);margin:14px 0 6px;line-height:1;}
.prob-section-label:first-child{margin-top:0;}
.blank{display:inline-flex;align-items:center;background:var(--blank-bg);border:1.5px solid var(--blank-border);border-radius:4px;padding:0 8px 1px;font-size:12px;font-weight:700;color:var(--blank-text);font-family:'JetBrains Mono',monospace;vertical-align:middle;margin:0 2px;box-shadow:1.5px 1.5px 0 var(--blank-border);}
.eg-block{background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 13px;margin:7px 0;font-size:13.5px;font-family:'JetBrains Mono',monospace;line-height:1.8;}
.psource{font-size:13px;color:var(--text-dim);text-align:right;margin-top:10px;font-family:'Nanum Pen Script',cursive;}
.uline{text-decoration:underline;text-underline-offset:3px;}

/* ── 도출과정 탭 ── */
.sec-title{font-family:'Nanum Pen Script',cursive;font-size:20px;font-weight:400;letter-spacing:.5px;color:var(--text-dim);margin:14px 0 9px;display:flex;align-items:center;gap:8px;line-height:1;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.sec-title:first-child{margin-top:0;}
.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.step-item{display:flex;gap:12px;align-items:flex-start;}
.step-num{width:26px;height:26px;flex-shrink:0;background:var(--surface);border:2px solid var(--tab-d);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tab-d);font-family:'JetBrains Mono',monospace;margin-top:2px;box-shadow:1.5px 1.5px 0 var(--tab-d);}
.step-body{flex:1;}
.step-label{font-family:'Nanum Pen Script',cursive;font-size:16px;font-weight:400;color:var(--tab-d);margin-bottom:3px;letter-spacing:.3px;line-height:1.2;}
.step-text{font-size:clamp(13.5px,1.9vw,14.5px);color:var(--text);line-height:1.85;font-family:'Gowun Dodum',sans-serif;}
.step-text em{background:rgba(165,90,30,.12);color:var(--accent3);padding:2px 6px;border-radius:4px;font-style:normal;font-weight:700;}
.term-hl{color:var(--accent3);font-style:normal;font-weight:700;border-bottom:2.5px solid rgba(165,90,30,.45);}
.kterms{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.kterm{background:var(--accent-dim);border:1px solid rgba(58,122,90,.3);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;}
.vocab-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px;}
.vocab-table th{padding:7px 10px;background:var(--surface3);color:var(--text-sub);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;text-align:left;border-bottom:1.5px solid var(--border);}
.vocab-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.vocab-table tr:last-child td{border-bottom:none;}
.vword{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:600;}
.vpos{font-size:10px;color:var(--text-dim);margin-top:1px;}
.vmean{color:var(--text);}
.vex{font-size:12px;color:var(--text-sub);margin-top:2px;font-style:italic;}
.trans-box{background:var(--surface2);border:1.5px solid var(--border);border-left:3px solid var(--tab-d);border-radius:var(--radius-sm);padding:15px 18px;font-size:clamp(13.5px,1.9vw,14.5px);line-height:1.95;color:var(--text);font-family:'Gowun Dodum',sans-serif;}
.trans-box p{margin-bottom:9px;}
.trans-box p:last-child{margin-bottom:0;}
.trans-hl{color:var(--tab-d);font-weight:700;border-bottom:2.5px solid rgba(60,107,149,.45);}

/* ── 정답 탭 ── */
.answer-box{background:var(--surface2);border:1.5px solid rgba(58,122,90,.35);border-left:3px solid var(--tab-a);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;}
.answer-box-label{font-family:'Nanum Pen Script',cursive;font-size:18px;font-weight:400;letter-spacing:.5px;color:var(--tab-a);margin-bottom:9px;line-height:1;}
.blank-rows{display:flex;flex-direction:column;gap:8px;}
.blank-row{display:flex;align-items:baseline;gap:9px;font-size:clamp(13.5px,1.9vw,14.5px);}
.bl{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--blank-text);background:var(--blank-bg);border:1.5px solid var(--blank-border);border-radius:4px;padding:1px 7px;font-size:12px;flex-shrink:0;}
.ba{color:var(--text);font-weight:600;font-family:'Gowun Dodum',sans-serif;}
.model-answer{background:var(--surface2);border:1.5px solid rgba(58,122,90,.35);border-left:3px solid var(--tab-a);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
.model-answer-label{font-family:'Nanum Pen Script',cursive;font-size:18px;font-weight:400;letter-spacing:.5px;color:var(--tab-a);margin-bottom:8px;line-height:1;}
.ma-body{font-size:clamp(13.5px,1.9vw,14.5px);color:var(--text);line-height:1.9;font-family:'Gowun Dodum',sans-serif;}
.ma-body em,.v-text em,.concept em{background:rgba(165,90,30,.12);color:var(--accent3);padding:2px 6px;border-radius:4px;font-style:normal;font-weight:700;}
.criteria-box{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 15px;margin-bottom:12px;}
.criteria-box-label{font-family:'Nanum Pen Script',cursive;font-size:17px;font-weight:400;letter-spacing:.5px;color:var(--text-dim);margin-bottom:8px;line-height:1;}
.crit-lines{display:flex;flex-direction:column;gap:0;}
.crit-line{display:flex;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--border);}
.crit-line:last-child{border-bottom:none;}
.crit-pts{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;min-width:30px;}
.crit-text{font-size:13px;color:var(--text-sub);font-family:'Gowun Dodum',sans-serif;}
.variants{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.variant{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 15px;}
.v-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.vbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;}
.vb-a{background:var(--tab-d-soft);color:var(--tab-d);border:1px solid rgba(60,107,149,.3);}
.vb-b{background:var(--tab-r-soft);color:var(--tab-r);border:1px solid rgba(143,70,106,.3);}
.vb-c{background:var(--tab-a-soft);color:var(--tab-a);border:1px solid rgba(58,122,90,.3);}
.v-text{font-size:clamp(13px,1.8vw,14px);color:var(--text);line-height:1.85;white-space:pre-wrap;font-family:'Gowun Dodum',sans-serif;}
.source-divider{margin:18px 0 13px;border:none;border-top:1.5px dashed var(--border);}
.ref{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;}
.ref-type{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:5px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(58,122,90,.3);font-family:'JetBrains Mono',monospace;}
.ref-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;font-family:'Gowun Dodum',sans-serif;}
.ref-author{font-size:12px;color:var(--text-sub);margin-bottom:1px;font-family:'Gowun Dodum',sans-serif;}
.ref-pages{font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;}
.ref-quote{margin-top:8px;padding:8px 12px;background:rgba(60,107,149,.06);border-left:3px solid var(--tab-d);border-radius:0 6px 6px 0;font-size:12.5px;color:#2a4555;line-height:1.7;font-style:italic;font-family:'Gowun Dodum',sans-serif;}
.ref-hl{background:var(--accent-dim);color:var(--accent);padding:2px 6px;border-radius:4px;font-style:normal;font-weight:700;}
.concept{background:var(--surface2);border:1.5px solid rgba(58,122,90,.25);border-radius:var(--radius-sm);padding:14px 16px;font-size:clamp(13px,1.8vw,14px);line-height:1.9;color:var(--text);font-family:'Gowun Dodum',sans-serif;}
.concept strong{color:var(--accent);}

/* ── 통사 트리 ── */
.tree-wrap{overflow-x:auto;margin:12px 0 6px;padding-bottom:4px;}
.tree-wrap svg{display:block;}

/* ── 연결문제 탭 ── */
.related-notice{background:var(--tab-r-soft);border:1px solid rgba(143,70,106,.25);border-radius:var(--radius-xs);padding:9px 13px;font-size:13px;color:var(--tab-r);margin-bottom:11px;font-family:'Gowun Dodum',sans-serif;}
.no-related{background:var(--tab-r-soft);border:1px solid rgba(143,70,106,.25);border-radius:var(--radius-xs);padding:10px 14px;font-size:13px;color:var(--tab-r);font-family:'Nanum Pen Script',cursive;font-size:17px;}
.rel-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:block;cursor:pointer;transition:border-color .18s;box-shadow:2px 2px 0 var(--border2);}
.rel-card:hover{border-color:var(--tab-r);box-shadow:2px 2px 0 var(--tab-r);}
.rel-top{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;align-items:center;}
.conn{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:20px;border:1px solid;font-family:'JetBrains Mono',monospace;}
.conn-same{color:var(--tab-d);border-color:var(--tab-d);background:var(--tab-d-soft);}
.conn-strat{color:var(--tab-a);border-color:var(--tab-a);background:var(--tab-a-soft);}
.conn-prereq{color:var(--tab-r);border-color:var(--tab-r);background:var(--tab-r-soft);}
.rel-note{font-size:13.5px;color:var(--text);line-height:1.65;margin-bottom:5px;font-family:'Gowun Dodum',sans-serif;}
.skws{display:flex;flex-wrap:wrap;gap:4px;}
.skw{background:var(--accent-dim);border:1px solid rgba(58,122,90,.25);border-radius:4px;padding:1px 7px;font-size:11px;color:var(--text-sub);font-family:'JetBrains Mono',monospace;}

/* ── 로딩 ── */
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);font-family:'Nanum Pen Script',cursive;font-size:20px;}
.loading-dot{display:inline-block;animation:blink 1.2s infinite;color:var(--accent);font-size:16px;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

suffix is usually transparent and consistent. These examples suggest that the [BLANK_②] of an inflectional suffix is predictable, while that of a derivational suffix may not be predictable.","blanks":[{"label":"①","context":"do not change the grammatical [①] of the stem"},{"label":"②","context":"the [②] of an inflectional suffix is predictable"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"형태론(morphology) 영역. inflectional suffix vs derivational suffix의 세 가지 구별 기준을 다루는 지문. 빈칸 ①②는 각각 서로 다른 기준에 해당하며 ONE word 조건 적용. ①은 '품사/문법적 속성' 기준, ②는 '의미 예측성' 기준임을 앞뒤 문맥으로 파악.","key_terms":["inflectional morpheme","derivational morpheme","grammatical category"]},{"step":2,"label":"이론 ↔ 지문 대응 — 3기준 매핑","explanation":"Fromkin 3기준 ↔ 지문 단락 대응:\n기준1(품사): '굴절 접사 → 품사 불변' ↔ 'do not change the grammatical [①] of the stem'\n기준2(순서): '파생→굴절 순' ↔ 'neighbor-hood-s ✓ / neighbor-s-hood ✗'\n기준3(의미): '굴절 의미 예측 가능' ↔ 'the [②] of an inflectional suffix is predictable'","key_terms":["syntactic category","ordering constraint","semantic predictability"]},{"step":3,"label":"후보 소거 — 정확한 용어 특정","explanation":"① 후보: class / form / function / category\n→ 'grammatical ___ of the stem' 구조. 표준 언어학 용어는 'grammatical category' (= syntactic category = 품사). Fromkin Ch.4 표준 표현. ① = category.\n\n② 후보: semantics / sense / meaning\n→ 앞 문장 'semantic contribution'을 ONE word로 환언 = meaning. 'semantics'는 학문명이므로 부적절. ② = meaning.","key_terms":["category","meaning"]},{"step":4,"label":"확정 근거 — 지문 직접 근거","explanation":"① 확정: 'inflectional suffixes do not change the grammatical ___ of the stem' + 대비 'heart(N) → adjective after -less' = 품사 변화 = category 변화. ① = category.\n② 확정: 'semantic contribution of an inflectional suffix is usually transparent and consistent. These examples suggest that the ___ of an inflectional suffix is predictable' → 'semantic contribution'의 단어 환언 = meaning. ② = meaning.","key_terms":["category","meaning"]},{"step":5,"label":"전략 메모","explanation":"형태론 굴절/파생 구별 출제 패턴: 3기준(품사·순서·의미) 중 빈칸이 어느 기준에 해당하는지 단락 위치로 먼저 확정. 앞 단락의 핵심 명사('semantic contribution')가 빈칸의 정답 후보가 되는 경우 많음. ONE word 조건이면 합성 표현(예: 'syntactic category') 불가 → 단어 하나(category, meaning)로 범위 좁힘.","key_terms":["3-criterion distinction","ONE word constraint"]}],"key_terms":[{"term":"Inflectional morpheme","definition_en":"A bound morpheme that marks grammatical categories (tense, number, case, degree) without changing the syntactic category or core meaning of the base.","definition_ko":"굴절 형태소 — 시제·수·격 등 문법 범주 표시. 어기의 품사·핵심 의미 불변.","source_author":"Fromkin","source_year":2018,"related_terms":["derivational morpheme","stem","affix"],"exam_usage":"지문 전체 주제: 굴절 접사의 3가지 특성 설명"},{"term":"Grammatical category","definition_en":"The part-of-speech class assigned to a word (noun, verb, adjective, adverb, etc.); also called syntactic category.","definition_ko":"문법 범주 (= 통사 범주) — 품사 분류: 명사, 동사, 형용사 등.","source_author":"Fromkin","source_year":2018,"related_terms":["noun","verb","adjective","derivation"],"exam_usage":"① 빈칸: 굴절 접사가 바꾸지 않는 것 = grammatical category"},{"term":"Ordering constraint (Affix ordering)","definition_en":"Derivational morphemes must attach to the base before inflectional morphemes: [[base + deriv] + inflect]. Attested: nation-al-iz-ation-s; Unattested: *nation-s-al.","definition_ko":"접사 순서 제약 — 파생 접사는 굴절 접사 안쪽(어기에 더 가까이) 위치. neighbor-hood-s ✓ / *neighbor-s-hood ✗.","source_author":"Fromkin","source_year":2018,"related_terms":["inflectional morpheme","derivational morpheme","word structure"],"exam_usage":"지문 기준 2: neighbor-hood-s ✓ vs *neighbor-s-hood"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[{"label":"①","answer":"category"},{"label":"②","answer":"meaning"}],"essay_content":"","scoring_criteria":[{"criterion":"① category","points":1},{"criterion":"② meaning","points":1}]},"variants":[]},"source":{"references":[{"type":"textbook","author":"Fromkin, V., Rodman, R., & Hyams, N.","title":"An Introduction to Language (11th ed.)","year":2018,"publisher":"Cengage Learning","pages":"pp. 64–72 · Ch. 4","excerpt":"<span class=\"ref-hl\">Inflectional morphemes</span> <span class=\"ref-hl\">do not change the syntactic category</span> or the basic meaning of the word… Derivational morphemes may change the syntactic category and/or the meaning of the base."},{"type":"textbook","author":"Dept. of Linguistics, Ohio State Univ.","title":"Language Files (12th ed.)","year":2016,"publisher":"OSU Press","pages":"pp. 116–122 · File 4.3","excerpt":"The <span class=\"ref-hl\">meaning contribution</span> of inflectional affixes is <span class=\"ref-hl\">predictable and consistent</span> across all words to which they attach."}],"concept_explanation":"Three criteria distinguishing inflectional from derivational morphemes (Fromkin 2018):\n\n① Category: Inflectional morphemes do not change the syntactic category of the stem.\n  (품사 불변: 굴절은 어기의 품사를 바꾸지 않음. 파생은 가능 — teach [V] → teacher [N].)\n\n② Ordering: Derivational morphemes must attach before inflectional morphemes.\n  Attested: nation-al-iz-ation-s ✓   Unattested: *neighbor-s-hood ✗\n  (순서 제약: 파생 접사는 굴절 접사 안쪽에 위치.)\n\n③ Meaning: The meaning contribution of inflectional morphemes is transparent and predictable; derivational meaning may be idiosyncratic.\n  (의미 예측성: 굴절 의미는 예측 가능. 파생은 어휘 특이적 — actor ≠ professor.)"},"related":{"enabled":true,"questions":[{"id":"linguistics_2022_A03","year":2022,"number":"A-3","subject":"linguistics","connection_type":"same_concept","connection_note":"ordering 기준 집중. neighbor-hood-s 예시 공유.","shared_keywords":["ordering","derivational morpheme","inflectional morpheme"]},{"id":"linguistics_2019_A02","year":2019,"number":"A-2","subject":"linguistics","connection_type":"prerequisite","connection_note":"root · base · stem 정의. 선행 지식.","shared_keywords":["free morpheme","bound morpheme","stem","root"]}]}},"linguistics_2026_B04.json":{"meta":{"id":"linguistics_2026_B04","year":2026,"number":"B-4","subject":"linguistics","linguistics_domain":"syntax","question_type":"essay","score":4,"tags":["given-new contract","end weight","passive voice","discourse","syntax"],"parse_source":"2026_linguistics_B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Of the examples in <B>, choose the ONE example in which the passive voice is adopted for the given-new contract and the ONE example for the end weight principle. Then explain your answers by showing how the given-new contract or the end weight principle is relevant for the examples you have chosen, based on <A>.","passage":"<A>\nNative speakers of English follow certain principles that allow them to interpret and produce sentences that are appropriate within the context of a larger discourse. One of them is the given-new contract, which states that in each new sentence, given (previously mentioned) information should appear before new information (information that has not been mentioned previously).\n\n(1) Susan: I don't know what to get Tom for his birthday. Any ideas?\nAnn: a. Give him a book. You know how much he likes to read.\n     b. Give a book to him. You know how much he likes to read.\nAlthough both (1a) and (1b) are grammatical, most native speakers will continue the discourse with (1a) because it conforms to the given-new contract.\n\nAnother principle is that of end weight, a general tendency in English that can be formulated as follows: put long, 'heavy' elements such as complex NPs at the end of a sentence.\n\n(2) a. Bill demonstrated the procedure to Pat.\n    b. *Bill demonstrated to Pat the procedure.\n    c. Bill demonstrated to Pat the method for fixing a watch that Jack's father had recently taught him.\nAlthough (2b) and (2c) have the same structure (i.e., the prepositional phrase to Pat precedes the direct object of the verb), only (2c) is acceptable because the heavy NP is placed at the end of the sentence.\n\nNote: '*' indicates the ungrammaticality of the sentence.\n\n<B>\na. He arrived in Paris as a refugee without any money; luckily for him, France at that time was ruled by an Italian.\nb. In one of my classes, three languages are spoken by everyone. I find that fascinating.\nc. All the lights and appliances in this house are switched on and off daily by this electrical device.\nd. I just learned that a new program was developed by medical staff from the Oslo Sport Trauma Research Center.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"통사론/담화 영역. 수동태의 두 가지 담화 기능(given-new contract, end weight) 식별 문제. <B>의 4개 예문 중 각 원리에 해당하는 것 1개씩 선택 + 근거 설명. 두 원리의 정의를 <A>에서 정확히 파악 후 각 예문 분석.","key_terms":["given-new contract","end weight","passive voice"]},{"step":2,"label":"이론 ↔ 지문 대응 — 두 원리 정의 확인","explanation":"Given-new contract: '각 새 문장에서 구정보(already mentioned)가 신정보(not yet mentioned) 앞에 위치' → 수동태로 구정보를 주어 위치(문두)로 이동.\nEnd weight: '복잡하고 무거운 요소(heavy NP)를 문장 끝에 배치' → 수동태로 긴 by-phrase(행위자)를 문말로 이동.\n두 원리는 동기가 다름: given-new = 정보 구조, end weight = 길이/복잡성.","key_terms":["given information","new information","heavy NP","information structure"]},{"step":3,"label":"후보 소거 — <B> 예문 분석","explanation":"(a): 'France' = 앞 문장 'Paris'(프랑스 도시)와 연결된 구정보 → 수동태 주어로 문두 배치. 'an Italian' = 신정보 → 문말. ✓ given-new.\n(b): 'three languages' = 맥락에서 명확히 언급된 구정보인지 불명확. 'everyone'이 화용적으로 주어지기 쉬운 정보. 덜 전형적.\n(c): 'this electrical device' = 비교적 짧고 단순한 NP → end weight 동기 약함.\n(d): 'a new program' = 짧은 NP. 'by medical staff from the Oslo Sport Trauma Research Center' = 매우 긴 복잡 NP → 문말 배치 ✓ end weight.","key_terms":["given information","heavy NP","complex NP"]},{"step":4,"label":"확정 근거 — 정답 확정","explanation":"Given-new → (a) 확정:\n'France' ← 앞 문장 'He arrived in Paris' = 구정보 → 수동태 주어(문두).\n'an Italian' = 처음 등장 신정보 → 문말 행위자. <A>의 원리 정확히 적용.\n\nEnd weight → (d) 확정:\n'by medical staff from the Oslo Sport Trauma Research Center' = 매우 복잡한 NP(전치사구 수식 포함). <A> (2c)와 동일 패턴: 행위자 by-phrase가 heavy → 문말 배치.","key_terms":["given-new → (a)","end weight → (d)"]},{"step":5,"label":"전략 메모","explanation":"수동태 기능 분석 출제 패턴: ① 먼저 두 원리 정의 확인(given-new = 정보 순서, end weight = 길이). ② 각 예문에서 수동태 주어와 by-phrase를 구분. ③ 주어가 구정보 → given-new. by-phrase가 복잡하고 길다 → end weight. 두 원리는 동시 적용 가능하므로 더 전형적인 예문을 선택할 것.\n함정: (b)처럼 수동태가 있어도 given-new/end weight 동기가 명확하지 않은 예문이 섞임.","key_terms":["passive voice function","discourse principle","information structure"]}],"key_terms":[{"term":"Given-new contract","definition_en":"A discourse principle stating that given (previously mentioned) information should precede new information within each utterance. Passive voice is one strategy to reorder constituents accordingly.","definition_ko":"구정보-신정보 계약 — 담화에서 이미 언급된 구정보가 신정보 앞에 오는 원리. 수동태로 목적어를 주어(문두)로 이동하여 구현.","source_author":"Clark & Haviland","source_year":1977,"related_terms":["information structure","topic","focus","passive voice"],"exam_usage":"(a) France = given → 수동태 주어로 문두 배치"},{"term":"End weight","definition_en":"A processing-based principle that heavy (long or complex) constituents, particularly NPs, tend to appear at the end of a sentence.","definition_ko":"말미중량 원리 — 복잡하고 무거운 요소(heavy NP)를 문장 끝에 배치하는 경향. 수동태로 긴 by-phrase를 문말로 이동.","source_author":"Quirk","source_year":1985,"related_terms":["heavy NP shift","extraposition","passive voice"],"exam_usage":"(d) 'by medical staff from the Oslo...' = 복잡 NP → 문말 배치"}],"vocabulary":[{"word":"given-new contract","pos":"term","definition_ko":"구정보가 신정보 앞에 오는 담화 원리","example":"(a): France(given) was ruled by an Italian(new)."},{"word":"end weight","pos":"term","definition_ko":"무겁고 복잡한 요소를 문장 끝에 배치하는 경향","example":"(d): developed by medical staff from the Oslo... (heavy NP at end)"}],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"(a) reflects the given-new contract: passive voice places \"France\" (given, mentioned earlier) as subject, while \"an Italian\" (new information) appears sentence-finally. (d) reflects end weight: the passive construction moves the heavy agent NP \"by medical staff from the Oslo Sport Trauma Research Center\" to sentence-final position.","scoring_criteria":[{"criterion":"given-new → (a) 식별","points":1},{"criterion":"(a) 근거: France = given(문두), an Italian = new(문말)","points":1},{"criterion":"end weight → (d) 식별","points":1},{"criterion":"(d) 근거: 'by medical staff from OST...' = 복잡 NP → 문말 배치","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"(a) reflects the given-new contract: the passive voice places 'France,' which is previously mentioned, at the beginning, while 'an Italian' as new information comes at the end. (d) reflects end weight: the passive construction moves the heavy agent NP 'by medical staff from the Oslo Sport Trauma Research Center' to the end of the sentence."},{"label":"답안 B","source_type":"variant","content":"The given-new contract applies to (a): 'France' (given) becomes the subject through passivization, while 'an Italian' (new) is placed sentence-finally. End weight applies to (d): the passive voice allows the complex NP agent to appear at the end, where heavy elements belong."}]},"source":{"references":[{"type":"textbook","author":"Fromkin, V., Rodman, R., & Hyams, N.","title":"An Introduction to Language (11th ed.)","year":2018,"publisher":"Cengage Learning","pages":"Ch. 5","excerpt":"<span class=\"ref-hl\">Given information</span> refers to information the <span class=\"ref-hl\">speaker assumes the hearer already knows</span>; <span class=\"ref-hl\">new information</span> is what the speaker is adding to the discourse."},{"type":"textbook","author":"Birner, B. J.","title":"Introduction to Pragmatics","year":2012,"publisher":"Wiley-Blackwell","pages":"pp. 73–90","excerpt":"The <span class=\"ref-hl\">given-new distinction</span> drives many syntactic choices, including <span class=\"ref-hl\">passivization</span>: speakers passivize to bring <span class=\"ref-hl\">given referents to subject position</span>."}],"concept_explanation":"Two discourse-motivated functions of the passive voice:\n\n① Given-New Contract (Clark & Haviland 1977):\nGiven (previously mentioned) information precedes new information in each utterance.\n  (구정보-신정보 계약: 구정보가 신정보 앞에 위치. 수동태로 목적어를 주어 위치로 이동.)\n  (a): 'France' (given, linked to 'Paris') → passive subject (sentence-initial).\n       'an Italian' (new) → end of sentence.\n\n② End Weight (Quirk et al. 1985):\nHeavy (long, complex) NPs tend to appear at the end of a sentence.\n  (말미중량: 복잡·무거운 NP는 문장 말미에. 수동태로 복잡한 by-phrase를 문말로 이동.)\n  (d): 'by medical staff from the Oslo Sport Trauma Research Center' = complex NP → sentence-final.\n\nKey distinction: Given-new = information status (구정보 여부). End weight = constituent complexity (구조적 복잡성)."},"related":{"enabled":true,"questions":[{"id":"linguistics_2018_B03","year":2018,"number":"B-3","subject":"linguistics","connection_type":"same_concept","connection_note":"수동태의 담화 기능(given-new, end weight) 동일 주제","shared_keywords":["passive voice","given-new","discourse function"]}]}},"linguistics_2026_B09.json":{"meta":{"id":"linguistics_2026_B09","year":2026,"number":"B-9","subject":"linguistics","linguistics_domain":"syntax","question_type":"essay","score":4,"tags":["that-trace effect","wh-movement","relative clause","syntax","complementizer"],"parse_source":"2026_linguistics_B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Based on <A>, identify the TWO examples that are ungrammatical in <B>. Then explain why they are ungrammatical.","passage":"<A>\nRegardless of the presence of a complementizer, wh-movement of objects seems to be free in English:\n(1) a. What_i do you think Peter bought t_i?\n    b. What_i do you think that Peter bought t_i?\n\nWh-movement from subject position, however, is only possible when there is no overt that complementizer. This phenomenon is called the that-trace effect:\n(2) a. Who_i do you think t_i invited Peter?\n    b. *Who_i do you think that t_i invited Peter?\n\nRelative clauses share with wh-questions the property of having an argument or adjunct missing within the clause.\n(3) a. He [VP asked [CP who_i [TP I saw t_i]]].\n    b. He met [DP the girl [CP who_i [TP I invited t_i]]].\n\nThus, the that-trace effect also applies to relative clauses:\n(4) a. She saw the boy [CP who_i [TP she thought [CP t_i [TP t_i was her boyfriend]]]].\n    b. *She saw the boy [CP who_i [TP she thought [CP t_i that [TP t_i was her boyfriend]]]].\n\n<B>\na. Who do you think that they told me that would come?\nb. I only recommend a program I feel will help improve your English.\nc. What assurance do I have that this food is actually good for my body?\nd. Who did Sam say Tim wanted Pam to try to convince Jim to get me to hire?\ne. This is good for a legal system critics said that appeared troubled by arrogance.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"통사론(syntax) 영역. that-trace effect: wh-이동이 주어 위치에서 일어날 때 overt 'that' 보문소가 있으면 비문. 목적어 위치 이동은 'that' 있어도 허용.\n<A> 규칙:\n- 목적어 wh-이동 + that: OK (1b)\n- 주어 wh-이동 + that 없음: OK (2a)\n- 주어 wh-이동 + that 있음: 비문 (2b) ← that-trace effect\n- 관계절에도 동일 적용 (4b 비문)","key_terms":["that-trace effect","wh-movement","subject position","complementizer"]},{"step":2,"label":"이론 ↔ 지문 대응 — 각 예문 분석","explanation":"(a) 'Who do you think [that they told me [that ___ would come]]?'\n→ 가장 안쪽 절 'that ___ would come'에서 주어 위치 이동 + overt 'that' → that-trace ✗\n\n(b) 'a program [I feel ___ will help]' → 'that' 없음 + 주어 위치 → OK ✓\n\n(c) 'What assurance do I have [that this food is good]?' → 'what'은 목적어('assurance' 수식) → OK ✓\n\n(d) 'Who did Sam say [Tim wanted [...to hire ___]]?' → 목적어 위치 추출, 'that' 없음 → OK ✓\n\n(e) 'a legal system [critics said [that ___ appeared troubled]]' → 관계절 주어 위치 + overt 'that' → that-trace ✗","key_terms":["subject extraction","object extraction","that-trace","relative clause"]},{"step":3,"label":"후보 소거 — 비문 2개 확정","explanation":"문법문 확인:\n(b): 'I feel will help' → overt 'that' 없음 → 주어 이동 OK → 정문 ✓\n(c): 'What' = free relative / 목적어 위치, 내포절의 주어 없음 아님 → 정문 ✓\n(d): 긴 연속 이동이지만 전부 목적어 위치에서의 추출 → 정문 ✓\n\n비문 확정:\n(a): 주어 추출 + overt 'that' → ✗\n(e): 관계절 주어 갭 + overt 'that' → ✗","key_terms":["(a) ungrammatical","(e) ungrammatical"]},{"step":4,"label":"확정 근거 — 정답 확정","explanation":"(a) 비문 이유:\n'who'가 내포절 'that would come'의 주어 위치에서 추출됨. 이 내포절에 overt 보문소 'that' 존재 → <A> (2b) 패턴과 동일 → that-trace effect 위반.\n\n(e) 비문 이유:\n'a legal system'이 관계절 내 'critics said that ___ appeared troubled'의 주어 위치에서 갭을 가짐. 관계절 내 overt 'that' 존재 → <A> (4b) 패턴 적용 → that-trace effect 위반.","key_terms":["that-trace effect","subject gap","relative clause violation"],"tree":{"label":"CP","children":[{"label":"who_i","children":[]},{"label":"C'","children":[{"label":"C","children":[{"label":"do","children":[]}]},{"label":"TP","children":[{"label":"you","children":[]},{"label":"T'","children":[{"label":"T","children":[]},{"label":"VP","children":[{"label":"think","children":[]},{"label":"CP*","children":[{"label":"C","children":[{"label":"that","children":[]}]},{"label":"TP","children":[{"label":"t_i","trace":true,"children":[]},{"label":"T'","children":[{"label":"would come","children":[]}]}]}]}]}]}]}]}]}},{"step":5,"label":"전략 메모","explanation":"that-trace effect 출제 패턴:\n① 이동 원소가 주어 위치에서 나왔는지 확인 (주어 위치 = TP 명시어).\n② overt 'that' 보문소 존재 여부 확인.\n③ wh-의문문과 관계절 모두 적용됨 (4b 핵심).\n함정:\n- (d)처럼 긴 추출이어도 목적어 위치이면 OK.\n- (b)처럼 주어 추출이어도 'that' 없으면 OK.\n서술 순서: 비문 2개 명시 → 각각 주어 위치 + overt 'that' → that-trace 위반 명시.","key_terms":["subject gap","overt complementizer","that-trace"]}],"key_terms":[{"term":"That-trace effect","definition_en":"A syntactic constraint that prohibits wh-movement (or relativization) from subject position when the overt complementizer 'that' is present: *Who do you think that ___ left?","definition_ko":"that-흔적 효과 — overt 보문소 'that'이 있을 때 주어 위치에서의 wh-이동이 금지되는 통사 제약.","source_author":"Chomsky & Lasnik","source_year":1977,"related_terms":["ECP (Empty Category Principle)","wh-movement","complementizer"],"exam_usage":"(a)와 (e)가 that-trace effect 위반으로 비문"},{"term":"Complementizer (C)","definition_en":"A functional head that introduces embedded clauses (that, if, whether, for). In the that-trace effect, the overt complementizer 'that' blocks government of the subject trace.","definition_ko":"보문소 — that, if, whether 등 내포절을 도입하는 기능범주. overt 'that'이 주어 흔적의 통치를 차단.","source_author":"Carnie","source_year":2013,"related_terms":["CP","TP","trace","that-trace effect"],"exam_usage":"overt 'that' 유무가 that-trace 적용 여부 결정"},{"term":"Wh-movement","definition_en":"A syntactic operation that moves a wh-word (who, what, which, etc.) from its base position to the left periphery (SpecCP). Leaves a trace (t) at the extraction site.","definition_ko":"wh-이동 — 의문사/관계사가 기저 위치에서 문두(SpecCP)로 이동. 이동 원래 위치에 흔적(trace) 잔존.","source_author":"Carnie","source_year":2013,"related_terms":["trace","island constraint","that-trace effect"],"exam_usage":"that-trace effect = wh-이동이 주어에서 일어날 때의 제약"}],"vocabulary":[{"word":"complementizer","pos":"n.","definition_ko":"보문소 — that, if, whether 등 내포절 도입 기능어","example":"I think [that she left]. / I think [she left]."},{"word":"trace (t)","pos":"n.","definition_ko":"흔적 — 이동 후 원래 위치에 남는 빈 자리","example":"What_i did you buy t_i?"},{"word":"wh-movement","pos":"n.","definition_ko":"wh-이동 — 의문사/관계사의 문두 이동","example":"Who_i do you think t_i left?"}],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"(a) and (e) are ungrammatical. In (a), \"who\" is extracted from the subject position of the embedded clause while the overt complementizer \"that\" is present, violating the that-trace effect. In (e), the relative clause contains a subject gap after overt \"that,\" and as <A> shows, the that-trace effect applies to relative clauses as well.","scoring_criteria":[{"criterion":"(a), (e) 정확히 식별","points":1},{"criterion":"(a) 설명: 주어 위치 wh-이동 + overt 'that' → that-trace 위반","points":1.5},{"criterion":"(e) 설명: 관계절 주어 위치 + overt 'that' → that-trace 위반","points":1.5}]},"variants":[{"label":"답안 A","source_type":"variant","content":"(a) and (e) are ungrammatical. In (a), 'who' is moved from the subject position of the clause 'that would come' while the complementizer 'that' is overt — a clear that-trace effect violation. In (e), the relative clause contains a subject gap after 'that appeared,' and since the that-trace effect applies to relative clauses as stated in <A>, the sentence is ungrammatical."},{"label":"답안 B","source_type":"variant","content":"The ungrammatical examples are (a) and (e). Example (a) violates the that-trace effect: 'who' is extracted from the subject position of an embedded clause with the overt complementizer 'that.' Example (e) similarly violates it in a relative clause: 'a legal system' fills a subject gap in the relative clause introduced by overt 'that.'"}]},"source":{"references":[{"type":"textbook","author":"Carnie, A.","title":"Syntax: A Generative Introduction (3rd ed.)","year":2013,"publisher":"Wiley-Blackwell","pages":"pp. 352–358","excerpt":"The <span class=\"ref-hl\">that-trace effect</span>: when a <span class=\"ref-hl\">complementizer that is present</span>, <span class=\"ref-hl\">extraction of the subject is blocked</span>. *Who do you think that left?"},{"type":"paper","author":"Perlmutter, D.","title":"Deep and Surface Structure Constraints in Syntax","year":1971,"publisher":"Holt, Rinehart & Winston","pages":"pp. 45–60","excerpt":"The <span class=\"ref-hl\">that-trace filter</span> prohibits the sequence <span class=\"ref-hl\">[that t]</span> where t is a <span class=\"ref-hl\">subject trace</span>."}],"concept_explanation":"The that-trace effect (Chomsky & Lasnik 1977):\n\nWh-movement from subject position is blocked when the overt complementizer 'that' is present.\n  (주어 위치에서의 wh-이동은 overt 'that' 보문소가 있을 때 금지.)\n\nObject extraction: always grammatical with or without 'that'.\n  (목적어 추출: 'that' 있어도 항상 OK.)\n  What did you think (that) Peter bought? ✓\n\nSubject extraction:\n  Without 'that': OK   Who do you think ___ left? ✓\n  With 'that': UNGRAMMATICAL   *Who do you think that ___ left? ✗\n  (주어 추출: 'that' 없으면 OK, 'that' 있으면 비문.)\n\nRelative clauses: same constraint applies (4b in passage).\n  (관계절에도 동일 적용.)\n  *She saw the boy who she thought that ___ was her boyfriend. ✗"},"related":{"enabled":true,"questions":[{"id":"linguistics_2020_A05","year":2020,"number":"A-5","subject":"linguistics","connection_type":"same_concept","connection_note":"wh-이동과 섬 제약. that-trace effect 관련 통사 제약 주제 공유.","shared_keywords":["wh-movement","extraction","island constraint"]}]}},"linguistics_2026_A04.json":{"meta":{"id":"linguistics_2026_A04","year":2026,"number":"A-4","subject":"linguistics","linguistics_domain":"phonology","question_type":"short_answer","score":2,"tags":["geminate consonants","long consonants","monomorphemic","phonology"],"parse_source":"2026_linguistics_A.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the ONE most appropriate word.","passage":"In English, a lot of words include double consonants in their spellings, which do not reflect their actual pronunciation. To elaborate further, double consonants in spellings normally are not articulated for a longer period of time than the corresponding single consonants, as shown in (1).\n\n(1) belly [bɛli], *[bɛl:i]\nnarrow [næɹoʊ], *[næɹ:oʊ]\npenny [pɛni], *[pɛn:i]\ncomment [kɑmɛnt], *[kɑm:ɛnt]\nmessage [mɛsɪʤ], *[mɛs:ɪʤ]\neffort [ɛfəɹt], *[ɛf:əɹt]\ncabbage [kæbɪʤ], *[kæb:ɪʤ]\nhippo [hɪpoʊ], *[hɪp:oʊ]\n\nIn contrast with the words in (1), the words or phrases in (2) are pronounced with long consonants, which are marked with ':'.\n\n(2) milkcrate [mɪlk:ɹeɪt]  house sale [haʊs:eɪl]\nunknown [ʌn:oʊn]  ill-looking [ɪl:ʊkɪŋ]\n\nThe data in (1) and (2) indicate that [BLANK] are not allowed in monomorphemic English words, while they can be created when words are compounded or combined with certain affixes.\n\nNote: '*' indicates unattested pronunciation.","blanks":[{"label":"빈칸","context":"___ are not allowed in monomorphemic English words"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"음운론(phonology) 영역. 영어의 장자음(long consonant) 허용 조건에 관한 문제. 빈칸은 ONE word. 'monomorphemic English words'에 허용되지 않는 음운 현상을 기술적 용어로 채워야 함. 반면 (2)의 복합어/파생어에서는 허용됨을 대비 구조로 파악.","key_terms":["geminate","long consonant","monomorphemic"]},{"step":2,"label":"이론 ↔ 지문 대응 — 데이터 해석","explanation":"(1) 데이터: belly [bɛli] ← *[bɛl:i], penny [pɛni] ← *[pɛn:i] 등 → 철자상 이중자음이지만 발음상 장자음 불가. 단일형태소 내부.\n(2) 데이터: milk-crate [mɪlk:ɹeɪt], un-known [ʌn:oʊn] → 형태소 경계에서 장자음 가능.\n결론: 장자음(geminate) = 단일형태소 내 금지 / 형태소 경계에서 허용.","key_terms":["geminate constraint","morpheme boundary"]},{"step":3,"label":"후보 소거 — 기술적 용어 특정","explanation":"후보: long consonants / double consonants / geminates\n→ 'long consonants': 지문에서 사용되나 기술적 용어로는 덜 정확.\n→ 'double consonants': 지문에서 철자 표기 용어로 사용 → 음운 단위 아님.\n→ 'geminates': 음운론 표준 용어. 장자음을 가리키는 학술 용어(Kenstowicz 1994). 발문 빈칸 구조 'that ___ are not allowed'에서 복수 명사 형태 'geminates' 적합.","key_terms":["geminates","geminate consonants"]},{"step":4,"label":"확정 근거 — 지문 직접 근거","explanation":"빈칸 문장: 'that ___ are not allowed in monomorphemic English words, while they can be created when words are compounded or combined with certain affixes.'\n→ (1)에서 장자음 발음이 asterisk(*) 처리 = 비규범 발음 = 허용 안 됨.\n→ (2)에서 복합어·파생어에서만 장자음 생성 = 형태소 경계에서 허용.\n→ 이 현상의 음운론 용어 = geminates (geminate consonants도 허용).","key_terms":["geminates"]},{"step":5,"label":"전략 메모","explanation":"음운론 geminate 제약 출제 패턴: 단일형태소 vs 형태소 경계 대비 데이터 제시 → 해당 음운 현상 용어 채우기. 기술적 용어(geminates)와 일상 표현(long consonants, double consonants)을 구별할 것. 빈칸 앞뒤 구조(복수 주어 'are not allowed')로 품사·수 확인 필수.","key_terms":["geminate constraint","OCP (Obligatory Contour Principle)"]}],"key_terms":[{"term":"Geminate (consonant)","definition_en":"A long consonant represented phonetically with the length mark [C:], produced by an articulation held for a longer duration. Prohibited within monomorphemic English words but possible across morpheme boundaries.","definition_ko":"장자음 — [C:]로 표기되는 길게 발음되는 자음. 영어 단일형태소 내부에서 금지되나 형태소 경계에서는 가능.","source_author":"Kenstowicz","source_year":1994,"related_terms":["OCP","long consonant","monomorphemic"],"exam_usage":"빈칸: 단일형태소에서 금지되는 음운 현상 = geminates"},{"term":"Obligatory Contour Principle (OCP)","definition_en":"A phonological principle that prohibits adjacent identical elements at the same level of representation, accounting for the ban on geminates within morphemes in many languages.","definition_ko":"의무대조원리 — 동일 음운 단위의 인접을 금지. 영어 단일형태소 내 장자음 금지의 이론적 근거.","source_author":"Kenstowicz","source_year":1994,"related_terms":["geminate","phonological constraint"],"exam_usage":"geminate 제약의 이론적 배경으로 제시 가능"}],"vocabulary":[{"word":"geminate","pos":"n./adj.","definition_ko":"장자음, 겹자음 — 두 개의 동일 자음이 연속하여 길게 발음되는 것","example":"belly *[bɛl:i] — geminate /l:/ not allowed"},{"word":"monomorphemic","pos":"adj.","definition_ko":"단일 형태소로 이루어진 — 단 하나의 형태소로 구성된 단어","example":"belly, narrow, penny = monomorphemic words"}],"translation":""},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"geminates"}],"essay_content":"","scoring_criteria":[{"criterion":"geminates (또는 geminate consonants / long consonants)","points":2}]},"variants":[]},"source":{"references":[{"type":"textbook","author":"Kenstowicz, M.","title":"Phonology in Generative Grammar","year":1994,"publisher":"Blackwell","pages":"pp. 354–360","excerpt":"<span class=\"ref-hl\">Geminates</span> are <span class=\"ref-hl\">prohibited</span> word-internally in English monomorphemic words; however, they arise at morpheme boundaries through concatenation."},{"type":"textbook","author":"Fromkin, V., Rodman, R., & Hyams, N.","title":"An Introduction to Language (11th ed.)","year":2018,"publisher":"Cengage Learning","pages":"Ch. 7","excerpt":"English does not permit long (<span class=\"ref-hl\">geminate</span>) consonants <span class=\"ref-hl\">within a single morpheme</span>, though sequences of identical consonants may arise across morpheme boundaries."}],"concept_explanation":"Geminate consonants in English (Kenstowicz 1994):\n\nGeminates [C:] are prohibited within monomorphemic (single-morpheme) English words.\n  (장자음은 영어 단일형태소 내부에서 허용되지 않음.)\n  belly [bɛli] ✓  *[bɛl:i] ✗\n  penny [pɛni] ✓  *[pɛn:i] ✗\n\nHowever, geminates CAN be created at morpheme boundaries:\n  (형태소 경계에서는 장자음 가능.)\n  milk+crate → [mɪlk:ɹeɪt] ✓\n  un+known → [ʌn:oʊn] ✓\n  ill+looking → [ɪl:ʊkɪŋ] ✓\n\nTheoretical basis: Obligatory Contour Principle (OCP) — prohibits adjacent identical elements within a morpheme.\n  (이론적 근거: 의무대조원리 — 형태소 내 동일 음운 인접 금지.)"},"related":{"enabled":true,"questions":[]}},"linguistics_2026_A06.json":{"meta":{"id":"linguistics_2026_A06","year":2026,"number":"A-6","subject":"linguistics","linguistics_domain":"phonology","question_type":"essay","score":4,"tags":["j-dropping","yod-dropping","distinctive features","coronal","anterior","phonology"],"parse_source":"2026_linguistics_A.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"In consultation with the table in (5), fill in each of the blanks ① and ② with the ONE most appropriate distinctive feature. The feature value ('+' or '－') must be specified. Then generalize the patterns in (4).","passage":"Pairs such as threw-through and brewed-brood used to be distinguished by the presence of /j/ in the former member of each pair and the absence in the latter. In certain environments the /j/ disappeared and accordingly, the pairs mentioned above are homophones in most English accents. The words in (1) underwent the same historical change, /j/-dropping, so they do not have /j/ now.\n\n(1) chute [ʃut], chew [ʧu], juice [ʤus]\nrude [ɹud], crew [kɹu], shrewd [ʃɹud], grew [gɹu]\n\nIn Modern British English, the words in (2) are losing /j/ and consequently, there is variation in their pronunciation.\n\n(2) enthusiasm [ɪnθjuziæzəm] ~ [ɪnθuziæzəm],\nthulium [θjuliəm] ~ [θuliəm]\nassume [əsjum] ~ [əsum], sue [sju] ~ [su]\nresume [ɹɪzjum] ~ [ɹɪzum], presume [pɹɪzjum] ~ [pɹɪzum]\nlewd [ljud] ~ [lud], lurid [ljuɹɪd] ~ [luɹɪd]\n\nHowever, the words in (3) are not involved in the change.\n\n(3) pure [pjʊɹ], *[pʊɹ]  few [fju], *[fu]\nview [vju], *[vu]  cue [kju], *[ku]\n\nOn the basis of the data above, we can generalize that /j/-dropping is completed after the coronal consonants with [①], and it is now optional depending on dialects or speakers after those with [②]. However, there seem to be exceptions to this generalization. The words in (4) used to contain /j/, but they do not now, as the words in (1).\n\n(4) blue [blu], *[blju]  flute [flut], *[fljut]\nflew [flu], *[flju]  glue [glu], *[glju]\n\n(5) Distinctive features\n/p,b,m,f,v/ /θ,ð/ /t,d,n,l/ /s,z/ /ʃ,ʒ,ʧ,ʤ/ /ɹ/ /j/ /k,g,ŋ/ /h/\n[labial]    +    -    -    -    -    -    -    -    -\n[coronal]   -    +    +    +    +    +    +    -    -\n[dorsal]    -    -    -    -    -    -    +    +    -\n[anterior]  +    +    +    +    -    -    -    -    -\n[strident]  -    -    -    +    +    -    -    -    -\n\nNote: '*' indicates unattested pronunciation.","blanks":[{"label":"①","context":"coronal consonants with [①] — j-dropping 완료"},{"label":"②","context":"coronal consonants with [②] — j-dropping 선택적"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"음운론(phonology) 영역. j-dropping(yod-dropping) 환경 분석 문제. 두 빈칸은 feature 값(+/-) 포함한 단일 feature. 세 그룹 구별:\n(1) j-dropping 완료 자음\n(2) j-dropping 선택적 자음\n(3) j-dropping 무관 자음\n(4) 예외 → 일반화 요구\nfeature 표(5) 참조하여 (1)과 (2)의 공통 feature 차이 파악.","key_terms":["j-dropping","yod-dropping","distinctive feature","coronal","anterior"]},{"step":2,"label":"이론 ↔ 지문 대응 — 자음 분류 및 feature 확인","explanation":"(1) j-dropping 완료 자음: ʃ, ʧ, ʤ (chute, chew, juice) + ɹ (rude, crew)\n→ 표(5)에서: ʃ,ʒ,ʧ,ʤ = [coronal +, anterior -, strident +], ɹ = [coronal +, anterior -, strident -]\n→ 공통: [coronal +, anterior -] → ① = [-anterior]\n\n(2) j-dropping 선택적 자음: θ (enthusiasm, thulium), s,z (assume, sue, resume), l (lewd)\n→ 표(5)에서: θ,ð = [coronal +, anterior +], s,z = [coronal +, anterior +, strident +], l = [coronal +, anterior +]\n→ 공통: [coronal +, anterior +] → ② = [+anterior]\n\n(3) j-dropping 무관: p,b,f,v,k,g = [-coronal] → 관련 없음.","key_terms":["[-anterior]","[+anterior]","palato-alveolar","alveolar/dental"]},{"step":3,"label":"후보 소거 — feature 확정","explanation":"① 후보: [-anterior] vs [-strident]\n→ [-anterior]: ʃ,ʧ,ʤ,ɹ 모두 포함. 완전 탈락 자음 전체 설명.\n→ [-strident]: ɹ은 [-strident]이지만 ʃ,ʧ,ʤ는 [+strident] → ɹ 포함 안 됨. 부적절.\n→ ① = [-anterior] 확정.\n\n② 후보: [+anterior] vs [+strident]\n→ [+anterior]: θ,s,z,l 모두 포함. 선택적 탈락 자음 전체 설명.\n→ [+strident]: s,z만 해당. θ,l 제외 → 부적절.\n→ ② = [+anterior] 확정.","key_terms":["[-anterior] = ①","[+anterior] = ②"]},{"step":4,"label":"확정 근거 + (4) 일반화","explanation":"① = [-anterior] 확정: ʃ[−ant],ʧ[−ant],ʤ[−ant],ɹ[−ant] 뒤에서 j-dropping 완료.\n② = [+anterior] 확정: θ[+ant],s[+ant],z[+ant],l[+ant] 뒤에서 j-dropping 선택적.\n\n(4) 일반화: blue, flute, flew, glue → bl-, fl-, gl-은 자음군(consonant cluster). /l/ = [+anterior]이므로 일반화상 선택적 탈락 예상. 그러나 실제로는 완전 탈락(j 없음). 이유: 자음군 내 /l/ 앞에서는 cluster 조건으로 j-dropping이 완료됨 — [+anterior]라도 cluster 내 /l/ 앞은 예외적 완료 환경.","key_terms":["consonant cluster","j-dropping before /l/ in clusters","exception generalization"]},{"step":5,"label":"전략 메모","explanation":"음운론 feature 분석 출제 패턴:\n① 자음 그룹별 feature 표 참조 → 공통 feature 파악 (표 직접 활용).\n② 두 그룹을 구별하는 feature 하나를 특정 (± 값 포함 필수).\n③ 예외 패턴은 데이터 관찰 → 새로운 환경(cluster) 명시하여 일반화.\n함정: [strident]로 접근하면 ɹ(j-dropping 완료)를 설명 못 함 → [anterior]가 더 포괄적.","key_terms":["feature analysis","phonological generalization"]}],"key_terms":[{"term":"[anterior]","definition_en":"A distinctive feature: [+anterior] consonants are articulated at or in front of the alveolar ridge (dental, alveolar). [−anterior] consonants are articulated behind the alveolar ridge (palato-alveolar, retroflex).","definition_ko":"[전방성]: [+anterior] = 치조 이전 위치 조음(치음·치조음). [−anterior] = 치조 후방 조음(경구개치조음, 권설음).","source_author":"Chomsky & Halle","source_year":1968,"related_terms":["coronal","strident","place of articulation"],"exam_usage":"j-dropping 완료([−anterior]) vs 선택적([+anterior]) 구분 feature"},{"term":"Yod-dropping (j-dropping)","definition_en":"A phonological process in English whereby /j/ (yod) is deleted after certain consonants. Completed after [−anterior] coronals (ʃ, ʧ, ʤ, ɹ); optional after [+anterior] coronals (θ, s, z, l) in many accents.","definition_ko":"j-탈락(yod-dropping) — 특정 자음 뒤에서 /j/가 삭제되는 영어 음운 현상. [−anterior] 자음 뒤: 완료. [+anterior] 자음 뒤: 선택적.","source_author":"Wells","source_year":1982,"related_terms":["historical change","homophone","RP","anterior feature"],"exam_usage":"지문 전체 주제: j-dropping 환경 분석 → ①② feature 채우기"}],"vocabulary":[{"word":"yod-dropping / j-dropping","pos":"term","definition_ko":"/j/ 음이 특정 자음 뒤에서 탈락하는 음운 현상","example":"chute [ʃut] (← formerly [ʃjut])"},{"word":"coronal","pos":"distinctive feature","definition_ko":"혀끝/날이 조음에 관여하는 자음 특성 — θ,ð,t,d,n,l,s,z,ʃ,ʒ,ʧ,ʤ,ɹ,j","example":"[coronal +]: θ, s, ʃ, ɹ, l"},{"word":"anterior","pos":"distinctive feature","definition_ko":"치조 또는 그 앞에서 조음되는 자음 특성","example":"[+anterior]: θ, t, d, s, z, l / [−anterior]: ʃ, ʒ, ʧ, ʤ, ɹ"}],"translation":""},"answer":{"model_answer":{"blank_answers":[{"label":"①","answer":"[−anterior]"},{"label":"②","answer":"[+anterior]"}],"essay_content":"The words in (4) contain consonant clusters ending in /l/ (bl, fl, gl). Although /l/ is [+anterior], /j/-dropping is complete when /l/ follows another consonant in a cluster. Thus, the pattern generalizes that /j/-dropping also applies obligatorily before /l/ in consonant clusters, regardless of the [anterior] feature.","scoring_criteria":[{"criterion":"① [−anterior]","points":1},{"criterion":"② [+anterior]","points":1},{"criterion":"(4) 일반화: 자음군(cluster) 내 /l/ 앞에서 j-dropping 완료","points":2}]},"variants":[{"label":"답안 A","source_type":"variant","content":"The words in (4) show blue, flute, flew, and glue — all with consonant clusters (bl, fl, gl) preceding /l/. Even though /l/ is [+anterior], the obligatory j-dropping here results from the cluster environment rather than the [anterior] feature of /l/ alone."},{"label":"답안 B","source_type":"variant","content":"In (4), /j/ is absent because these words contain clusters in which /l/ is preceded by another consonant. The generalization is that j-dropping is obligatory before /l/ in consonant clusters, even though /l/ is otherwise [+anterior] and would only trigger optional j-dropping."}]},"source":{"references":[{"type":"textbook","author":"Roach, P.","title":"English Phonetics and Phonology (4th ed.)","year":2009,"publisher":"Cambridge University Press","pages":"pp. 65–68","excerpt":"<span class=\"ref-hl\">Yod-dropping</span> has been <span class=\"ref-hl\">completed after ʃ, ʧ, ʤ, and ɹ</span> in all major accents; after s, z, θ, and l, it is <span class=\"ref-hl\">variable</span> and accent-dependent."},{"type":"textbook","author":"Wells, J. C.","title":"Accents of English (Vol. 1)","year":1982,"publisher":"Cambridge University Press","pages":"pp. 205–210","excerpt":"Yod coalescence and <span class=\"ref-hl\">yod-dropping</span> patterns differ across accents of English. RP has completed yod-dropping after <span class=\"ref-hl\">palato-alveolars</span> and /ɹ/, while remaining <span class=\"ref-hl\">variable after /l/, /s/, and /z/</span>."}],"concept_explanation":"Yod-dropping (/j/-dropping) in English (Wells 1982; Roach 2009):\n\nPhonological process: /j/ is deleted after certain coronal consonants.\n  (음운 현상: 특정 관상 자음 뒤에서 /j/ 탈락.)\n\n① Completed (obligatory) after [−anterior] coronals:\n  (완전 탈락 — [−anterior] 관상음 뒤:)\n  ʃ, ʧ, ʤ, ɹ → chute [ʃut], rude [ɹud] ✓  *[ʃjut], *[ɹjud] ✗\n\n② Optional (variable) after [+anterior] coronals:\n  (선택적 탈락 — [+anterior] 관상음 뒤:)\n  θ, s, z, l → assume [səsum] ~ [sjum], lewd [lud] ~ [ljud]\n\n③ Cluster exception: obligatory j-dropping before /l/ in consonant clusters (bl, fl, gl), regardless of /l/'s [+anterior] feature.\n  (예외: 자음군 내 /l/ 앞에서는 [+anterior]임에도 완전 탈락.)\n  blue [blu] ✓  *[blju] ✗"},"related":{"enabled":true,"questions":[{"id":"linguistics_2023_B05","year":2023,"number":"B-5","subject":"linguistics","connection_type":"same_strategy","connection_note":"distinctive feature 표 참조하여 음운 환경 파악하는 동일 풀이 전략","shared_keywords":["distinctive feature","phonological environment","feature table"]}]}},"linguistics_2026_A09.json":{"meta":{"id":"linguistics_2026_A09","year":2026,"number":"A-9","subject":"linguistics","linguistics_domain":"semantics","question_type":"essay","score":4,"tags":["lexical aspect","Vendler","achievement","iteration","progressive","for-phrase"],"parse_source":"2026_linguistics_A.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Based on <A>, identify the TWO examples in <B> that have the meaning of iteration (repetition), and explain your answers. Make sure to identify the kinds of verbs used in the examples you have chosen.","passage":"<A>\nEnglish verbs can be divided into the following four kinds based on their inherent lexical aspect: state, activity, accomplishment, and achievement. State verbs describe states or situations rather than actions, as in (1):\n(1) Mary hated ice cream.\n\nActivity verbs are atelic, whereas accomplishment and achievement verbs are telic. The word telic basically means \"having a natural completion or an end point.\" Activity verbs, thus, express actions that go on for a potentially indefinite period of time, as in (2):\n(2) Sean was running.\n\nLike activity verbs, accomplishment verbs are also durative. An accomplishment verb, however, has a well-defined end point, when the particular action described in the verb phrase is, or is not, completed, as in (3):\n(3) Harry wrote a book.\n\nAchievement verbs also have a well-defined end point, but they have no duration as they describe actions that occur instantaneously, as in (4):\n(4) John kicked a tire.\n\n<B>\na. She was hitting a sandbag.\nb. She was drawing a big house.\nc. She swam in the pool for an hour.\nd. She bounced the ball for 10 minutes.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"의미론(semantics) 영역. Vendler(1957) 어휘상(lexical aspect) 4분류 중 'achievement verb'와 iteration(반복 해석) 관계 문제. 발문 조건: (1) iteration 의미 가진 예문 2개 선택, (2) 동사 유형 반드시 명시, (3) 이유 설명. iteration 발생 조건: achievement 동사(순간적·punctual) + progressive 또는 for-phrase → 단일 사건으로 지속 불가 → 반복 해석 강제.","key_terms":["lexical aspect","achievement verb","iterative reading","progressive","for-phrase"]},{"step":2,"label":"이론 ↔ 지문 대응 — Vendler 4분류 ↔ <B> 동사 분석","explanation":"<A> 4분류 ↔ <B> 동사 대응:\nState: [-dynamic, -telic] — 예: hate, know\nActivity: [+dynamic, +durative, -telic] — 예: run, swim\nAccomplishment: [+dynamic, +durative, +telic] — 예: write a book, draw a house\nAchievement: [+dynamic, -durative, +telic] — 예: kick, hit, bounce\n\n<B> 동사 분류:\n(a) hit: 발로 치는 순간적 행위 → achievement ✓\n(b) draw a big house: 완성점 있고 지속적 → accomplishment ✓\n(c) swim: 지속적, 종결점 없음 → activity ✓\n(d) bounce: 공을 튀기는 순간적 행위 → achievement ✓","key_terms":["hit = achievement","draw = accomplishment","swim = activity","bounce = achievement"]},{"step":3,"label":"후보 소거 — iteration 아닌 예문 제거","explanation":"(b) draw a big house + progressive:\n→ draw = accomplishment(지속적·telic). Progressive + accomplishment = 단순 진행 중 해석 가능('She was in the process of drawing'). Iteration 아님.\n\n(c) swim + for an hour:\n→ swim = activity(비완결적·지속적). Activity + for-phrase = 자연스러운 지속 기간 표현. 반복 강제 아님.\n\n→ iteration = achievement 동사일 때만 발생.","key_terms":["accomplishment + progressive ≠ iteration","activity + for-phrase ≠ iteration"]},{"step":4,"label":"확정 근거 — (a),(d) iteration 근거","explanation":"(a) She was hitting a sandbag:\nhit = achievement verb(순간적 사건). Progressive 'was hitting'은 단일 순간 사건을 지속할 수 없음 → 반복된 hitting 사건들의 연속 = iterative reading 강제.\n\n(d) She bounced the ball for 10 minutes:\nbounce = achievement verb(순간적). 'for 10 minutes'는 지속 시간 표시 → 단일 bounce는 순간적이므로 10분 동안 지속 불가 → 반복된 bounce 사건들 = iterative reading 강제.","key_terms":["hit = achievement + progressive → iteration","bounce = achievement + for-phrase → iteration"]},{"step":5,"label":"전략 메모","explanation":"어휘상 iteration 출제 패턴:\n① 동사 유형 먼저 분류(4분류) → achievement 동사 특정.\n② achievement + progressive or for-phrase = iteration 강제 조건 확인.\n③ accomplishment + progressive ≠ iteration (단순 진행), activity + for-phrase ≠ iteration (정상 지속) 구별.\n서술 순서: 예문 2개 명시 → 동사 유형(achievement) 명시 → progressive/for-phrase 이유 → iterative reading 도출.","key_terms":["achievement verb identification","coercion to iterative reading"]}],"key_terms":[{"term":"Lexical aspect (Aktionsart)","definition_en":"The inherent temporal/dynamic properties of a verb or verb phrase, classified by Vendler (1957) into four types: state, activity, accomplishment, and achievement.","definition_ko":"어휘상 — 동사 자체에 내재된 시간적·역동적 속성. Vendler(1957) 4분류: 상태, 활동, 완성, 달성.","source_author":"Vendler","source_year":1957,"related_terms":["telic","atelic","durative","punctual","iterative"],"exam_usage":"지문 <A>의 4분류 기준 제공 — iteration 분석의 전제"},{"term":"Achievement verb","definition_en":"A verb denoting an instantaneous (punctual), telic event with no inherent duration. When combined with progressive or for-phrases, an iterative reading is forced.","definition_ko":"달성 동사 — 순간적(punctual)이고 완결적인 사건. Progressive나 for-phrase와 결합 시 반복 해석 강제.","source_author":"Vendler","source_year":1957,"related_terms":["telic","punctual","iterative","progressive coercion"],"exam_usage":"hit, bounce = achievement verb → progressive/for-phrase → iteration"},{"term":"Iterative reading","definition_en":"An interpretation in which a single punctual event is understood as being repeated multiple times. Forced when achievement verbs co-occur with progressive aspect or for-duration phrases.","definition_ko":"반복 해석 — 단일 순간 사건이 여러 번 반복되는 것으로 해석됨. Achievement 동사 + progressive or for-phrase 조합에서 강제 발생.","source_author":"Saeed","source_year":2016,"related_terms":["achievement verb","coercion","aspectual composition"],"exam_usage":"(a) was hitting → iterative; (d) bounced for 10 minutes → iterative"}],"vocabulary":[{"word":"telic","pos":"adj.","definition_ko":"완결적 — 자연적인 종결점을 가진 사건","example":"write a book (has an endpoint: finished)"},{"word":"atelic","pos":"adj.","definition_ko":"비완결적 — 내재적 종결점이 없는 사건","example":"run, swim (no inherent endpoint)"},{"word":"durative","pos":"adj.","definition_ko":"지속적 — 일정 시간 동안 진행되는 사건","example":"was running (ongoing process)"},{"word":"instantaneous / punctual","pos":"adj.","definition_ko":"순간적 — 지속 시간 없이 순간에 발생하는 사건","example":"kick, hit, bounce"},{"word":"iterative","pos":"adj.","definition_ko":"반복적 — 동일 사건이 여러 번 반복되는 해석","example":"was hitting = repeated hitting events"}],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Examples (a) and (d) have the meaning of iteration. Hit in (a) and bounce in (d) are achievement verbs, which describe instantaneous events. In (a), the progressive aspect forces an iterative reading since a single punctual event cannot be ongoing. In (d), the for-phrase for 10 minutes requires the punctual event to be repeated.","scoring_criteria":[{"criterion":"(a), (d) 정확히 식별","points":1},{"criterion":"hit, bounce = achievement verb 명시","points":1},{"criterion":"(a) progressive → iterative 이유 설명","points":1},{"criterion":"(d) for-phrase → iterative 이유 설명","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Sentences (a) and (d) have an iterative meaning. The verbs hit and bounce are achievement verbs, denoting instantaneous events. In (a), the progressive aspect cannot hold over a single punctual event, so a repeated-event reading is forced. In (d), the for-phrase for 10 minutes requires the event to be repeated since a single bounce has no duration."},{"label":"답안 B","source_type":"variant","content":"(a) and (d) show iteration. Since hit and bounce are achievement verbs (instantaneous, punctual), combining them with progressive or a for-phrase forces a repeated-event reading: a single instantaneous event cannot extend over time."}]},"source":{"references":[{"type":"paper","author":"Vendler, Z.","title":"Verbs and Times","year":1957,"publisher":"The Philosophical Review, 66(2)","pages":"pp. 143–160","excerpt":"<span class=\"ref-hl\">Achievement verbs</span> differ from all others in that they <span class=\"ref-hl\">do not have a continuous stretch of time</span> in which they take place. They mark a <span class=\"ref-hl\">single moment</span>."},{"type":"textbook","author":"Saeed, J. I.","title":"Semantics (4th ed.)","year":2016,"publisher":"Wiley-Blackwell","pages":"pp. 132–145","excerpt":"When <span class=\"ref-hl\">achievement verbs</span> are used with the <span class=\"ref-hl\">progressive</span> or with <span class=\"ref-hl\">for-phrases</span>, a repetition or <span class=\"ref-hl\">iterative reading</span> is imposed: She was reaching the top means she reached it again and again."}],"concept_explanation":"Vendler (1957) four-way lexical aspect classification:\n  (Vendler 4분류 어휘상:)\n\n  State     [-dynamic, -telic, +stative]: hate, know, believe\n  Activity  [+dynamic, +durative, -telic]: run, swim, push\n  Accomplishment [+dynamic, +durative, +telic]: write a book, draw a house\n  Achievement [+dynamic, -durative, +telic]: hit, kick, bounce, reach\n\nIteration (coercion):\nAchievement verbs are punctual (no duration). When forced into a durative context, an iterative reading results.\n  (달성 동사는 순간적. 지속 맥락과 결합 시 반복 해석 강제.)\n\n  Achievement + progressive → repeated events:\n    She was hitting a sandbag = she hit repeatedly.\n  Achievement + for-phrase → repeated events:\n    She bounced the ball for 10 min = she bounced it many times.\n\nContrast:\n  Accomplishment + progressive = single ongoing event (NOT iteration).\n  Activity + for-phrase = natural duration (NOT iteration)."},"related":{"enabled":true,"questions":[{"id":"linguistics_2022_B06","year":2022,"number":"B-6","subject":"linguistics","connection_type":"same_concept","connection_note":"Vendler 어휘상 4분류 동일 주제. 동사 유형 식별 + 상적 해석 분석.","shared_keywords":["lexical aspect","achievement","Vendler","telic"]}]}},"education_2026_A01.json":{"meta":{"id":"education_2026_A01","year":2026,"number":"A-1","subject":"education","linguistics_domain":"","question_type":"short_answer","score":2,"tags":["corrective feedback","recast","written corrective feedback","reformulation"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the ONE most appropriate word.","passage":"Teacher's Journal\n\nI think providing corrective feedback on students' written work is important in that it can facilitate learners' language acquisition and enhance their writing skills. Students usually want me to underline or highlight the errors in their writing and provide corrections underneath. When I do this, however, they just focus on the correct answers and tend not to think about what their errors are and how they can improve their writing. For this reason, I prefer to use techniques that allow me to give not only corrective feedback but also a chance for students to pay attention to their erroneous language use. One technique that I often employ involves my rewriting of students' works by following their ideas closely but improving the language in terms of accuracy and appropriateness.\n\nThis technique, which is called __________, is very effective, but it is also time consuming. For this reason, I tweaked the technique a little bit this week as follows. First, I engaged students in a guided writing task with a set of questions and a sample writing so that the content and organization of their writing were similar. Then I chose only one student's writing instead of every student's and revised it. Afterwards, I had students in groups identify the changes by comparing the student's original writing with mine and then discuss the reasons for the changes made. Finally, I asked students to revise their own drafts based on what they learned during the discussion. Overall, it worked quite well in assisting my students to pay attention to their language errors in grammar and vocabulary and then correct them. I will definitely use this technique again.","blanks":[{"label":"빈칸","context":"This technique, which is called ___"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"written corrective feedback의 한 기법 명칭 — 교사가 학생 글을 다시 쓰는 행위\n- 단일 명사(ONE word) 요구\n- 교사가 학생 글을 내용은 유지하고 언어를 개선해 다시 작성하는 행위\n- WCF 유형 중 교사가 직접 수정본을 제공하는 방식","key_terms":["written corrective feedback","WCF"]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'my rewriting of students' works by following their ideas closely but improving t...' [paraphrase]\n→ 교사가 학습자의 의미를 최대한 유지하면서 어휘·문법·문체를 원어민답게 바꾸어 전체를 다시 작성하는 WCF 기법 (목표: native-like quality)\n\n'Students usually want me to underline or highlight the errors... provide correct...' [contrast]\n→ 직접적 WCF (direct corrective feedback) — 오류 위치에 수정 제공","key_terms":["WCF","native-like"]},{"step":3,"label":"후보 소거","explanation":"- recast: ✗ (Recast는 구두(oral) 상호작용에서 교사가 학습자 발화를 즉각적으로 수정 반복하는 oral CF 기법. written feedback 맥락에 적용 불가.)\n- explicit correction: ✗ (Explicit correction은 오류를 명시적으로 지적하고 정답을 제공하는 기법. 두 단어이며 교사가 전체 글을 다시 쓰는 행위와 다름.)\n- reformulation: ✓ (정답)","key_terms":["reformulation"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: reformulation\n\n[content] 교사가 학생 글의 아이디어를 그대로 따르면서(following their ideas closely) 어휘·문법·문체를 원어민답게 바꾸어 전체를 다시 작성하는 행위 → reformulation의 정의와 정확히 일치.\n→ 근거: \"involves my rewriting of students' works by following their ideas closely but improving the language in terms of accuracy and appropriateness\"\n\n[context_flow] 기법 활용 방식(학생 원고와 교사 수정본 비교, 변경 이유 토론, 본인 글 수정) → reformulation의 전형적 교실 활용 절차.\n→ 근거: \"had students in groups identify the changes by comparing the student's original writing with mine and then discuss the reasons for the changes made\"","key_terms":["reformulation"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① WCF 기법 식별 문제는 '교사 행동의 성격'(오류 표시 vs 전체 재작성 vs 구두 반응)을 먼저 파악한다.\n② reformulation은 written 맥락, recast는 oral 맥락 — 매체(mode) 구분이 핵심 소거 기준.\n③ 지문 내 'following their ideas closely but improving the language' 구문이 reformulation의 정의 그 자체.\n\n함정:\n- recast와 혼동 — recast는 구두 상호작용 전용이므로 written journal 문맥에 적용 불가.\n- direct feedback(오류 밑줄 + 수정 제공)은 지문에서 교사가 선호하지 않는 방식으로 명시됨.","key_terms":["reformulation","recast"]}],"key_terms":[{"term":"Reformulation","definition_en":"A written corrective feedback technique in which the teacher rewrites the learner's entire text to make it more native-like, following the learner's meaning as closely as possible while making changes in vocabulary, grammar and style (Ellis, 2008).","definition_ko":"학습자의 의미를 최대한 유지하면서 어휘·문법·문체를 원어민답게 바꾸어 교사가 전체를 다시 작성하는 서면 수정 피드백 기법.","source_author":"Ellis, R.","source_year":2008,"related_terms":["written corrective feedback","recast","direct feedback","indirect feedback"],"exam_usage":"교사 저널 지문에서 교사가 선호하는 WCF 기법으로 빈칸 답 요구"},{"term":"Written Corrective Feedback","definition_en":"Feedback provided on learners' written errors, ranging from direct correction (teacher supplies the correct form) to indirect strategies (indicating an error exists without providing the correction).","definition_ko":"학습자 작문 오류에 대한 교사 피드백. 직접(수정 제공) ~ 간접(오류 표시만) 연속체로 분류됨.","source_author":"Bitchener, J. & Ferris, D.","source_year":2012,"related_terms":["reformulation","direct feedback","metalinguistic feedback"],"exam_usage":"배경 개념으로 reformulation, recast 구분 시 활용"},{"term":"Recast","definition_en":"An implicit oral corrective feedback technique in which the teacher reformulates a learner's erroneous utterance correctly without explicitly indicating an error has occurred.","definition_ko":"구두 상호작용에서 교사가 학습자의 오류 발화를 즉각적으로 올바른 형태로 반복하는 암시적 피드백 기법.","source_author":"Long, M.","source_year":1996,"related_terms":["oral corrective feedback","implicit feedback","reformulation"],"e
