xam_usage":"reformulation과의 혼동 방지 — oral vs written 구분"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[{"label":"빈칸","answer":"reformulation"}],"essay_content":"","scoring_criteria":[{"criterion":"reformulation (철자 정확)","points":2}]},"variants":[]},"source":{"references":[{"type":"textbook","author":"Ellis, R.","title":"The Study of Second Language Acquisition (2nd ed.)","year":2008,"publisher":"Oxford University Press","pages":"pp. 489–492","excerpt":"<span class=\"ref-hl\">Reformulation</span> involves a native speaker <span class=\"ref-hl\">rewriting a learner's text</span> in order to make it more native-like. The native speaker <span class=\"ref-hl\">follows the learner's meaning</span> as closely as possible while making changes in vocabulary, grammar and style."}],"concept_explanation":"Reformulation: a Written Corrective Feedback (WCF) technique where the teacher rewrites the learner's entire text to make it more native-like, following the learner's meaning as closely as possible while making changes in vocabulary, grammar and style (Ellis, 2008).\n\nContrast with related techniques:\n- Recast: implicit oral CF — teacher reformulates erroneous utterance in real-time conversation (구두 상호작용 전용)\n- Direct feedback: teacher indicates and corrects specific errors without rewriting the whole text (오류 위치에 수정 제공)\n- Indirect feedback: teacher marks error location but does not supply the correction (오류 표시만, 수정 제공 없음)"},"related":{"enabled":true,"questions":[]}},"education_2026_A02.json":{"meta":{"id":"education_2026_A02","year":2026,"number":"A-2","subject":"education","linguistics_domain":"","question_type":"short_answer","score":2,"tags":["curriculum development","situation analysis","needs analysis"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Fill in the blank with the TWO most appropriate words.","passage":"Mr. Yang is going to develop a school curriculum for Media English based on the 2022 Revised National Curriculum. The following shows the steps of the curriculum development for Media English.\n\nStep 1: __________\nInstitutional Factors\n- Class size: large / medium / small\n- Classroom facilities: sufficient / adequate / limited\n- Digital resources: sufficient / adequate / limited\n- Budget: sufficient / adequate / limited\nTeacher Factors\n- Teaching style: lecture / project-based / cooperative\n- Digital literacy: advanced / intermediate / basic\nLearner Factors\n- Learning motivation: high / medium / low\n- English proficiency: advanced / intermediate / basic\n\nStep 2: Needs Analysis\n[Questionnaire for Students]\n1. Which of the following skills would you like to improve in Media English?\nNo. / Items / Low ←→ High (1 2 3 4 5)\n1. Lecture note-taking\n2. Giving formal speeches/presentations\n3. Viewing authentic English media contents\n\nStep 3: Goal Setting\n∙Students will be able to present information and ideas by using a variety of media.","blanks":[{"label":"Step 1","context":"Step 1: ___"}]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"Richards 교육과정 개발 모델에서 Needs Analysis 이전 단계 명칭 — 교육 환경 요인 조사\n- 두 단어(TWO words) 요구\n- 기관·교사·학습자 배경 요인 조사 = 환경 분석\n- Needs Analysis(Step 2) 바로 앞 단계","key_terms":["Needs Analysis"]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'Institutional Factors, Teacher Factors, Learner Factors — 각 요인에 대한 체크리스트 조사' [paraphrase]\n→ Richards(2001) 교육과정 개발 모델: Situation Analysis = 기관·교사·학습자 배경 환경을 파악하는 단계\n\n'Step 2: Needs Analysis — 학생 요구·희망 기술 설문' [structural]\n→ Needs Analysis = 학습자의 목표 언어 요구 파악 단계 (Situation Analysis 다음)","key_terms":["Situation Analysis","Needs Analysis"]},{"step":3,"label":"후보 소거","explanation":"- Needs Analysis: ✗ (Needs Analysis는 Step 2로 이미 제시됨. Step 1은 그 이전 단계.)\n- Context Analysis: ✗ (Richards(2001) 모델의 공식 용어는 'Situation Analysis'. 'Context Analysis'는 비표준 표현.)\n- Environmental Analysis: ✗ (Richards 모델에 존재하지 않는 명칭. 교육과정 개발 분야 표준 용어 아님.)\n- Situation Analysis: ✓ (정답)","key_terms":["Situation Analysis"]},{"step":4,"label":"확정 근거","explanation":"최종 정답: Situation Analysis\n\n[content] Institutional Factors(학교 규모·시설·예산), Teacher Factors(교수 스타일·디지털 역량), Learner Factors(학습 동기·숙달도) = 교육 환경 전반 파악 → Richards(2001) Situation Analysis의 세 하위 범주와 정확히 일치.\n→ 근거: \"Institutional Factors / Teacher Factors / Learner Factors\"\n\n[context_flow] 교육과정 개발 순서: Situation Analysis → Needs Analysis → Goal Setting — 지문의 Step 순서와 일치.\n→ 근거: \"Step 1: ___ / Step 2: Needs Analysis / Step 3: Goal Setting\"","key_terms":["Situation Analysis"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① Richards(2001) 교육과정 개발 모델의 단계 순서를 암기: Situation Analysis → Needs Analysis → Goal Setting → Material Development → Teaching → Assessment.\n② Step 1 체크리스트의 세 범주(기관·교사·학습자)가 Situation Analysis의 구성 요소임을 확인하면 즉시 식별 가능.\n③ 두 단어 조건 — 'Situation Analysis' 대문자 표기 권장.\n\n함정:\n- Needs Analysis와 혼동 — Needs Analysis는 학습자의 목표 언어 요구를 묻는 것(설문 등), Situation Analysis는 교육 환경 배경 조사.\n- 한 단어로 쓰면(context, environment) 오답 처리.","key_terms":["Situation Analysis","Needs Analysis"]}],"key_terms":[{"term":"Situation Analysis","definition_en":"The first stage in Richards's curriculum development model, which involves examining the institutional, teacher, and learner factors that will shape the curriculum before identifying learner needs.","definition_ko":"Richards(2001) 교육과정 개발 모델의 첫 단계. 기관 여건, 교사 요인, 학습자 배경 등 교육 환경 전반을 파악하는 과정.","source_author":"Richards, J. C.","source_year":2001,"related_terms":["needs analysis","goal setting","curriculum development"],"exam_usage":"교육과정 개발 Step 1 빈칸 — 체크리스트 항목이 단서"},{"term":"Needs Analysis","definition_en":"The process of gathering information about learners' language needs — what they need to do with the target language — in order to design appropriate curriculum goals.","definition_ko":"학습자가 목표 언어로 수행해야 할 과제·기술에 대한 정보를 수집하는 과정. 교육과정 목표 설정의 근거.","source_author":"Richards, J. C.","source_year":2001,"related_terms":["situation analysis","target needs","learning needs"],"exam_usage":"지문 Step 2로 제시됨 — Situation Analysis와의 순서 구분 근거"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[{"label":"Step 1","answer":"Situation Analysis"}],"essay_content":"","scoring_criteria":[{"criterion":"Situation Analysis (두 단어, 철자 정확)","points":2}]},"variants":[]},"source":{"references":[{"type":"textbook","author":"Richards, J. C.","title":"Curriculum Development in Language Teaching","year":2001,"publisher":"Cambridge University Press","pages":"pp. 90–115","excerpt":"<span class=\"ref-hl\">Situation analysis</span> examines factors in the situation that will have an impact on decisions about the goals and content of a language program. These include <span class=\"ref-hl\">institutional factors</span> (the school system), <span class=\"ref-hl\">teacher factors</span> (training and experience), and <span class=\"ref-hl\">learner factors</span> (age, proficiency, and motivation)."}],"concept_explanation":"Situation Analysis: the first stage in curriculum development that examines the educational context — institutional resources, teacher characteristics, and learner backgrounds — before determining what learners need to learn (Richards, 2001).\n  (교육과정 개발의 첫 단계. 기관 여건·교사 특성·학습자 배경을 파악하여 이후 Needs Analysis의 방향을 결정함)\n\nCurriculum Development Sequence (Richards, 2001):\n  Situation Analysis → Needs Analysis → Goal Setting → Material Development → Teaching → Assessment\n  (상황분석 → 요구분석 → 목표설정 → 자료개발 → 교수 → 평가)\n\nKey distinction:\n- Situation Analysis: examines the teaching-learning environment (WHO teaches WHOM, WHERE, with WHAT resources)\n- Needs Analysis: examines what learners need to DO with the target language"},"related":{"enabled":true,"questions":[]}},"education_2026_A07.json":{"meta":{"id":"education_2026_A07","year":2026,"number":"A-7","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["supplementary materials","design principles","pragmatics","information gap","communicative drills"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the ONE principle in <A> that is applied to Material 1 in <B> and the ONE principle in <A> to Material 2 in <B>. Then explain your answers with evidence from <B>.","passage":"<A>\nMs. Lee, a middle school English teacher, is a member of the English textbook selection committee in her school. During the selection process, the English teachers evaluated ten textbooks and selected one. Before the semester began, they conducted an in-depth analysis of the selected textbook and decided they would need some supplementary materials when using the textbook. Some of the design principles which they considered to create their supplementary materials are listed below.\n\n<Design principles>\n1. Vocabulary exercises contain word-part analysis.\n2. Grammar practice is presented through communicative drills.\n3. Culture learning activities include various group projects.\n4. Sufficient background information is provided in listening activities.\n5. Speaking activities include practicing pragmatic skills.\n\n<B>\nMs. Lee developed two supplementary materials to be used with the textbook.\n\n<Material 1> \"Something strange\"\nStep 1. Look at the following utterances to make requests. Order them from the least polite (1) to the most polite (5).\n- Would you mind turning the radio down?\n- I hate to ask, but you couldn't possibly turn the radio down, could you?\n- Turn the radio down!\n- Can you turn the radio down?\n- Would you turn the radio down, please?\nStep 2. Read the conversation below, and find one utterance that seems inappropriate in the context.\n[Mom and Dad are talking about their daughter Olivia.]\nDad: What is that terrible noise?\nMom: It's the radio. That's what Olivia calls music.\nDad: It's so loud. Why can't she turn it down?\nMom: Can you talk to her about the noise?\nDad: Olivia! I was just wondering if you'd mind turning the radio down.\nMom: I don't think she can hear you.\nStep 3. Replace the utterance you found in Step 2 with the appropriate one in Step 1. Then act out the conversation with the replaced utterance.\n\n<Material 2> \"What's your plan?\"\nStep 1. Make groups of four. Write down individually what you want to do next week in your weekly planner.\nStep 2. With your group members, take turns asking about their plans as below.\nA: What are you going to do next Saturday?\nB: I'm going to go camping. How about you, Charlotte?\nA: I'm going to watch a movie.\nB: It sounds good.\nStep 3. Compare your plans with your friends'.\nStep 4. Circle the day where you have the same plans as your friends do.\nStep 5. The student who has the most circles wins.\n[Weekly planner table: Sun. Mon. Tue. Wed. Thur. Fri. Sat. / My Plans / ___'s Plans]","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"각 Material이 어느 Principle에 해당하는지 교사·학습자 활동 내용으로 매핑\n- Material 1: speaking + politeness/appropriateness 관련 활동 → Principle 5(화용 기술)\n- Material 2: grammar(be going to) + meaningful information exchange → Principle 2(의사소통 드릴)\n- Principle 번호와 내용 정확히 기술 필요","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'Material 1: 요청 표현 공손도 순위 매기기 + 맥락 부적절 발화 식별 + 대화 재연' [paraphrase]\n→ Principle 5: Speaking activities include practicing pragmatic skills\n\n'Material 2: 개인 계획 정보 공유 + 'be going to' 구조 반복 사용 + 정보 차이 활동' [paraphrase]\n→ Principle 2: Grammar practice is presented through communicative drills","key_terms":["pragmatic skills","communicative drills"]},{"step":3,"label":"후보 소거","explanation":"- Principle 3 (group projects): ✗ (Material 2는 그룹 활동을 포함하지만 문화 학습(culture learning)이 목적이 아니므로 Principle 3 해당 없음.)\n- Principle 1 (word-part analysis): ✗ (두 Material 모두 어휘 형태 분석 활동 없음.)\n- Principle 4 (background info for listening): ✗ (두 Material 모두 듣기 활동 아님.)\n- Principle 5 for Material 1: ✓ (정답)\n- Principle 2 for Material 2: ✓ (정답)","key_terms":[]},{"step":4,"label":"확정 근거","explanation":"최종 정답: Material 1 → Principle 5 / Material 2 → Principle 2\n\n[content] Material 1 Step 1에서 학습자가 요청 표현의 공손도를 순위 매김 → 화용적 적절성(pragmatic appropriateness) 인식 훈련. Step 2에서 대화 맥락에 부적절한 발화 식별 → 상황별 발화행위 적합성 판단 = 화용 기술 연습.\n→ 근거: \"Order them from the least polite (1) to the most polite (5) / find one utterance that seems inappropriate in the context\"\n\n[content] Material 2에서 학생들이 각자 다른 계획(genuine personal information)을 가지고 'be going to' 구조를 사용하여 실제 정보를 교환 → 문법이 의미 있는 의사소통 맥락에 통합된 communicative drill.\n→ 근거: \"Write down individually what you want to do next week / take turns asking about their plans\"","key_terms":["communicative drill","pragmatic skills"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① Design principle 매핑 문제: 활동 내용의 핵심 목적(기술 영역 + 연습 방식)을 principle 키워드와 직접 대응시킨다.\n② Principle 5 식별 기준: speaking + politeness / appropriateness / speech acts → pragmatic skills.\n③ Principle 2 식별 기준: grammar structure + real information exchange / meaningful context → communicative drills.\n③ 근거는 지문 내 구체적 활동 지시문(단계 설명)에서 인용한다.\n\n함정:\n- Material 2를 Principle 3(group projects)으로 혼동 — 그룹 활동이 있어도 목적이 grammar practice이면 Principle 2.\n- Principle 5와 Principle 4를 혼동 — Principle 4는 '듣기 활동에 배경 정보 제공'으로 Material 1과 관련 없음.","key_terms":["pragmatic skills","communicative drills","information gap"]}],"key_terms":[{"term":"Pragmatic competence","definition_en":"The ability to use language appropriately in social contexts, including knowledge of speech acts, politeness strategies, and contextual appropriateness. A component of communicative language ability, distinct from grammatical competence.","definition_ko":"발화행위, 공손 전략, 맥락 적절성 등 사회적 상황에서 언어를 적절하게 사용하는 능력. 문법 능력과 구별되는 의사소통 능력의 구성 요소.","source_author":"Bachman, L. F.","source_year":1990,"related_terms":["speech acts","politeness","sociolinguistic competence"],"exam_usage":"Material 1에서 공손도 순위·맥락 적절성 활동이 화용 능력(Principle 5)에 해당함을 논거로 사용"},{"term":"Communicative drill","definition_en":"A form of practice in which learners use target grammar structures in meaningful communicative contexts where an information gap or genuine communicative purpose exists, as distinct from mechanical repetition drills.","definition_ko":"목표 문법 구조를 단순 반복이 아닌 실제 정보 교환·의사소통 목적이 있는 맥락에서 연습하는 형태.","source_author":"Tomlinson, B.","source_year":2011,"related_terms":["information gap","meaningful practice","communicative language teaching"],"exam_usage":"Material 2에서 주간 계획 정보 교환 활동이 be going to 구조의 communicative drill(Principle 2)임을 논거로 사용"},{"term":"information gap","definition_en":"A communicative task in which each participant holds information the other does not have, creating a genuine need to communicate in order to complete the task.","definition_ko":"각 참가자가 상대방이 모르는 정보를 가지고 있어 진정한 의사소통 필요성이 발생하는 과제 유형.","source_author":"Prabhu, N. S.","source_year":1987,"related_terms":["communicative drill","task-based language teaching","genuine communication"],"exam_usage":"Material 2의 주간 플래너 비교 활동에서 정보 간격(각자 다른 계획)이 발생함을 근거로 사용"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Material 1 reflects Principle 5 since students rank requests by politeness and identify contextually inappropriate utterances, practicing pragmatic skills in speaking. Material 2 reflects Principle 2 since students practice the \"be going to\" structure by exchanging real information about weekly plans through a communicative drill.","scoring_criteria":[{"criterion":"Material 1 → Principle 5 식별","points":1},{"criterion":"Material 1 근거 설명 (공손도 순위/맥락 적절성 = 화용 능력)","points":1},{"criterion":"Material 2 → Principle 2 식별","points":1},{"criterion":"Material 2 근거 설명 (be going to 구조를 의사소통 드릴로 연습)","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Material 1 reflects Principle 5 because students practice pragmatic skills by evaluating the politeness level of requests and identifying contextually inappropriate language. Material 2 reflects Principle 2 since students practice grammar (future tense) through communicative drills by exchanging real information about their weekly plans."},{"label":"답안 B","source_type":"variant","content":"Principle 5 applies to Material 1: students order requests from least to most polite and locate an inappropriate utterance in context, both of which require pragmatic competence. Principle 2 applies to Material 2: the weekly planner activity has students use the target grammar structure communicatively by sharing genuine personal information."}]},"source":{"references":[{"type":"textbook","author":"Tomlinson, B. (Ed.)","title":"Materials Development in Language Teaching (2nd ed.)","year":2011,"publisher":"Cambridge University Press","pages":"pp. 2–31","excerpt":"Materials should provide opportunities for learners to use language for <span class=\"ref-hl\">communication</span> and to notice how language is used. <span class=\"ref-hl\">Communicative drills</span> encourage meaningful practice of target structures, while <span class=\"ref-hl\">pragmatic activities</span> develop learners' ability to use language appropriately in social contexts."}],"concept_explanation":"Principle 5 — Pragmatic competence in speaking: the ability to select and use utterances that are contextually appropriate, including awareness of politeness levels and speech act conventions (Bachman, 1990).\n  (공손 전략·발화행위 적절성 등 사회적 맥락에서 언어를 적절히 사용하는 화용 능력)\n  ※ Canale & Swain (1980)의 Communicative Competence 내 Sociolinguistic Competence에서 발전된 개념; Bachman (1990)이 Pragmatic Competence를 독립 구성요소로 명시.\n\nPrinciple 2 — Communicative drills: grammar practice embedded in a communicative context where learners have a genuine reason to exchange information, as opposed to mechanical repetition (Tomlinson, 2011).\n  (정보 간격이나 실제 의사소통 목적이 있는 맥락에서 목표 문법을 연습하는 의사소통 중심 드릴)\n\nKey distinction:\n- Mechanical drill: repetition with no communicative purpose (형태 반복, 의미 없음)\n- Communicative drill: repetition with real information exchange (형태 + 의미 있는 정보 교환)\n\nInformation gap activity: a communicative task in which two or more participants hold different pieces of information and must exchange it to complete the task, ensuring authentic communication."},"related":{"enabled":true,"questions":[]}},"education_2026_A08.json":{"meta":{"id":"education_2026_A08","year":2026,"number":"A-8","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["language testing","test validity","construct validity","test specifications"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the TWO test items that do NOT assess the intended test components accurately. Then support your answers with evidence from <A> and <B>.","passage":"<A>\nMs. Kim, an English teacher, is developing a final test for her 3rd-grade middle school students. She created test items based on the test specifications below.\n\n<Test specifications>\nItem No. / Skill / Test component / Level / Score\n1 / Listening / To understand the main idea of the discourse / Low / 2\n2 / Reading / To figure out the logical relationship between the sentences / Intermediate / 2\n20 / Reading / To infer the writer's intention from the context / Intermediate / 2\n21 / Writing / To describe personal experiences in writing / High / 10\n\n<B>\n<Test items>\n1. Listen to the following recording, and choose what the woman enjoyed the most during her trip.\n① Traveling by train ② Riding a bicycle ③ Playing board games ④ Going to a concert\n[Script]\nW: During my summer vacation, I visited my cousin Minho, who lives in Seoul. My older sister and I took a train from Busan, and it was a fun experience to take the train by ourselves. All of us did a lot of interesting activities together for a week. I liked riding a bicycle in Yeouido and visiting a board game cafe. We also went to a K-pop concert. That was my favorite part of this trip!\n\n2. Read the following sentence in the box, and find its most appropriate location in the text.\n'The coach is the main character helping the team go through their ups and downs.'\nI was fascinated by this movie that I accidentally watched on TV. (①) The plot of the movie was so amazing that I was stuck to the screen for three hours. (②) The movie is about a rugby team that faces many problems. (③) The movie describes his emotional changes vividly as well. (④) You will enjoy the process of how they grow together as a team.\n\n20. Choose the most appropriate title for the following passage.\n[passage about mobile robots patrolling schools]\n① Responsibilities of the police\n② Dramatic expansion of the robot industry\n③ Replacement of guards and alarm systems\n④ Introduction of mobile robots for school safety\n\n21. Answer each question in one complete sentence.\n1) What was the most challenging part for you when learning English?\n2) What have you tried to overcome it?","blanks":[]},"derivation":{"steps":[{"step":1,"label":"범위 설정 — 발문 조건 확인","explanation":"명세(specification)의 test component와 실제 문항이 측정하는 능력 간 불일치 식별\n- 4개 문항(1, 2, 20, 21)을 각각 명세 test component와 대조\n- 불일치 2개를 찾아 근거 제시\n- Item 번호 + 명세 component + 실제 측정 내용 모두 언급 필요","key_terms":[]},{"step":2,"label":"이론 ↔ 지문 대응","explanation":"'Item 1 명세: To understand the main idea of the discourse' [antonym]\n→ Item 1 실제 문항: choose what the woman enjoyed the most — 특정 세부 정보(specific detail) 파악\n\n'Item 2 명세: To figure out the logical relationship between the sentences' [synonym]\n→ Item 2 실제 문항: 주어진 문장의 적절한 삽입 위치 찾기 — 문장 간 논리적 관계 파악 ✓\n\n'Item 20 명세: To infer the writer's intention from the context' [antonym]\n→ Item 20 실제 문항: 가장 적절한 제목 선택 — 주제 파악(main idea identification), 의도 추론 아님\n\n'Item 21 명세: To describe personal experiences in writing' [synonym]\n→ Item 21 실제 문항: 개인 경험 서술 두 문장 — 명세 일치 ✓","key_terms":["main idea","specific detail","writer's intention"]},{"step":3,"label":"후보 소거","explanation":"- Item 2: ✗ (Item 2는 문장 삽입 위치 찾기 = 문장 간 논리적 관계 파악. 명세 'logical relationship between sentences'와 일치.)\n- Item 21: ✗ (Item 21은 개인 경험을 문장으로 서술. 명세 'describe personal experiences in writing'과 일치.)\n- Item 1: ✓ (정답)\n- Item 20: ✓ (정답)","key_terms":[]},{"step":4,"label":"확정 근거","explanation":"최종 정답: Item 1 and Item 20\n\n[content] Item 1 명세는 '담화의 주제(main idea) 이해'이나, 실제 문항은 '여자가 여행에서 가장 즐긴 것'을 묻는 specific detail 파악 문제. 스크립트에서 주제는 서울 여름 방학 여행 전반이고, 'favorite part'는 세부 내용임.\n→ 근거: \"choose what the woman enjoyed the most during her trip / That was my favorite part of this trip!\"\n\n[content] Item 20 명세는 '맥락에서 필자의 의도(writer's intention) 추론'이나, 실제 문항은 '가장 적절한 제목 선택' — 이는 main idea를 파악하는 task이지, 필자가 글을 쓴 이면의 목적·의도를 추론하는 것이 아님.\n→ 근거: \"Choose the most appropriate title for the following passage\"","key_terms":["main idea","specific detail","writer's intention"]},{"step":5,"label":"전략 메모","explanation":"출제 패턴 / 풀이 원칙:\n① 구인 타당도(construct validity) 문제는 명세 test component 키워드와 실제 문항의 요구 기술을 정확히 대조하는 것이 핵심.\n② Main idea ≠ specific detail: main idea는 담화 전반의 중심 내용, specific detail은 특정 사실·정보.\n③ Writer's intention ≠ main idea: 제목 선택은 main idea 파악, 의도 추론은 필자가 글을 쓴 목적·숨은 의미를 도출.\n\n함정:\n- Item 1에서 'K-pop concert'가 가장 즐긴 것이라는 점 때문에 main idea로 혼동 — 그러나 문항이 묻는 것(가장 즐긴 것)은 세부 정보.\n- Item 20에서 제목 선택을 '의도 추론'으로 혼동 — 제목은 중심 생각 요약이지 필자 의도 추론이 아님.","key_terms":["construct validity","main idea","specific detail"]}],"key_terms":[{"term":"Construct validity","definition_en":"The degree to which a test item measures the specific language ability (construct) it is intended to assess, as defined in the test specifications.","definition_ko":"평가 문항이 명세에서 정의한 언어 능력(구인)을 실제로 측정하는 정도. 명세와 문항 간 불일치가 구인 타당도를 위협함.","source_author":"Brown, H. D. & Abeywickrama, P.","source_year":2019,"related_terms":["test validity","test specifications","washback"],"exam_usage":"Item 1과 20이 명세와 불일치하여 구인 타당도가 위협됨을 논거로 사용"},{"term":"Test specifications","definition_en":"Detailed descriptions of what a test item is designed to measure, including the skill, test component, difficulty level, and scoring criteria, used as the blueprint for test development.","definition_ko":"평가 문항이 측정하고자 하는 기술, 구인, 난이도, 배점 등을 명시한 청사진. 문항 개발 및 타당도 검토의 기준.","source_author":"Brown, H. D. & Abeywickrama, P.","source_year":2019,"related_terms":["construct validity","test design","alignment"],"exam_usage":"지문 <A>의 명세표가 각 문항의 의도된 구인을 정의함"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Items 1 and 20 are misaligned. Item 1 aims to test main idea comprehension but asks for a specific detail — the woman's favorite activity during her trip. Item 20 is specified to assess inferring the writer's intention, but selecting a title tests main idea identification, not intention.","scoring_criteria":[{"criterion":"Item 1 식별","points":1},{"criterion":"Item 1 근거: main idea가 아닌 specific detail 측정","points":1},{"criterion":"Item 20 식별","points":1},{"criterion":"Item 20 근거: 의도 추론이 아닌 main idea/제목 파악 측정","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Items 1 and 20 fail to match their specifications. Item 1 aims to test main idea comprehension, but it asks for a specific detail (the woman's favorite activity), not the overall point of the discourse. Item 20 is meant to assess inferring the writer's intention, but choosing a title is a main idea task, not an inference of intent."},{"label":"답안 B","source_type":"variant","content":"The two misaligned items are 1 and 20. Item 1 asks about a specific detail rather than the main idea as specified. Item 20 requires selecting a title — which tests main idea identification — rather than inferring the writer's intention as stated in the specifications."}]},"source":{"references":[{"type":"textbook","author":"Brown, H. D. & Abeywickrama, P.","title":"Language Assessment: Principles and Classroom Practices (3rd ed.)","year":2019,"publisher":"Pearson","pages":"Ch. 2, pp. 22–50","excerpt":"<span class=\"ref-hl\">Construct validity</span> asks whether the test is actually measuring the construct it claims to measure. If a test item designed to measure <span class=\"ref-hl\">main idea</span> comprehension instead elicits <span class=\"ref-hl\">specific detail</span> recognition, the construct is undermined. Test specifications serve as the operational definition of the construct to be assessed."}],"concept_explanation":"Construct validity: the extent to which a test item measures the specific language ability defined in the test specifications (Brown & Abeywickrama, 2019).\n  (평가 명세에서 정의한 언어 능력을 문항이 실제로 측정하는 정도 — 명세와 문항 간 불일치가 구인 타당도를 위협)\n\nKey construct distinctions in this exam:\n- Main idea (담화 주제) vs. Specific detail (세부 정보): selecting 'the woman's favorite activity' is specific detail, not main idea\n- Writer's intention (필자 의도 추론) vs. Main idea (주제 파악): title selection = main idea task, not intention inferencing\n\nTest specifications: the blueprint document defining skill, test component, level, and score for each item — used to verify construct alignment (구인 일치 여부 검토 기준)."},"related":{"enabled":true,"questions":[]}},"education_2026_A10.json":{"meta":{"id":"education_2026_A10","year":2026,"number":"A-10","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["lesson plan","lesson objectives","culture learning","proverbs"],"parse_source":"2026_전공A.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the TWO lesson objectives that the teaching and learning activities can achieve. Then support your answers with evidence.","passage":"Title: Unit 4. Proverbs Around the World / Students: 1st grade / Date: Oct. 24 / Period: 7/10\n\nLesson Objectives: At the end of the class, Ss will be able\n1) to understand the characteristics of food-related proverbs across the world,\n2) to figure out the meanings of food-related English proverbs,\n3) to discuss the cultural differences between Korean and English food-related proverbs, and\n4) to present food-related English proverbs based on their findings.\n\nTeaching and Learning Activities:\nStep 1: T shows a list of English proverbs related to food. T asks Ss if they have heard any of the proverbs. T asks Ss what the proverbs have in common.\n\nStep 2: T provides a reading text. T has Ss read the text and checks comprehension. T asks Ss to guess the meanings of the proverbs using context and write them in Worksheet 1. T explains meanings. T has Ss discuss how the proverbs are related to the food culture of English speaking countries.\n\nStep 3: T has Ss form groups of four and find one new English proverb related to food online. T has groups make plans to introduce their proverbs in Worksheet 2 (Proverb / Possible misunderstanding / Meaning). T has groups create a news card and share it with the whole class.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 및 목표 조건 확인","explanation":"발문: 교수학습 활동이 달성 가능한 목표 2개를 식별하고 근거를 제시하라. 핵심 판단 기준: 각 Objective에 대응하는 구체적 활동이 지문에 존재하는지 여부. Objective 1(세계 속담 특성 이해), 2(영어 속담 의미 파악), 3(한국어↔영어 속담 문화 차이 토론), 4(조사 결과 기반 발표)를 각각 대조한다.","key_terms":["Objective"]},{"step":2,"label":"Objective 2 ↔ 활동 대응","explanation":"Step 2: 'T asks Ss to guess the meanings of the proverbs using context and write them in Worksheet 1. T explains meanings.' → 학생들이 문맥을 이용해 속담 의미를 추측하고 기록한 뒤 교사 설명 확인. Objective 2(영어 속담 의미 파악)와 직접 대응. 활동 증거 충분 ✓","key_terms":["context","Worksheet 1"]},{"step":3,"label":"Objective 3 ↔ 활동 대응 검토","explanation":"Objective 3: 한국어와 영어 음식 관련 속담의 문화적 차이를 토론. Step 2의 토론 주제는 'how the proverbs are related to the food culture of English speaking countries' → 영어권 문화와 속담의 연관성 토론이지, 한국어 vs 영어 문화 비교가 아님. 한국 속담과 비교하는 활동이 없으므로 Obj 3 달성 불가 ✗","key_terms":["food culture"]},{"step":4,"label":"Objective 4 ↔ 활동 대응","explanation":"Step 3: 그룹이 온라인으로 새 영어 속담을 찾고, Worksheet 2(Proverb / Possible misunderstanding / Meaning)로 소개 계획 수립, 뉴스 카드 제작 후 전체 발표. Objective 4 'present food-related English proverbs based on their findings'와 정확히 대응. 자신들의 조사 결과(findings)를 발표(present) ✓","key_terms":["findings","present"]},{"step":5,"label":"최종 선택 및 Objective 1 검토","explanation":"Objective 1(세계 속담 특성 이해): Step 1에서 공통점 찾기, Step 2에서 문화와 속담 연관성 논의가 간접적으로 해당되나, '세계 속담'의 '특성'을 체계적으로 이해하는 활동이 명시적이지 않음. 반면 Objective 2(의미 파악)와 Objective 4(발표)는 각각 Step 2와 Step 3에서 명확히 달성 가능. 최종 답: Objectives 2 and 4.","key_terms":["Objectives 2 and 4"]}],"key_terms":[{"term":"Lesson Objective","definition_en":"A specific, observable outcome statement describing what students will be able to do by the end of a lesson. Objectives should be measurable and directly addressed by the planned activities.","definition_ko":"수업 목표 — 수업 종료 시 학생이 수행 가능한 구체적·관찰 가능한 성취 진술. 계획된 활동과 직접 연결되어야 함.","source_author":"Richards & Lockhart","source_year":1994,"related_terms":["learning outcome","behavioral objective","constructive alignment"],"exam_usage":"교수학습 활동이 각 목표를 실현하는지 근거 기반으로 판단하는 문항"},{"term":"alignment","definition_en":"A principle of curriculum design in which learning outcomes, teaching activities, and assessment tasks are coherently linked so that each activity serves the stated objectives.","definition_ko":"구성적 정렬 — 학습 결과, 교수 활동, 평가가 일관되게 연결되어 있어야 한다는 교육과정 설계 원리. Biggs(1996) 제안.","source_author":"Biggs","source_year":1996,"related_terms":["lesson objective","assessment alignment","learning outcome"],"exam_usage":"활동이 목표와 정렬되어 있는지 여부를 판단하는 기준으로 활용"},{"term":"context clue","definition_en":"A reading comprehension technique in which learners infer the meaning of unknown words or expressions from surrounding textual information rather than consulting a dictionary.","definition_ko":"문맥 단서 전략 — 사전 사용 없이 주변 텍스트 정보로 모르는 표현의 의미를 추론하는 읽기 전략.","source_author":"Nation","source_year":2001,"related_terms":["meaning inference","vocabulary learning","reading strategy"],"exam_usage":"Objective 2 달성 근거: Worksheet 1에서 문맥 이용 속담 의미 추측 활동"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Objectives 2 and 4 are achievable. Objective 2 is met in Step 2, where students guess proverb meanings from context before the teacher explains them. Objective 4 is met in Step 3, where groups research a new proverb and present it to the class as a news card.","scoring_criteria":[{"criterion":"Objective 2 식별","points":1},{"criterion":"Objective 2 근거 (Step 2 문맥으로 의미 추측)","points":1},{"criterion":"Objective 4 식별","points":1},{"criterion":"Objective 4 근거 (Step 3 뉴스 카드 발표)","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Objectives 2 and 4 are achievable. In Step 2, students infer proverb meanings from context, achieving Objective 2. In Step 3, groups find a new proverb, prepare an introduction, and share it with the class, fulfilling Objective 4."},{"label":"답안 B","source_type":"variant","content":"The lesson can achieve Objectives 2 and 4. Objective 2 is met through the Worksheet 1 activity in Step 2, where students guess meanings from the reading text. Objective 4 is met in Step 3, where groups create and present a news card about a proverb they found."}]},"source":{"references":[{"type":"textbook","author":"Richards, J. C. & Lockhart, C.","title":"Reflective Teaching in Second Language Classrooms","year":1994,"publisher":"Cambridge University Press","pages":"pp. 97–112","excerpt":"<span class=\"ref-hl\">Lesson objectives</span> specify what students should be able to do as a result of the lesson and provide a basis for evaluating whether a lesson was successful."}],"concept_explanation":"A lesson objective specifies an observable, measurable outcome that students should achieve by the end of a lesson. Objectives must be directly realized by at least one planned activity — this alignment is the basis for judging achievability.\n  (수업 목표는 수업 종료 시 학생이 수행 가능한 관찰·측정 가능한 결과를 진술한다. 목표 달성 여부는 계획된 활동 중 해당 목표를 직접 실현하는 활동이 있는지로 판단한다.)\n\nConstructive Alignment: the principle that lesson objectives, learning activities, and assessment tasks are explicitly aligned so that each activity directly supports achievement of the stated objective (Biggs, 1996). Context Clue Strategy: inferring the meaning of unknown vocabulary from surrounding textual context without dictionary use."},"related":{"enabled":true,"questions":[]}},"education_2026_A12.json":{"meta":{"id":"education_2026_A12","year":2026,"number":"A-12","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["suprasegmental features","sentence stress","intonation","pronunciation teaching"],"parse_source":"2026_전공A.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the TWO most appropriate activities in <B> that help Mr. Park address the issue in <A>. Then explain your answers with evidence from <A> and <B>.","passage":"<A>\nA few weeks into the new semester, Mr. Park noticed that his first-year middle school students are quite good at perceiving and producing individual English sounds but not suprasegmental features of connected speech which are considered more likely to affect communication. In particular, they pay little attention to sentence stress, rhythm, intonation, and voice qualities and how they are used to convey meaning, emotion, and attitude in communication.\n\nReflecting on his teaching in the previous semester, he realized that he had placed almost no emphasis on the above mentioned suprasegmental aspects in his class. To address the issue, Mr. Park developed several activities which he believes can help his students raise their awareness of these aspects and understand the effect they could have on communication.\n\n<B>\n<Activity 1>\n- Listen to the following sentences, and underline the word that is emphasized in each sentence.\n- Explain the meaning of each sentence in the blank.\n1) Michael wanted to buy the red shirt. (not the red jumper)\n2) Michael wanted to buy the red shirt. (not the red jumper)\n3) Michael wanted to buy the red shirt. (not the red jumper)\n4) Michael wanted to buy the red shirt. (not the red jumper)\n5) Michael wanted to buy the red shirt. (not the red jumper)\n\n<Activity 2>\n- Work in groups.\n- Think of five words you have learned from the reading, and write them below.\n- Discuss how many syllables each word has and which syllable is emphasized when pronounced.\n- Make 'word statues' by standing or sitting as in the examples.\n[Example A: exercise — 1 stand, 2 sit / Example B: photographer — 2nd syllable stressed]\n\n<Activity 3>\n- Work in pairs.\n- Say the following sentences aloud, and think about what happens to the sound in the underlined parts.\n1) I'll have some of those apples, please.\n2) I saw a fantastic movie last night.\n3) Your computer was a good buy.\n4) An old man lives next door.\n\n<Activity 4>\n- Listen to the short dialogues. In each dialogue, you will hear someone respond with the word 'really'.\n- Guess whether the second speaker is interested, surprised, or bored.\nDialogue 1: B: Really? (surprised)\nDialogue 2: B: Really? (bored)\nDialogue 3: B: Really? (interested)","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 및 핵심 조건 확인","explanation":"<A>의 문제: 학생들이 초분절음(suprasegmental features) — 특히 sentence stress, rhythm, intonation — 에 주의를 기울이지 않음. 이것이 의미·감정·태도 전달에 영향을 미침. 활동 선택 기준: 초분절음 인식(awareness)을 높이고, 의사소통에 미치는 영향을 이해시키는 활동.","key_terms":["suprasegmental features","sentence stress","intonation","awareness"]},{"step":2,"label":"Activity 1 분석","explanation":"같은 문장에서 강조 위치가 달라질 때 의미가 달라짐('not the red jumper' → 강조 이동). 학생들이 강조된 단어를 찾고(underline) 의미 변화를 설명. Sentence stress가 의미 전달에 미치는 영향 직접 인식 → <A> 조건 충족 ✓","key_terms":["Sentence stress","underline"]},{"step":3,"label":"Activity 2 분석","explanation":"단어의 음절 수와 강세 위치 파악 → word-level stress 연습. Word stress는 초분절음이지만 <A>가 명시한 sentence stress, rhythm, intonation이 아님. 또한 의사소통에서의 의미·감정·태도 전달과 직접 연결되지 않음 → <A> 조건에 부분적으로만 해당 ✗","key_terms":["word-level stress","Word stress","sentence stress","intonation"]},{"step":4,"label":"Activity 3 분석","explanation":"밑줄 친 부분에서 발생하는 음성 변화 확인 → linking(연음), assimilation(동화), reduction(약화) 등 connected speech 현상. 이는 rhythm과 연결된 초분절 특성. 그러나 의미·감정·태도 '전달'보다는 connected speech의 '음성 현상' 인식이 주 목적 → <A>의 핵심 의사소통 효과와 간접 연결","key_terms":["connected speech","linking","assimilation","rhythm"]},{"step":5,"label":"Activity 4 분석 및 최종 선택","explanation":"'Really?'를 같은 단어로 발화하지만 억양에 따라 태도(surprised / bored / interested)가 달라짐 → intonation이 감정·태도 전달에 미치는 영향 직접 인식. <A>의 'intonation conveys emotion and attitude' 조건과 정확히 대응 ✓. 최종 선택: Activity 1(sentence stress → 의미), Activity 4(intonation → 감정·태도).","key_terms":["intonation","attitude","emotion"]}],"key_terms":[{"term":"Suprasegmental Features","definition_en":"Phonological properties that extend beyond individual segments (phonemes), including stress, rhythm, tone, and intonation. These features operate at the level of syllables, words, and phrases and are known to significantly affect communicative intelligibility.","definition_ko":"초분절음 — 개별 음소를 초월하는 음운적 특성. 강세·리듬·성조·억양 포함. 음절·단어·구 수준에서 작용하며 의사소통 이해도에 큰 영향을 미침.","source_author":"Celce-Murcia, Brinton & Goodwin","source_year":2010,"related_terms":["segmental features","prosody","sentence stress","intonation"],"exam_usage":"<A>에서 학생들이 취약한 영역으로 제시; 활동 선택 기준"},{"term":"sentence stress","definition_en":"The relative prominence given to certain words within a sentence to highlight meaning or contrast. Shifting stress to different words in the same sentence alters the communicative focus and can change the meaning entirely.","definition_ko":"문장 강세(대조 강세) — 문장 내 특정 단어에 상대적 두드러짐을 부여해 의미나 대조를 부각. 강세 위치 이동으로 동일 문장의 의미가 바뀔 수 있음.","source_author":"Brazil","source_year":1994,"related_terms":["suprasegmental features","information focus","nuclear stress"],"exam_usage":"Activity 1의 핵심 초분절 특성; 강조 이동에 따른 의미 변화 인식 활동"},{"term":"Intonation","definition_en":"The patterns of pitch change across an utterance used to convey grammatical structure, discourse organization, and — crucially — speaker attitude, emotion, and pragmatic meaning. The same words with different intonation can signal entirely different communicative intentions.","definition_ko":"억양 — 발화에 걸친 음높이 변화 패턴. 문법 구조·담화 구성, 그리고 화자의 태도·감정·화용적 의미를 전달. 동일 단어도 억양에 따라 다른 의사소통 의도를 나타냄.","source_author":"Ladd","source_year":2008,"related_terms":["suprasegmental features","tone","attitude","pragmatic meaning"],"exam_usage":"Activity 4에서 'Really?'의 억양 변화로 감정·태도 구별 훈련"},{"term":"pronunciation","definition_en":"A pedagogical goal in which learners develop conscious attention to phonological features — including suprasegmentals — and their communicative effects, as a precondition for production improvement.","definition_ko":"발음 인식 — 학습자가 음운적 특성(초분절음 포함)과 그 의사소통 효과에 의식적 주의를 기울이게 되는 교육적 목표. 발화 향상의 선행 조건.","source_author":"Celce-Murcia, Brinton & Goodwin","source_year":2010,"related_terms":["noticing","form-focused instruction","suprasegmental features"],"exam_usage":"<A>에서 Mr. Park이 목표로 하는 것: students raise their awareness"}],"vocabulary":[{"word":"suprasegmental","pos":"adj.","definition_ko":"초분절적 — 개별 음소 이상의 단위(강세·리듬·억양)에 관한","example":""},{"word":"sentence stress","pos":"n.","definition_ko":"문장 강세 — 문장 내 특정 단어 강조","example":""},{"word":"intonation","pos":"n.","definition_ko":"억양 — 음의 높낮이 패턴","example":""}],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Activities 1 and 4 best address Mr. Park's issue. Activity 1 targets sentence stress by having students identify which word is emphasized and explain how meaning changes accordingly. Activity 4 targets intonation by asking students to infer the speaker's emotional attitude from the same word \"really\" delivered with different intonation patterns.","scoring_criteria":[{"criterion":"Activity 1 식별","points":1},{"criterion":"Activity 1 근거: sentence stress가 의미 전달에 미치는 영향","points":1},{"criterion":"Activity 4 식별","points":1},{"criterion":"Activity 4 근거: intonation으로 태도/감정 전달","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Activities 1 and 4 are most appropriate. Activity 1 develops awareness of sentence stress by having students notice how shifting emphasis changes meaning. Activity 4 develops intonation awareness by requiring students to interpret the speaker's emotional stance from the same word spoken with different intonation patterns."},{"label":"답안 B","source_type":"variant","content":"Activity 1 focuses on sentence stress — students identify emphasized words and explain how stress shifts alter meaning, matching the issue in <A>. Activity 4 focuses on intonation — students infer emotional attitudes from the same utterance, which directly addresses how intonation conveys attitude and emotion in communication."}]},"source":{"references":[{"type":"textbook","author":"Celce-Murcia, M., Brinton, D. & Goodwin, J.","title":"Teaching Pronunciation: A Course Book and Reference Guide (2nd ed.)","year":2010,"publisher":"Cambridge University Press","pages":"Ch. 10–12","excerpt":"<span class=\"ref-hl\">Suprasegmental features</span> — <span class=\"ref-hl\">stress, rhythm, and intonation</span> — are more likely than segmental errors to interfere with communication and should receive explicit instructional attention."}],"concept_explanation":"Suprasegmental features are phonological properties operating above the level of individual sounds: sentence stress (prominence that shifts meaning focus), rhythm (the stress-timed beat of English), and intonation (pitch patterns signaling emotion, attitude, and discourse structure). Unlike segmental errors, suprasegmental mismatches frequently cause communicative breakdown.\n  (초분절음은 개별 음소 이상에서 작용하는 음운적 특성: 문장 강세(의미 초점 이동), 리듬(영어의 강세 박자), 억양(감정·태도·담화 구조를 나타내는 음높이 패턴). 분절음 오류보다 의사소통 실패를 유발하는 경우가 많아 명시적 교수가 필요하다.)\n\nPronunciation awareness involves explicit attention to suprasegmental features such as sentence stress, rhythm, and intonation to improve intelligibility in spoken English."},"related":{"enabled":true,"questions":[]}},"education_2026_B05.json":{"meta":{"id":"education_2026_B05","year":2026,"number":"B-5","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["speaking assessment","educational technology","peer feedback","ASR"],"parse_source":"2026_전공B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Based on <A>, suggest the ONE most appropriate product in <B> that satisfies Ms. Song's needs and the ONE most appropriate product that satisfies Mr. Jung's. Then explain your answers with evidence from <A> and <B>. Do NOT copy more than FOUR consecutive words from the passages.","passage":"<A>\nMs. Song — Problem: limited peer feedback time, students need online collaboration for speaking.\nExpected outcomes: students reflect and comment on each other's speaking online; teachers provide collaborative environment.\n\nMr. Jung — Problem: current tool only measures accuracy, not fluency.\nExpected outcomes: students get feedback on accuracy AND fluency; students assess based on visual data.\n\n<B>\nProduct 1: Online platform — students record, listen, write reflections. Teachers review logs.\nProduct 2: App — ASR compares pronunciation with native models; instant accuracy feedback with visual waveforms (stress, intonation).\nProduct 3: App — teachers assess rate of speech, frequency of pauses, accuracy; in-depth charts/graphs.\nProduct 4: System — peer scaffolding; students upload recordings, receive peer feedback, self-evaluate, interact synchronously.\nProduct 5: App — speech-to-text; detects grammatical/lexical/discourse errors; teachers annotate transcripts.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 및 조건 확인","explanation":"각 교사의 문제(problem)와 기대 결과(expected outcomes)를 정확히 파악해야 함. Ms. Song: 피어 피드백 시간 부족 + 온라인 협력 환경 필요. Mr. Jung: 정확성만 측정하는 현재 도구의 한계 → 유창성+정확성 피드백 + 시각 데이터 기반 평가 필요. 각 Product의 기능을 두 조건과 매핑한다.","key_terms":[]},{"step":2,"label":"Ms. Song → Product 매핑","explanation":"Ms. Song 조건: ① 학생들이 온라인에서 서로 말하기에 피드백 제공 + 자기성찰, ② 협력 환경 제공. Product 4: 학생들이 녹음 업로드 → 피어 피드백 수신 + 자기평가 + 동기적(synchronously) 상호작용 → 두 조건 모두 충족. Product 1은 자기 성찰(reflection)은 있지만 피어 피드백과 협력 상호작용이 없음 → 탈락.","key_terms":["Product 4","synchronously"]},{"step":3,"label":"Product 1 vs. Product 4 소거","explanation":"Product 1: 녹음→청취→자기 반성 작성, 교사 로그 검토 → 피어 피드백 없음, 협력 환경 아님 → Ms. Song 조건 불충족 ✗. Product 4: peer scaffolding + 피어 피드백 + synchronous interaction → Ms. Song 조건 정확히 충족 ✓","key_terms":["peer scaffolding","synchronous interaction"]},{"step":4,"label":"Mr. Jung → Product 매핑","explanation":"Mr. Jung 조건: ① 정확성 AND 유창성 피드백, ② 시각 데이터 기반 평가. Product 3: 교사가 발화 속도(speech rate) + 휴지 빈도(pauses) → 유창성 측정, 정확성 포함, 차트/그래프 제공 → 시각 데이터. 두 조건 모두 충족 ✓. Product 2는 정확성 피드백 + 시각 파형 있지만 유창성(속도·휴지) 측정 없음 → 탈락.","key_terms":["Product 3","speech rate","pauses"]},{"step":5,"label":"최종 확정","explanation":"Ms. Song → Product 4: peer feedback + self-evaluation + synchronous collaboration. Mr. Jung → Product 3: fluency(rate, pauses) + accuracy + visual charts. 각 선택이 <A>의 문제와 기대 결과에 항목별로 대응됨을 근거로 제시.","key_terms":["peer feedback","self-evaluation","fluency","accuracy"]}],"key_terms":[{"term":"peer feedback","definition_en":"A formative assessment practice in which learners evaluate and respond to each other's work using specified criteria. Peer feedback enhances both the reviewer's and the reviewee's metalinguistic awareness and reduces dependence on teacher-only evaluation.","definition_ko":"동료 피드백(동료 평가) — 학습자들이 지정된 기준으로 서로의 결과물을 평가하고 반응하는 형성 평가 방식. 언어적 메타인식을 높이고 교사 평가 의존도를 낮춤.","source_author":"Liu & Hansen","source_year":2002,"related_terms":["formative assessment","collaborative learning","self-assessment"],"exam_usage":"Ms. Song의 기대 결과: 학생들이 온라인에서 서로 말하기에 피드백 제공"},{"term":"fluency","definition_en":"Two distinct dimensions of oral proficiency. Fluency refers to the smooth, uninterrupted flow of speech (measured by speech rate, pause frequency, and repair count), while accuracy refers to grammatical and phonological correctness. Balanced assessment addresses both dimensions.","definition_ko":"유창성 vs. 정확성 — 말하기 능숙도의 두 차원. 유창성은 말의 흐름(발화 속도, 휴지 빈도, 수정 횟수)을, 정확성은 문법·음운 정확도를 의미. 균형 잡힌 평가는 두 차원 모두 측정해야 함.","source_author":"Skehan","source_year":1998,"related_terms":["speaking assessment","oral proficiency","complexity"],"exam_usage":"Mr. Jung의 문제: 현재 도구가 accuracy만 측정, fluency 미포함"},{"term":"ASR","definition_en":"A technology that converts spoken language into text or phonemic output, enabling automated analysis of pronunciation accuracy. ASR-based tools can provide immediate feedback on segmental features but may not capture fluency dimensions such as speech rate or prosody.","definition_ko":"자동 음성 인식(ASR) — 음성을 텍스트나 음소 출력으로 변환하는 기술. 발음 정확도를 자동 분석해 즉각 피드백 제공 가능. 유창성 지표(속도·운율)는 포착하지 못할 수 있음.","source_author":"Neri, Cucchiarini & Strik","source_year":2002,"related_terms":["CALL","pronunciation feedback","accuracy"],"exam_usage":"Product 2의 기술 기반; 유창성 미측정으로 Mr. Jung 조건 불충족"},{"term":"CALL","definition_en":"The application of computers and digital technology to support language learning and teaching. CALL tools range from drill-and-practice software to collaborative online platforms and ASR-based pronunciation trainers.","definition_ko":"컴퓨터 보조 언어 학습 — 컴퓨터와 디지털 기술을 언어 학습·교수에 활용하는 분야. 반복 연습 소프트웨어부터 협력 온라인 플랫폼, ASR 발음 훈련 도구까지 다양함.","source_author":"Warschauer & Healey","source_year":1998,"related_terms":["ASR","peer feedback platform","educational technology"],"exam_usage":"<B>의 다양한 Product가 CALL 도구 유형을 예시"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Ms. Song's needs are best met by Product 4, which allows students to share recordings and receive peer feedback online, addressing limited class time. Mr. Jung's needs are best met by Product 3, which measures both fluency indicators (speech rate, pauses) and accuracy, presenting results as visual charts.","scoring_criteria":[{"criterion":"Ms. Song → Product 4 식별","points":1},{"criterion":"Product 4 근거: 피어 피드백 + 협력 온라인 환경","points":1},{"criterion":"Mr. Jung → Product 3 식별","points":1},{"criterion":"Product 3 근거: 유창성+정확성 + 시각 데이터(차트)","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Ms. Song's needs are best met by Product 4, which enables students to share recordings and provide peer feedback online, solving the time limitation. Mr. Jung's needs are best met by Product 3, which measures both accuracy and fluency indicators and presents detailed analysis through visual charts."},{"label":"답안 B","source_type":"variant","content":"Product 4 suits Ms. Song because it supports peer scaffolding and synchronous interaction online, fulfilling both expected outcomes. Product 3 suits Mr. Jung because it assesses fluency (speech rate, pauses) alongside accuracy and provides visual performance data for teacher assessment."}]},"source":{"references":[{"type":"paper","author":"Neri, A., Cucchiarini, C. & Strik, H.","title":"Feedback in computer-assisted pronunciation training: When technology meets pedagogy","year":2008,"publisher":"ISCA","pages":"","excerpt":"Effective <span class=\"ref-hl\">CALL speaking tools</span> should provide <span class=\"ref-hl\">feedback</span> not only on segmental accuracy but also on <span class=\"ref-hl\">fluency</span> dimensions such as speech rate and pause distribution."}],"concept_explanation":"CALL-based speaking assessment tools vary in what they measure and how feedback is delivered. Tools that capture fluency (speech rate, pause frequency) alongside accuracy provide more comprehensive oral proficiency data than accuracy-only systems. Peer feedback platforms add a collaborative dimension by enabling asynchronous or synchronous learner-to-learner evaluation, which is distinct from self-reflection tools.\n  (CALL 기반 말하기 평가 도구는 측정 항목과 피드백 방식이 다양하다. 유창성(발화 속도, 휴지 빈도)과 정확성을 함께 측정하는 도구가 정확성만 측정하는 시스템보다 포괄적인 구어 숙달도 정보를 제공한다. 피어 피드백 플랫폼은 학습자 간 평가를 가능하게 해 자기 성찰 도구와 구별된다.)\n\nASR (Automatic Speech Recognition): software that converts spoken language to text, enabling automated oral proficiency scoring. CALL (Computer-Assisted Language Learning): technology-mediated language instruction using digital tools for speaking, listening, reading, or writing practice."},"related":{"enabled":true,"questions":[]}},"education_2026_B06.json":{"meta":{"id":"education_2026_B06","year":2026,"number":"B-6","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["writing assessment","holistic scoring","content","organization","grammar","feedback"],"parse_source":"2026_전공B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the ONE category in which Mr. Kim's comments do NOT correspond to student 1's restaurant review, and the ONE category in which Mr. Kim's comments do NOT correspond to student 2's restaurant review. Then explain your answers with evidence.","passage":"Student 1's review: Recently I visited Bamgart, a Chinese restaurant. There were so many dishes on the menu. I ordered seafood noodle soup. It was spicy. It was very delicious. It took some time to order.\nGrade B / Content: Good to Fair / Organization: Good to Fair / Grammar: Excellent\nComments: You did a good job on writing the restaurant review. You addressed the topic well by elaborating it with details. Also, your ideas were smoothly connected using appropriate linking words, but you did not include a concluding sentence. There were no major grammatical errors that obscured the meaning. Keep up the good work!\n\nStudent 2's review: I recently had a lunch at Pizza Club. I ordered a combination pizza. I liked the taste and the reasonable price, but I have to wait long outside before being seated. Restaurant was very crowded, so I eat the pizza quickly. Overall, it was worth visiting this place.\nGrade B / Content: Excellent / Organization: Excellent / Grammar: Good to Fair\nComments: I enjoyed reading your writing. The message was very clear, and it was good to see the details you included. You made good connections between your ideas using appropriate linking words, so it was easy to follow your writing. Regarding grammar, you had some errors in the use of articles, but everything else was good in terms of accuracy. Nice work!","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 조건 확인","explanation":"각 학생에서 '점수/등급'과 '코멘트' 간에 불일치하는 평가 범주 1개를 찾아야 함. 불일치란: 점수는 높은데 코멘트가 실제 오류/문제를 언급하거나, 점수는 낮은데 코멘트가 잘됐다고 하는 경우. 세 범주(Content, Organization, Grammar)를 각각 점수 ↔ 코멘트로 대조한다.","key_terms":["Content","Organization","Grammar"]},{"step":2,"label":"Student 1 Organization 검토 → 불일치 확인","explanation":"Organization: Good to Fair. 코멘트: 'ideas were smoothly connected using appropriate linking words'. 실제 글 확인: 'It was spicy. It was very delicious. It took some time to order.' → 모두 단순 나열 문장, linking words 전혀 없음. 코멘트는 linking words를 칭찬하지만 실제 글에는 연결어가 없음 → Organization 코멘트와 실제 글 불일치 ✗","key_terms":["Organization","linking words"]},{"step":3,"label":"Student 1 Grammar 검토 → 일치 확인","explanation":"Grammar: Excellent. 코멘트: 'There were no major grammatical errors that obscured the meaning.' 실제 글 문법 확인: 문장들이 단순하지만 문법적 오류 없음. 'no major grammatical errors' = Excellent 등급과 일치 ✓ → Grammar는 불일치 아님.","key_terms":["Grammar","Excellent"]},{"step":4,"label":"Student 2 Content/Organization 검토 → 일치 확인","explanation":"Content: Excellent + 'message was very clear, good details' → 일치 ✓. Organization: Excellent + 'good connections, easy to follow' + concluding sentence 있음('it was worth visiting') → 일치 ✓. Content·Organization 코멘트와 점수 모두 일치.","key_terms":["Content","Organization","Excellent"]},{"step":5,"label":"Student 2 Grammar 검토 → 불일치 확인","explanation":"Grammar 점수: Good to Fair. 코멘트: 'errors in the use of articles'만 언급. 실제 글의 오류: 'I have to wait long' (→ had to wait; 시제 오류), 'I eat the pizza quickly' (→ ate; 시제 오류), 'Restaurant was very crowded' (→ The restaurant; 관사 오류). 코멘트는 article 오류만 언급하지만 실제로는 시제 오류 등 다수. 코멘트가 실제 오류 범위를 충분히 반영하지 못함 → Grammar 코멘트 불일치 ✗","key_terms":["Grammar","articles"]}],"key_terms":[{"term":"Analytic","definition_en":"A writing assessment method that evaluates multiple distinct categories (e.g., content, organization, grammar) separately, each with its own score. Allows detailed diagnostic feedback but requires that scores and written comments be mutually consistent within each category.","definition_ko":"분석적 채점 — 내용, 구성, 문법 등 여러 범주를 별도 점수로 평가하는 쓰기 평가 방식. 세부 진단 피드백이 가능하나 각 범주 내 점수와 코멘트 간 일관성이 요구됨.","source_author":"Jacobs, Zinkgraf, Wormuth, Hartfiel & Hughey","source_year":1981,"related_terms":["holistic scoring","scoring rubric","feedback consistency"],"exam_usage":"점수 범주(Content/Organization/Grammar)와 코멘트 간 불일치 판단의 근거"},{"term":"feedback consistency","definition_en":"A quality of assessment in which written comments accurately reflect the scores assigned, allowing learners to understand what a grade means and act on it. When a score and its accompanying comment are contradictory — e.g., an 'Excellent' grade paired with comments implying errors exist — feedback loses its diagnostic value.","definition_ko":"피드백 일관성 — 서면 코멘트가 부여된 점수와 정확히 대응되는 평가의 질적 속성. 점수와 코멘트가 모순될 경우(예: Excellent 점수에 오류를 암시하는 코멘트) 피드백의 진단적 가치를 잃음.","source_author":"Brown & Abeywickrama","source_year":2019,"related_terms":["analytic scoring","construct validity","washback"],"exam_usage":"문제 핵심: Mr. Kim의 코멘트가 점수와 불일치하는 범주를 찾는 것"},{"term":"Grammar","definition_en":"A scoring category measuring the correctness of grammatical forms including verb tense, agreement, article use, and sentence structure. An 'Excellent' grade implies near-absence of errors; 'Good to Fair' indicates noticeable but non-impeding errors.","definition_ko":"쓰기에서의 문법 정확성 — 시제, 일치, 관사 사용, 문장 구조 등 문법 형식의 정확도를 측정하는 채점 범주. Excellent는 오류가 거의 없어야 하며 Good to Fair는 의사소통을 방해하지 않는 수준의 오류를 허용함.","source_author":"Brown & Abeywickrama","source_year":2019,"related_terms":["analytic scoring","error analysis","rubric"],"exam_usage":"Student 1(Excellent vs. 오류 암시 코멘트), Student 2(Good to Fair vs. article만 언급)의 불일치 근거"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Student 1's Organization comment is inconsistent: Mr. Kim states that ideas were smoothly connected using appropriate linking words, but the actual review contains only simple, unconnected sentences with no linking words at all. Student 2's Grammar comment is inconsistent: Mr. Kim mentions only article errors, but the text also contains tense errors such as \"I eat\" and \"I have to wait,\" which are not addressed in the feedback.","scoring_criteria":[{"criterion":"Student 1 → Organization 식별","points":1},{"criterion":"Student 1 근거: 코멘트는 linking words 칭찬하지만 실제 글에 linking words 없음","points":1},{"criterion":"Student 2 → Grammar 식별","points":1},{"criterion":"Student 2 근거: article 외에도 시제 오류('I eat', 'I have to wait') 있는데 코멘트가 article만 언급","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Student 1's Organization comment is inconsistent: Mr. Kim praises the use of appropriate linking words, but the review consists only of short, simple sentences with no connectors at all. Student 2's Grammar comment is inconsistent: although Mr. Kim mentions only article errors, the text also includes tense errors such as 'I eat' and 'I have to wait,' which go unaddressed."},{"label":"답안 B","source_type":"variant","content":"For Student 1, Organization is misaligned — Mr. Kim's comment claims ideas were smoothly connected with linking words, but no linking words appear in the actual writing. For Student 2, Grammar is misaligned — the comment focuses only on article errors while tense errors like 'I eat the pizza quickly' and 'I have to wait' are overlooked."}]},"source":{"references":[{"type":"textbook","author":"Brown, H. D. & Abeywickrama, P.","title":"Language Assessment: Principles and Classroom Practices (3rd ed.)","year":2019,"publisher":"Pearson","pages":"Ch. 11","excerpt":"In <span class=\"ref-hl\">analytic scoring</span>, <span class=\"ref-hl\">each criterion must be evaluated independently</span> and the accompanying written feedback should accurately reflect the score assigned in order to preserve validity and provide actionable guidance."}],"concept_explanation":"Analytic writing assessment evaluates Content, Organization, and Grammar as separate dimensions, each with its own score and feedback. For assessment to be valid, scores and comments must be consistent within each category: an 'Excellent' grammar score should not be accompanied by comments implying errors exist, and a 'Good to Fair' comment should account for all observable error types in the student's text.\n  (분석적 쓰기 평가는 내용·구성·문법을 별도 차원으로 평가하며 각각 점수와 피드백을 부여한다. 평가의 타당성을 위해 점수와 코멘트는 범주 내에서 일관되어야 한다: Excellent 문법 점수는 오류 존재를 암시하는 코멘트와 함께 제시될 수 없으며, Good to Fair 코멘트는 학생 글에 존재하는 모든 오류 유형을 반영해야 한다.)\n\nFeedback consistency: the extent to which written comments accurately reflect the scores assigned in each category. Inconsistency — an 'Excellent' grade with comments implying errors, or a 'Good to Fair' comment that omits visible errors — reduces the diagnostic and instructional value of assessment feedback (Brown & Abeywickrama, 2019).\n\nNote: Washback (backwash) refers to the effect of testing on teaching and learning behavior — a separate concept from score-comment consistency."},"related":{"enabled":true,"questions":[]}},"education_2026_B08.json":{"meta":{"id":"education_2026_B08","year":2026,"number":"B-8","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["mixed-ability","differentiated instruction","scaffolding","cognitive skills"],"parse_source":"2026_전공B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the ONE instructional tip in <A> that Ms. Choi applied to Activity 1 in <B> and the ONE instructional tip in <A> to Activity 2 in <B>. Then explain your answers with evidence from <B>.","passage":"<A>\n<Instructional tips>\n1. Offer students varying levels of content.\n2. Give students different levels of support in the materials.\n3. Provide early finishers with extension activities.\n4. Assign different roles according to students' abilities in the activities.\n5. Have students apply different cognitive skills to do the activities.\n\n<B>\n<Activity 1>\nFor low-level students: Fill in the blanks — first letter of each word given as hint.\nFor intermediate-level students: Fill in the blanks — no hints, just a word box.\n\n<Activity 2>\nFor low-level students: Match the pictures with the descriptions.\nFor intermediate-level students: Match the pictures with the descriptions, THEN arrange them in the correct order.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 및 조건 확인","explanation":"각 Activity에서 어느 Tip이 적용되었는지 찾아야 함. 핵심 판단 기준: ① 두 수준 간 '무엇이 다른가'를 정확히 파악하고, ② 그 차이가 Tip 1~5 중 어느 정의와 대응하는지 매핑. Tip 1(내용 수준 차이), Tip 2(자료 지원 수준 차이), Tip 3(일찍 끝낸 학생 활동), Tip 4(역할 배분), Tip 5(인지 기술 수준 차이).","key_terms":[]},{"step":2,"label":"Activity 1 차이점 분석","explanation":"두 수준 모두 같은 '빈칸 채우기' 과제 + 같은 단어 박스(word box). 차이: 저수준은 각 단어의 첫 글자 힌트 제공, 중간수준은 힌트 없음. 과제 내용(content)은 동일, 역할도 없음. 차이는 오직 '지원(support)' 수준 — 첫 글자 힌트 = scaffold 제공 여부. → Tip 2 적용 ✓","key_terms":["word box","scaffold","Tip 2"]},{"step":3,"label":"Activity 1 다른 Tip 소거","explanation":"Tip 1(내용 차이): 두 수준 모두 같은 빈칸 채우기 → 내용 차이 없음 ✗. Tip 4(역할 배분): 개인 과제, 역할 없음 ✗. Tip 5(인지 기술 차이): 두 수준 모두 빈칸 채우기(recall/recognition) → 같은 인지 과정 ✗. → Tip 2만 해당.","key_terms":["recall","recognition","Tip 2"]},{"step":4,"label":"Activity 2 차이점 분석","explanation":"저수준: 사진-설명 매칭(matching). 중간수준: 매칭 + 순서 배열(ordering). 같은 자료, 같은 역할, 지원 수준 같음. 차이: 중간수준에는 추가 과제(ordering)가 있고 이는 더 높은 인지적 요구(sequencing/analysis). 매칭 = recognition/understanding, 순서 배열 = analysis(Bloom). 다른 인지 기술 적용 → Tip 5 ✓","key_terms":["matching","ordering","analysis","Tip 5"]},{"step":5,"label":"최종 확정","explanation":"Activity 1 → Tip 2: 같은 과제와 자료에서 힌트(첫 글자) 유무로 지원 수준 차별화. Activity 2 → Tip 5: 저수준은 매칭(이해 수준 인지), 중간수준은 매칭+순서 배열(분석 수준 인지) — 다른 인지 기술 요구. 각각 지문 증거로 뒷받침.","key_terms":["Tip 2","Tip 5"]}],"key_terms":[{"term":"Differentiated Instruction","definition_en":"A teaching approach in which educators proactively plan varied approaches to content, process, and product in response to students' differing readiness levels, interests, and learning profiles. Differentiation ensures that all students have access to appropriately challenging tasks.","definition_ko":"수준별 수업(차별화 교수) — 학생의 준비도·흥미·학습 양식 차이에 맞게 내용·과정·산출물을 사전에 다양화하는 교수 접근법. 모든 학생이 적절히 도전적인 과제에 접근할 수 있도록 보장함.","source_author":"Tomlinson","source_year":2001,"related_terms":["mixed-ability","scaffolding","zone of proximal development"],"exam_usage":"<A>의 5가지 Instructional Tips가 차별화 교수 전략의 구체적 방법"},{"term":"scaffolding","definition_en":"Temporary, adjustable support provided to learners to help them accomplish tasks they could not complete independently. Scaffolding is gradually removed as learners become more proficient, a process called 'fading.' First-letter hints in cloze tasks are a classic form of material-level scaffolding.","definition_ko":"비계 설정(교수적 지원) — 학습자가 혼자 완수할 수 없는 과제를 수행할 수 있도록 제공되는 임시적·조정 가능한 지원. 학습자 숙달도가 높아지면 점진적으로 제거(fading). 빈칸 과제의 첫 글자 힌트는 자료 수준 비계의 전형적 사례.","source_author":"Wood, Bruner & Ross","source_year":1976,"related_terms":["ZPD","differentiated instruction","fading"],"exam_usage":"Activity 1에서 Tip 2(different levels of support)의 실현 방식"},{"term":"Bloom's Taxonomy","definition_en":"A hierarchical classification of cognitive learning objectives, revised by Anderson & Krathwohl (2001) into: Remember, Understand, Apply, Analyze, Evaluate, Create. Matching tasks correspond to lower-order understanding; sequencing/ordering tasks correspond to higher-order analysis.","definition_ko":"블룸의 분류법(인지 기술) — 인지적 학습 목표의 위계적 분류. Anderson & Krathwohl(2001) 개정판: 기억·이해·적용·분석·평가·창조. 매칭 과제 = 이해 수준, 순서 배열 = 분석 수준에 해당.","source_author":"Anderson & Krathwohl","source_year":2001,"related_terms":["higher-order thinking","HOTS","differentiated instruction"],"exam_usage":"Activity 2에서 Tip 5(different cognitive skills) 적용의 이론적 근거"},{"term":"mixed-ability","definition_en":"A classroom context in which students demonstrate a range of proficiency levels. Effective instruction in mixed-ability settings requires deliberate differentiation of tasks, materials, or processes to meet the needs of both lower- and higher-proficiency learners simultaneously.","definition_ko":"수준 혼합 학급 — 다양한 숙달도를 보이는 학생들이 함께 학습하는 교실 맥락. 효과적인 수업을 위해 과제·자료·과정의 의도적 차별화가 요구됨.","source_author":"Ur","source_year":1996,"related_terms":["differentiated instruction","scaffolding","ability grouping"],"exam_usage":"<B>에서 저수준/중간수준으로 구분된 활동 설계의 배경"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Activity 1 reflects Tip 2: both groups complete the same blank-filling task using the same word box, but low-level students receive first-letter hints while intermediate students do not, providing different levels of support. Activity 2 reflects Tip 5: low-level students match pictures with descriptions, while intermediate students additionally sequence them, requiring a higher-order cognitive skill.","scoring_criteria":[{"criterion":"Activity 1 → Tip 2 식별","points":1},{"criterion":"Tip 2 근거: 같은 과제, 힌트 유무로 지원 수준 차별화","points":1},{"criterion":"Activity 2 → Tip 5 식별","points":1},{"criterion":"Tip 5 근거: 매칭 vs 매칭+순서배열로 인지적 기술 수준 차이","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Activity 1 reflects Tip 2: both groups use the same word box and task, but low-level students get first-letter hints while intermediate students do not, providing different support levels. Activity 2 reflects Tip 5: low-level students perform matching only, while intermediate students additionally sequence the pictures, requiring a more advanced cognitive skill."},{"label":"답안 B","source_type":"variant","content":"Tip 2 applies to Activity 1 because the two groups receive different amounts of support — the first-letter hints scaffold low-level students while intermediate students work without guidance. Tip 5 applies to Activity 2 because the tasks differ in cognitive demand: matching (recognition) vs. matching plus ordering (sequencing)."}]},"source":{"references":[{"type":"textbook","author":"Tomlinson, C. A.","title":"The Differentiated Classroom: Responding to the Needs of All Learners (2nd ed.)","year":2014,"publisher":"ASCD","pages":"pp. 13–27","excerpt":"<span class=\"ref-hl\">Differentiation</span> of process means varying the activities or <span class=\"ref-hl\">scaffolding</span> through which learners access key ideas, applying different levels of support or different cognitive demands as students' <span class=\"ref-hl\">readiness</span> warrants."}],"concept_explanation":"Differentiated instruction addresses mixed-ability learners by varying content, process, or product. Tip 2 (different levels of support) modifies the degree of scaffolding within the same task — a classic process differentiation strategy. Tip 5 (different cognitive skills) assigns tasks of varying cognitive complexity, grounded in Bloom's taxonomy: lower-order tasks (matching/recall) for less proficient learners and higher-order tasks (sequencing/analysis) for more proficient ones.\n  (차별화 교수는 수준 혼합 학급에서 내용·과정·산출물을 달리하여 학습자 요구에 대응한다. Tip 2(지원 수준 차별화)는 같은 과제 내에서 비계 정도를 조절하는 과정 차별화 전략이다. Tip 5(인지 기술 차별화)는 블룸 분류법에 근거해 숙달도가 낮은 학습자에게는 하위 인지 과제(매칭), 높은 학습자에게는 상위 인지 과제(순서 배열·분석)를 부여한다.)\n\nBloom's Taxonomy: a hierarchical framework of cognitive skills (Remember → Understand → Apply → Analyze → Evaluate → Create) used to classify learning objectives and design tasks of varying cognitive demand."},"related":{"enabled":true,"questions":[]}},"education_2026_B11.json":{"meta":{"id":"education_2026_B11","year":2026,"number":"B-11","subject":"education","linguistics_domain":"","question_type":"essay","score":4,"tags":["interpersonal communication","information gap","authentic materials","speaking activity"],"parse_source":"2026_전공B.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Identify the ONE characteristic in <A> that Mr. Kang incorporated in modifying his activity in <B> and the ONE characteristic in <A> that Ms. Shin incorporated in modifying her activity in <B>. Then explain your answers with evidence from <B>.","passage":"<A>\n■ Characteristics of Interpersonal Communication Activities\n1. There is a clearly defined concrete outcome.\n2. There is an information gap between learners.\n3. Input materials are authentic to reflect real-life situations and demands.\n4. There are opportunities for reflection on appropriate language use in a given context.\n5. Language is used as a means of communication, not of practicing specific grammar points.\n\n<B>\n<Mr. Kang's activities>\nOriginal: Read the dialogue aloud from the textbook. Role-play as customer/salesperson. Take turns.\n\nModified: Card A — You are traveling to LA, luggage delayed, $40 voucher to buy necessities. Card B — You are the salesperson. Sell as many items as possible.\n[Items: pants $15, socks $2, T-shirts $7, pajamas $20]\n\n<Ms. Shin's activities>\nOriginal: Take turns asking each other the questions (Do you wash the dishes every day?). Answer in complete sentences using correct object pronoun.\n\nModified: Indicate how much you like or dislike doing the chores on a scale 1–5. Talk with your partner about how much you like or dislike each chore and why.","blanks":[]},"derivation":{"steps":[{"step":1,"label":"발문 및 조건 확인","explanation":"각 교사의 수정 전/후 활동을 비교해 <A>의 특성 중 수정본에 새롭게 포함된 1개를 찾아야 함. 핵심 방법: 원본 활동에 없던 것이 수정본에 추가되었는가를 각 Characteristic과 대조. Characteristic 1(구체적 결과물), 2(정보 격차), 3(실제 자료), 4(언어 사용 성찰), 5(의사소통 수단).","key_terms":[]},{"step":2,"label":"Mr. Kang 원본 vs. 수정본 대조","explanation":"원본: 교과서 대화를 그대로 읽고 역할극 → 두 학생이 같은 텍스트를 읽으므로 정보 격차 없음. Characteristic 2 부재. 수정본: Card A(고객 — 예산 $40, 필요 물품)와 Card B(판매원 — 상품 목록)로 각자 다른 정보 보유 → 서로에게 없는 정보를 교환해야 과제 완수 가능. Characteristic 2(information gap) 새로 포함 ✓","key_terms":["information gap","Characteristic 2"]},{"step":3,"label":"Mr. Kang 다른 Characteristic 소거","explanation":"Characteristic 1(결과물): 원본에도 역할극 수행이 있으나 수정본에도 명시적 결과물 추가는 아님. Characteristic 3(실제 자료): 여행 중 지연된 수하물 상황은 실제적이지만, 핵심 변화는 정보 격차 도입. Characteristic 5: 원본도 의사소통 지향적. → 가장 명확히 새로 도입된 것은 Characteristic 2.","key_terms":["Characteristic 2"]},{"step":4,"label":"Ms. Shin 원본 vs. 수정본 대조","explanation":"원본: 정해진 질문에 올바른 목적격 대명사를 사용해 완전한 문장으로 대답 → 특정 문법 포인트(object pronoun) 연습이 목적. Characteristic 5 부재. 수정본: 1–5 척도로 집안일에 대한 개인 의견 표현 + 이유 설명 → 정해진 문법 구조 없음, 자신의 실제 선호도를 전달하는 의사소통. Characteristic 5(언어를 문법 연습 수단이 아닌 의사소통 수단으로 사용) 새로 포함 ✓","key_terms":["object pronoun","Characteristic 5"]},{"step":5,"label":"최종 확정","explanation":"Mr. Kang → Characteristic 2: 수정본에서 Card A/B로 정보 격차 도입. Ms. Shin → Characteristic 5: 수정본에서 문법 연습이 아닌 실제 의사소통 목적으로 언어 사용. 각각 원본 활동에 없던 것이 수정을 통해 추가된 것임을 지문 근거로 확인.","key_terms":["Characteristic 2","Characteristic 5"]}],"key_terms":[{"term":"Information Gap","definition_en":"A task condition in which two or more participants hold different pieces of information and must communicate with each other to complete a task or solve a problem. Information gaps create genuine communicative need, as meaning exchange cannot be bypassed. This is a defining feature of communicative tasks in CLT.","definition_ko":"정보 격차 — 두 명 이상의 참여자가 서로 다른 정보를 보유하고, 과제 완수나 문제 해결을 위해 반드시 의사소통해야 하는 과제 조건. 의미 교환을 우회할 수 없으므로 진정한 의사소통 필요를 생성함. CLT 의사소통 과제의 핵심 특성.","source_author":"Nunan","source_year":1989,"related_terms":["communicative task","CLT","meaning negotiation"],"exam_usage":"Mr. Kang의 수정본: Card A(고객)/Card B(판매원)으로 정보 격차 도입"},{"term":"CLT","definition_en":"An approach to language teaching that prioritizes the development of communicative competence, viewing language as a tool for meaning-making in real-world contexts. CLT tasks are characterized by authentic purpose, information exchange, and focus on communication rather than form.","definition_ko":"의사소통 중심 교수법(CLT) — 언어를 실세계 맥락에서 의미 생성의 도구로 보고 의사소통 능력 개발을 우선시하는 교수 접근법. CLT 과제는 실제적 목적, 정보 교환, 형식보다 의사소통 중심이 특징.","source_author":"Hymes","source_year":1972,"related_terms":["communicative competence","information gap","task-based language teaching"],"exam_usage":"<A>의 5가지 특성이 CLT 원리를 반영"},{"term":"language as communication","definition_en":"A distinction central to CLT: in grammar-focused activities, language production is a vehicle for demonstrating correct form; in communicative activities, language is the means through which learners express genuine meaning and achieve real-world goals. Characteristic 5 in <A> captures this distinction.","definition_ko":"의사소통 수단 vs. 문법 연습 — CLT의 핵심 구분: 문법 중심 활동에서는 언어 산출이 올바른 형식 시연 수단이지만, 의사소통 활동에서는 학습자가 실제 의미를 표현하고 실세계 목적을 달성하는 수단. <A>의 Characteristic 5가 이 구분을 포착함.","source_author":"Widdowson","source_year":1978,"related_terms":["CLT","focus on form","meaningful communication"],"exam_usage":"Ms. Shin의 원본(object pronoun 연습) → 수정본(의견 표현 의사소통)의 차이 근거"},{"term":"interpersonal communication","definition_en":"A task type in which learners exchange information, ideas, or opinions with a partner or group, characterized by genuine meaning negotiation, a communicative goal, and use of language as a real interactional tool rather than a formal display.","definition_ko":"대인 의사소통 활동 — 학습자가 파트너나 그룹과 정보·아이디어·의견을 교환하는 과제 유형. 진정한 의미 협상, 의사소통 목표, 형식 과시가 아닌 실제 상호작용 수단으로서 언어 사용이 특징.","source_author":"Nunan","source_year":1989,"related_terms":["CLT","information gap","task-based teaching"],"exam_usage":"<A>의 특성 목록 전체가 대인 의사소통 활동의 기준을 제시"}],"vocabulary":[],"translation":""},"answer":{"model_answer":{"blank_answers":[],"essay_content":"Mr. Kang applied Characteristic 2: Card A gives the customer a budget and needs while Card B gives the salesperson a price list, so each student holds different information and must exchange it to complete the task. Ms. Shin applied Characteristic 5: instead of producing correct object pronouns, students share personal opinions about chores and give reasons, using language communicatively.","scoring_criteria":[{"criterion":"Mr. Kang → Characteristic 2 식별","points":1},{"criterion":"Characteristic 2 근거: Card A/B 서로 다른 정보 → 정보 격차","points":1},{"criterion":"Ms. Shin → Characteristic 5 식별","points":1},{"criterion":"Characteristic 5 근거: 문법 연습(원본) → 의견 표현 의사소통(수정본)","points":1}]},"variants":[{"label":"답안 A","source_type":"variant","content":"Mr. Kang applied Characteristic 2: the modified activity creates an information gap since Card A (customer) and Card B (salesperson) contain different information that students must exchange to complete the task. Ms. Shin applied Characteristic 5: rather than practicing object pronouns, students in the modified activity express genuine opinions about chores, using language as a real communicative tool."},{"label":"답안 B","source_type":"variant","content":"Characteristic 2 is reflected in Mr. Kang's modification because each student holds unique information — the customer has a budget constraint while the salesperson has a product list — requiring true exchange to achieve the outcome. Characteristic 5 is reflected in Ms. Shin's modification because students discuss personal preferences and reasons rather than producing grammatically correct responses to fixed questions."}]},"source":{"references":[{"type":"textbook","author":"Nunan, D.","title":"Designing Tasks for the Communicative Classroom","year":1989,"publisher":"Cambridge University Press","pages":"pp. 54–60","excerpt":"A <span class=\"ref-hl\">communicative task</span> involves an <span class=\"ref-hl\">information gap</span>: participants must <span class=\"ref-hl\">exchange information</span> they do not share, and language serves as the primary instrument for achieving this exchange."}],"concept_explanation":"Interpersonal communication activities are distinguished from mechanical drills by five key characteristics: (1) a concrete outcome, (2) an information gap, (3) authentic materials, (4) opportunities for language reflection, and (5) language used to communicate rather than to practice form. An information gap (Characteristic 2) is present when participants hold different information that must be exchanged to complete the task; without it, communication is merely performative. Language as communication (Characteristic 5) is realized when learners express genuine meaning rather than demonstrating a target grammatical structure.\n  (대인 의사소통 활동은 기계적 드릴과 달리 5가지 핵심 특성으로 구분된다: ① 구체적 결과물, ② 정보 격차, ③ 실제 자료, ④ 언어 사용 성찰 기회, ⑤ 형식 연습이 아닌 의사소통 수단으로서 언어 사용. 정보 격차(Characteristic 2)는 참여자가 서로 다른 정보를 보유하고 교환해야 과제가 완수될 때 성립한다. 의사소통 수단으로서 언어 사용(Characteristic 5)은 목표 문법 구조 시연이 아닌 실제 의미 표현 시 실현된다.)\n\nCLT (Communicative Language Teaching): an approach that treats language as a means of communication rather than a formal system to be memorized, prioritizing meaningful interaction and functional language use over explicit grammar practice."},"related":{"enabled":true,"questions":[]}},"general_2026_A03.json":{"meta":{"id":"general_2026_A03","year":2026,"number":"A-3","subject":"general","linguistics_domain":"","question_type":"short_answer","score":2,"tags":["drama","Sam Shepard","Buried Child","cultural degeneration"],"parse_source":"2026_전공A_기출.pdf","parse_confidence":"high","verified":true},"problem":{"instruction":"Complete the commentary below by filling in the blank with the ONE most appropriate word from the excerpt.","passage":"HALIE: The most incredible things, roses! Aren't they incredible, Father?\nDEWIS: Yes. Yes they are.\nHALIE: They almost cover the stench of sin in this house. Just magnificent! The smell. We'll have to put some at the foot of Ansel's statue. On the day of the unveiling.\n[HALIE finds a silver flask of whiskey in DEWIS's vest pocket. She pulls it out. DODGE looks on eagerly. HALIE crosses to DODGE, opens the flask, and takes a sip.]\nHALIE: [to DODGE] Ansel's getting a statue, Dodge. Did you know that? Not a plaque but a real live statue. A full bronze. Tip to toe. A basketball in one hand and a rifle in the other.\nBRADLEY
